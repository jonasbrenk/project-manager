<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <link rel="icon" type="image/png" sizes="192x192" href="/static/icon-192.png?v=3">
  <link rel="apple-touch-icon" sizes="180x180" href="/static/apple-touch-icon.png?v=3">
  <link rel="manifest" href="/site.webmanifest?v=1">
  <script src="/static/iconify-catalog.js?v=1" defer></script>
  <meta name="theme-color" content="#0b1020">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Projects">
  <title>Project View</title>
  <script>
    (() => {
      const saved = localStorage.getItem("pm_theme_mode");
      const theme = saved === "light" || saved === "dark"
        ? saved
        : (matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark");
      document.documentElement.dataset.theme = theme;
      document.documentElement.style.colorScheme = theme;
      document.querySelector('meta[name="theme-color"]')?.setAttribute("content", theme === "light" ? "#f2f2f7" : "#0b1020");
    })();
  </script>

  <style>
    :root {
      --bg: #0b1020;
      --card: rgba(19, 26, 47, .92);
      --card2: rgba(28, 38, 70, .8);
      --text: #eef2ff;
      --muted: #a8b3cf;
      --line: rgba(255, 255, 255, .08);
      --accent: #4f7cff;
      --accentSoft: rgba(79, 124, 255, .15);
      --danger: #ff6a6a;
      --dangerSoft: rgba(255, 106, 106, .12);
      --dangerSoftAlt: rgba(255, 106, 106, .06);
      --dangerBorder: rgba(255, 106, 106, .28);
      --dangerText: #ffd9d9;
      --successSoft: rgba(88, 196, 143, .12);
      --successBorder: rgba(88, 196, 143, .28);
      --successText: #d9ffea;
      --shadow: 0 18px 50px rgba(0, 0, 0, .28);
      --radius: 22px;
      --bgTop: #172344;
      --bgBottom: #0b1020;
      --surfaceSoft: rgba(255, 255, 255, .05);
      --panelBg: #0f172d;
      --toggleOff: rgba(255, 255, 255, .16);
      --doneFade: .56
    }

    html[data-theme="light"] {
      --bg: #edf3ff;
      --card: rgba(255, 255, 255, .88);
      --card2: rgba(242, 247, 255, .92);
      --text: #17233c;
      --muted: #5d6a84;
      --line: rgba(23, 35, 60, .12);
      --accent: #2f6df6;
      --accentSoft: rgba(47, 109, 246, .12);
      --danger: #d74d4d;
      --dangerSoft: rgba(215, 77, 77, .12);
      --dangerSoftAlt: rgba(215, 77, 77, .08);
      --dangerBorder: rgba(215, 77, 77, .28);
      --dangerText: #b43333;
      --successSoft: rgba(88, 196, 143, .14);
      --successBorder: rgba(88, 196, 143, .32);
      --successText: #217a52;
      --shadow: 0 18px 45px rgba(63, 88, 138, .14);
      --bgTop: #f9fbff;
      --bgBottom: #dfe9ff;
      --surfaceSoft: rgba(20, 34, 59, .04);
      --panelBg: #ffffff;
      --toggleOff: rgba(21, 34, 59, .16);
      --doneFade: .5
    }

    * {
      box-sizing: border-box
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: radial-gradient(circle at top, var(--bgTop) 0%, var(--bgBottom) 58%);
      color: var(--text);
      font-family: Inter, system-ui, sans-serif
    }

    button,
    input,
    textarea {
      font: inherit
    }

    .page {
      width: min(1120px, calc(100% - 24px));
      margin: 0 auto;
      padding: 24px 0 90px
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      margin-bottom: 16px;
      flex-wrap: wrap
    }

    .settings-trigger {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      padding: 0
    }

    .settings-trigger svg {
      width: 16px;
      height: 16px;
      display: block;
      flex-shrink: 0
    }

    .back-link {
      text-decoration: none;
      color: var(--text);
      background: var(--surfaceSoft);
      border: 1px solid var(--line);
      padding: 10px 14px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      gap: 8px
    }

    .layout {
      display: grid;
      gap: 16px
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      padding: 18px;
      position: relative;
      z-index: 0
    }

    .card.has-open-menu {
      z-index: 40
    }

    .hero {
      display: grid;
      gap: 18px
    }

    .hero-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      flex-wrap: wrap
    }

    .hero-title-wrap {
      display: flex;
      gap: 14px;
      align-items: center;
      min-width: 0
    }

    .hero-copy {
      min-width: 0;
      flex: 1 1 auto;
      display: grid;
      gap: 8px
    }

    .hero-icon {
      width: 64px;
      height: 64px;
      border-radius: 20px;
      display: grid;
      place-items: center;
      background: var(--accentSoft);
      border: 1px solid rgba(79, 124, 255, .28);
      font-size: 1.7rem;
      flex-shrink: 0;
      overflow: hidden
    }

    h1,
    h2,
    h3,
    p {
      margin: 0
    }

    .project-title {
      font-size: clamp(1.5rem, 3vw, 2.4rem);
      line-height: 1.1;
      margin-bottom: 8px;
      word-break: break-word
    }

    .muted {
      color: var(--muted);
      line-height: 1.5
    }

    .formatted-text {
      display: grid;
      gap: 8px;
      min-width: 0
    }

    .formatted-text.compact {
      gap: 6px
    }

    .formatted-paragraph {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      overflow-wrap: anywhere
    }

    .formatted-list {
      margin: 0;
      padding-left: 1.2rem;
      display: grid;
      gap: 4px
    }

    .formatted-list li {
      white-space: pre-wrap;
      word-break: break-word;
      overflow-wrap: anywhere
    }

    .indent-1 {
      margin-left: 1.4rem
    }

    .indent-2 {
      margin-left: 2.8rem
    }

    .indent-3 {
      margin-left: 4.2rem
    }

    .meta-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px
    }

    .meta-box {
      padding: 12px 16px;
      border-radius: 16px;
      background: var(--card2);
      border: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      justify-content: center
    }

    .meta-label {
      color: var(--muted);
      font-size: .65rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 4px
    }

    .meta-value {
      font-size: .95rem;
      font-weight: 700;
      line-height: 1.3;
      word-break: break-word
    }

    .meta-value-danger {
      color: var(--dangerText)
    }

    .meta-value-success {
      color: var(--successText)
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap
    }

    .section-title {
      font-size: 1.08rem;
      font-weight: 700
    }

    .btn {
      border: 0;
      border-radius: 999px;
      padding: 11px 15px;
      cursor: pointer;
      font-weight: 600;
      white-space: nowrap
    }

    .btn-primary {
      background: var(--accent);
      color: white
    }

    .btn-secondary {
      background: var(--surfaceSoft);
      color: var(--text);
      border: 1px solid var(--line)
    }

    .btn-danger {
      background: var(--dangerSoft);
      color: var(--dangerText);
      border: 1px solid var(--dangerBorder)
    }

    .btn-ok {
      background: var(--successSoft);
      color: var(--successText);
      border: 1px solid var(--successBorder)
    }

    .inline-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap
    }

    .links-grid,
    .step-tree {
      display: grid;
      gap: 12px
    }

    /* Standard link card */
    .link-card {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 14px;
      align-items: center;
      padding: 14px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, .03);
      position: relative
    }

    .link-icon {
      width: 50px;
      height: 50px;
      display: grid;
      place-items: center;
      border-radius: 16px;
      background: var(--accentSoft);
      border: 1px solid rgba(79, 124, 255, .25);
      font-size: 1.35rem;
      overflow: hidden
    }

    .link-main {
      min-width: 0;
      overflow: hidden
    }

    .link-title {
      font-weight: 700;
      margin-bottom: 6px
    }

    .link-url {
      color: var(--muted);
      text-decoration: none;
      word-break: break-all;
      line-height: 1.4;
      text-wrap: nowrap;
      text-overflow: ellipsis;
    }

    /* Project link card */
    .link-card-project {
      align-items: flex-start;
      background: rgba(79, 124, 255, .05);
      border-color: rgba(79, 124, 255, .18);
      padding: 16px
    }

    .proj-link-icon {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      background: var(--accentSoft);
      border: 1px solid rgba(79, 124, 255, .3);
      font-size: 1.5rem;
      overflow: hidden;
      flex-shrink: 0
    }

    .proj-link-body {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 0;
      padding-right: 42px
    }

    .proj-link-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
      flex-wrap: wrap
    }

    .proj-link-name {
      font-weight: 700;
      font-size: 1rem;
      line-height: 1.2
    }

    .proj-link-desc {
      color: var(--muted);
      font-size: .88rem;
      line-height: 1.4;
      margin-bottom: 6px
    }

    .proj-link-meta {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
      margin-top: 4px;
      justify-self: stretch
    }

    .proj-link-meta .pill.warning,
    .meta-grid .meta-box.warning {
      border-color: color-mix(in srgb, var(--accent) 45%, var(--line));
      box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--accent) 20%, transparent);
    }

    .proj-link-meta .pill.danger {
      color: var(--dangerText);
      border-color: var(--dangerBorder);
      background: var(--dangerSoft);
    }

    .proj-link-loading {
      opacity: .6
    }

    .link-card-project.is-finished {
      opacity: .68
    }

    .link-card-project.is-finished .card-menu-trigger {
      opacity: .58
    }

    .pill.done {
      color: #58c48f;
      border-color: rgba(88, 196, 143, .3);
      background: rgba(88, 196, 143, .12)
    }

    /* Project link picker modal */
    .proj-picker-grid {
      display: grid;
      gap: 8px;
      max-height: 52vh;
      overflow-y: auto;
      padding-right: 2px
    }

    .proj-picker-item {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255, 255, 255, .03);
      cursor: pointer;
      color: var(--text);
      text-align: left;
      transition: border-color .15s, background .15s;
      width: 100%
    }

    .proj-picker-item:hover {
      border-color: rgba(79, 124, 255, .4);
      background: rgba(79, 124, 255, .08)
    }

    .proj-picker-icon {
      width: 44px;
      height: 44px;
      border-radius: 13px;
      display: grid;
      place-items: center;
      background: var(--accentSoft);
      border: 1px solid rgba(79, 124, 255, .25);
      font-size: 1.25rem;
      overflow: hidden;
      flex-shrink: 0
    }

    .proj-picker-info {
      min-width: 0
    }

    .proj-picker-name {
      font-weight: 700;
      font-size: .95rem;
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .proj-picker-meta {
      color: var(--muted);
      font-size: .82rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .proj-picker-arrow {
      color: var(--muted);
      font-size: 1.1rem;
      flex-shrink: 0
    }

    .card-menu-wrap {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 3
    }

    .card-menu-wrap.open {
      z-index: 120
    }

    .card-menu-trigger {
      width: 34px;
      height: 34px;
      position: relative;
      z-index: 1;
      font-family: "SF Pro Display", "Segoe UI", Inter, system-ui, sans-serif;
      font-size: 1.02rem;
      font-weight: 800;
      letter-spacing: .14em;
      line-height: 1
    }

    .card-menu {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      min-width: 176px;
      padding: 10px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: var(--panelBg);
      box-shadow: var(--shadow);
      display: none;
      gap: 8px;
      z-index: 121
    }

    .card-menu.show {
      display: grid
    }

    .card-menu-item {
      width: 100%;
      border: 1px solid transparent;
      border-radius: 12px;
      background: var(--surfaceSoft);
      color: var(--text);
      padding: 12px 14px;
      text-align: left;
      cursor: pointer;
      font-family: "SF Pro Text", "Segoe UI", Inter, system-ui, sans-serif;
      font-size: .89rem;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase
    }

    .card-menu-item:hover {
      border-color: rgba(79, 124, 255, .4);
      background: rgba(79, 124, 255, .1)
    }

    .card-menu-item.danger {
      color: var(--dangerText);
      background: var(--dangerSoft);
      border-color: var(--dangerBorder)
    }

    .icon-btn {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, .05);
      color: var(--text);
      width: 38px;
      height: 38px;
      border-radius: 999px;
      cursor: pointer;
      display: grid;
      place-items: center;
      font-weight: 700;
      flex-shrink: 0;
      text-decoration: none;
      font-size: .95rem
    }

    .icon-btn.danger {
      color: var(--dangerText);
      border-color: var(--dangerBorder);
      background: var(--dangerSoft)
    }

    .step-item {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, .03);
      border-radius: 18px;
      padding: 14px;
      position: relative;
      display: grid;
      gap: 10px
    }

    .step-head {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 12px;
      align-items: flex-start;
      padding-right: 42px
    }

    .step-check {
      margin-top: 4px;
      width: 19px;
      height: 19px;
      accent-color: var(--accent);
      cursor: pointer
    }

    .step-title {
      font-weight: 700;
      margin-bottom: 6px
    }

    .step-title.done {
      text-decoration: line-through;
      color: var(--muted)
    }

    .step-main.done-state,
    .step-sub.done-state {
      opacity: var(--doneFade)
    }

    .step-item:has(.step-check:checked) .card-menu-trigger {
      opacity: var(--doneFade)
    }

    .step-main {
      min-width: 0;
      width: 100%
    }

    .step-sub {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      color: var(--muted);
      font-size: .9rem;
      width: 100%
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 7px 10px;
      border: 1px solid var(--line);
      background: var(--surfaceSoft);
      width: 100%;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .children {
      margin-top: 4px;
      margin-left: 18px;
      display: grid;
      gap: 10px;
      border-left: 2px solid rgba(255, 255, 255, .07);
      padding-left: 12px;
      min-width: 0;
      box-sizing: border-box
    }

    .children>.step-item {
      width: 100%;
      max-width: 100%
    }

    .empty {
      padding: 24px;
      border: 1px dashed var(--line);
      border-radius: 18px;
      text-align: center;
      color: var(--muted)
    }

    .step-item.move-target {
      border-color: color-mix(in srgb, var(--successText) 42%, var(--line));
      background: color-mix(in srgb, var(--successSoft) 62%, var(--card));
      box-shadow: 0 0 0 2px color-mix(in srgb, var(--successText) 20%, transparent)
    }

    .step-item.move-source {
      border-color: color-mix(in srgb, var(--accent) 52%, var(--line));
      background: color-mix(in srgb, var(--accentSoft) 48%, var(--card));
      box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 26%, transparent)
    }

    .steps-section.move-target {
      border-color: color-mix(in srgb, var(--successText) 42%, var(--line));
      background: color-mix(in srgb, var(--successSoft) 35%, var(--card));
      box-shadow: 0 0 0 2px color-mix(in srgb, var(--successText) 20%, transparent)
    }

    .move-toolbar {
      position: fixed;
      right: 18px;
      left: 18px;
      bottom: calc(18px + env(safe-area-inset-bottom, 0px));
      z-index: 130;

      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: nowrap;

      padding: 10px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: var(--panelBg);
      box-shadow: var(--shadow);
      box-sizing: border-box;

      max-width: 100%;
      overflow: hidden;
    }

    .move-toolbar .btn {
      min-height: 34px;
      padding: 7px 10px;
      border-radius: 12px;
      box-sizing: border-box;

      flex: 1 1 0;
      min-width: 0;
      white-space: nowrap;
      font-size: 14px;
    }

    .link-card.selected-for-delete,
    .step-item.selected-for-delete {
      border-color: var(--dangerBorder);
      background: color-mix(in srgb, var(--dangerSoft) 70%, var(--card));
      box-shadow: 0 0 0 2px color-mix(in srgb, var(--danger) 24%, transparent)
    }

    .delete-mode .step-check {
      pointer-events: none
    }

    .floating-actions {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 110
    }

    .floating-actions.hidden {
      opacity: 0;
      pointer-events: none
    }

    .floating-actions-menu {
      position: absolute;
      right: 0;
      bottom: calc(100% + 10px);
      min-width: 196px;
      padding: 10px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: var(--panelBg);
      box-shadow: var(--shadow);
      display: none;
      gap: 8px
    }

    .floating-actions-menu.show {
      display: grid
    }

    .menu-item {
      width: 100%;
      border: 1px solid transparent;
      border-radius: 12px;
      background: var(--surfaceSoft);
      color: var(--text);
      padding: 12px 14px;
      text-align: left;
      cursor: pointer;
      font-family: "SF Pro Text", "Segoe UI", Inter, system-ui, sans-serif;
      font-size: .9rem;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase
    }

    .menu-item:hover {
      border-color: rgba(79, 124, 255, .4);
      background: rgba(79, 124, 255, .1)
    }

    .menu-item.danger {
      color: var(--danger)
    }

    .floating-trigger {
      width: 56px;
      height: 56px;
      border-radius: 999px;
      box-shadow: var(--shadow);
      background: var(--panelBg);
      color: var(--text);
      border: 1px solid var(--line);
      font-family: "SF Pro Display", "Segoe UI", Inter, system-ui, sans-serif;
      font-size: 1.18rem;
      font-weight: 800;
      letter-spacing: .16em;
      line-height: 1
    }

    .delete-toolbar {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 111;
      display: none;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 18px;
      border: 1px solid var(--dangerBorder);
      background: var(--panelBg);
      color: var(--dangerText);
      box-shadow: var(--shadow)
    }

    .delete-toolbar.show {
      display: flex
    }

    .delete-toolbar-copy {
      display: grid;
      gap: 2px
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(7, 10, 18, .68);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 50
    }

    .modal-backdrop.show {
      display: flex
    }

    .modal {
      width: min(720px, 100%);
      max-height: calc(100vh - 32px);
      overflow: hidden;
      background: var(--panelBg);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 18px;
      display: flex;
      flex-direction: column
    }

    .icon-picker-modal {
      width: min(760px, 100%)
    }

    .modal-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 14px;
      flex-wrap: wrap;

    ];
    const STANDARD_ICONS_STORAGE_KEY = "project_manager_standard_icons";
    const THEME_STORAGE_KEY = "pm_theme_mode";
    let STANDARD_ICONS = loadStandardIcons();
    const projectId = new URLSearchParams(location.search).get("id");
    const app = document.getElementById("app");

    const floatingActionsMenu = document.getElementById("floatingActionsMenu");

    let project = null;

    let moveState = null;
    let deleteMode = false;
    let selectedDeleteIds = new Set();
    const MAX_STEP_DEPTH = 2;
    const collapsedStepIds = new Set();
    let hideCompletedSteps = localStorage.getItem("pm_hide_completed_steps") === "1";
    let iconSearchTimer = null;
    let toastTimer = null;

    // Cache for linked project data: id -> project object (or null on error)
    const projectCache = {};
    // Temp storage for project picker modal
    let _pickerProjects = [];

    function generateId() {
      if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID();
      return Math.random().toString(36).slice(2) + Date.now().toString(36);
    }

    function loadStandardIcons() { try { const saved = JSON.parse(localStorage.getItem(STANDARD_ICONS_STORAGE_KEY) || "null"); if (Array.isArray(saved) && saved.length) return saved; } catch { } return [...DEFAULT_STANDARD_ICONS]; }
    function saveStandardIcons() { localStorage.setItem(STANDARD_ICONS_STORAGE_KEY, JSON.stringify(STANDARD_ICONS)); }
    function addToStandardIcons(iconValue, label = "Custom") { const value = String(iconValue || "").trim(); if (!value) return; if (STANDARD_ICONS.some(icon => String(icon.value).trim() === value)) return; STANDARD_ICONS.unshift({ label: String(label || "Custom").trim() || "Custom", value, removable: true }); saveStandardIcons(); }
    function escapeHtml(value = "") { return String(value).replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;").replaceAll("'", "&#039;"); }
    function normalizeDisplayText(value = "") { return String(value).replaceAll("-->", "→"); }
    function isImageUrl(value = "") { const v = String(value).trim(); return /^https?:\/\//i.test(v) && /\.(png|jpe?g|gif|webp|svg|avif)(\?.*)?$/i.test(v); }
    function formatLinkDestination(value = "") { try { return new URL(String(value), window.location.origin).hostname.replace(/^www\./i, "") || "Link"; } catch { return String(value).replace(/^https?:\/\//i, "").split("/")[0] || "Link"; } }
    function renderIcon(icon, fallback = "📌", alt = "icon") { const value = String(icon || "").trim(); return isImageUrl(value) ? `<img src="${escapeHtml(value)}" alt="${escapeHtml(alt)}" style="width:100%;height:100%;object-fit:cover;border-radius:inherit;display:block;" />` : escapeHtml(value || fallback); }
    function notify(message) {
      document.querySelector(".app-toast")?.remove();
      const toast = document.createElement("div");
      toast.className = "app-toast";
      toast.textContent = message;
      document.body.appendChild(toast);
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.remove(), 2400);
    }
    function goBack(event) {
      try {
        const referrer = new URL(document.referrer);
        if (referrer.origin === location.origin && history.length > 1) {
          event.preventDefault();
          history.back();
        }
      } catch { }
    }
    // Label the back button with where the user actually came from
    (function initBackLink() {
      const back = document.querySelector(".back-link");
      if (!back) return;
      try {
        const referrer = new URL(document.referrer);
        if (referrer.origin !== location.origin || referrer.pathname !== "/project") return;
        const fromId = new URLSearchParams(referrer.search).get("id");
        if (!fromId || fromId === projectId) return;
        const summaries = JSON.parse(localStorage.getItem("pm_project_summaries") || "[]");
        const name = summaries.find(summary => summary.id === fromId)?.name;
        back.textContent = `‹ ${name || "Back"}`;
        back.href = referrer.pathname + referrer.search;
      } catch { }
    })();
    const THEME_ICON_SUN = `<svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>`;
    const THEME_ICON_MOON = `<svg viewBox="0 0 24 24" aria-hidden="true" fill="currentColor"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/></svg>`;
    function applyTheme(theme, persist = false) {
      const resolved = theme === "light" ? "light" : "dark";
      document.documentElement.dataset.theme = resolved;
      document.documentElement.style.colorScheme = resolved;
      document.querySelector('meta[name="theme-color"]')?.setAttribute("content", resolved === "light" ? "#f2f2f7" : "#0b1020");
      if (persist) localStorage.setItem(THEME_STORAGE_KEY, resolved);
      const toggleBtn = document.getElementById("themeToggleBtn");
      if (toggleBtn) toggleBtn.innerHTML = resolved === "light" ? THEME_ICON_SUN : THEME_ICON_MOON;
    }
    function toggleTheme() { applyTheme(document.documentElement.dataset.theme === "light" ? "dark" : "light", true); }
    function confirmSheet({ title, message = "", confirmLabel = "OK", cancelLabel = "Cancel", destructive = false }) {
      return new Promise(resolve => {
        document.getElementById("confirmSheet")?.remove();
        const backdrop = document.createElement("div");
        backdrop.id = "confirmSheet";
        backdrop.className = "confirm-backdrop";
        backdrop.innerHTML = `<div class="confirm-alert" role="alertdialog" aria-modal="true" aria-label="${escapeHtml(title)}"><div class="confirm-copy"><strong>${escapeHtml(title)}</strong>${message ? `<p>${escapeHtml(message)}</p>` : ""}</div><div class="confirm-actions">${cancelLabel != null ? `<button class="confirm-btn" type="button" data-action="cancel">${escapeHtml(cancelLabel)}</button>` : ""}<button class="confirm-btn confirm-primary${destructive ? " destructive" : ""}" type="button" data-action="confirm">${escapeHtml(confirmLabel)}</button></div></div>`;
        const done = value => { backdrop.remove(); document.removeEventListener("keydown", onKey, true); resolve(value); };
        const onKey = event => { if (event.key === "Escape") { event.stopPropagation(); done(false); } };
        backdrop.addEventListener("click", event => {
          const action = event.target.closest("[data-action]")?.dataset.action;
          if (action) done(action === "confirm");
          else if (event.target === backdrop) done(false);
        });
        document.addEventListener("keydown", onKey, true);
        document.body.appendChild(backdrop);
        backdrop.querySelector(".confirm-primary")?.focus();
      });
    }
    function openSettingsModal() { settingsBackdrop?.classList.add("show"); }
    function closeSettingsModal() { settingsBackdrop?.classList.remove("show"); }
    function clampIndent(level) { return Math.max(0, Math.min(3, Number(level) || 0)); }
    function renderFormattedText(value, fallback = "", compact = false) {
      const source = String(value || "").replace(/\r\n?/g, "\n");
      if (!source.trim()) return fallback ? `<div class="formatted-text${compact ? " compact" : ""}"><p class="formatted-paragraph">${escapeHtml(normalizeDisplayText(fallback))}</p></div>` : "";

      const lines = source.split("\n");
      const parts = [];
      let paragraphLines = [];
      let paragraphIndent = 0;
      let listItems = [];
      let listIndent = 0;

      function flushParagraph() {
        if (!paragraphLines.length) return;
        parts.push(`<p class="formatted-paragraph indent-${clampIndent(paragraphIndent)}">${escapeHtml(normalizeDisplayText(paragraphLines.join("\n")))}</p>`);
        paragraphLines = [];
        paragraphIndent = 0;
      }

      function flushList() {
        if (!listItems.length) return;
        parts.push(`<ul class="formatted-list indent-${clampIndent(listIndent)}">${listItems.join("")}</ul>`);
        listItems = [];
        listIndent = 0;
      }

      for (const rawLine of lines) {
        if (!rawLine.trim()) {
          flushParagraph();
          flushList();
          continue;
        }

        const indentMatch = rawLine.match(/^(\t*)/);
        const indent = indentMatch ? indentMatch[1].length : 0;
        const trimmedLine = rawLine.slice(indent);

        if (/^- /.test(trimmedLine)) {
          flushParagraph();
          if (listItems.length && indent !== listIndent) flushList();
          if (!listItems.length) listIndent = indent;
          listItems.push(`<li>${escapeHtml(normalizeDisplayText(trimmedLine.slice(2)))}</li>`);
          continue;
        }

        flushList();
        if (!paragraphLines.length) paragraphIndent = indent;
        paragraphLines.push(rawLine);
      }

      flushParagraph();
      flushList();
      return `<div class="formatted-text${compact ? " compact" : ""}">${parts.join("")}</div>`;
    }
    function formatDeadline(deadline) { if (!deadline) return "No deadline"; const dt = new Date(deadline); if (Number.isNaN(dt.getTime())) return "Invalid deadline"; return dt.toLocaleString([], { year: "numeric", month: "short", day: "2-digit", hour: "2-digit", minute: "2-digit" }); }
    function formatTimeLeft(seconds) { if (seconds == null) return "No deadline"; if (seconds <= 0) return "Deadline passed"; const days = Math.floor(seconds / 86400); const hours = Math.floor((seconds % 86400) / 3600); const minutes = Math.floor((seconds % 3600) / 60); if (days > 0) return `${days}d, ${hours}h left`; if (hours > 0) return `${hours}h, ${minutes}m left`; return `${minutes} min left`; }
    function isDueSoon(seconds) { return seconds != null && seconds > 0 && seconds <= 7 * 24 * 60 * 60; }
    function getProjectMetaState() { if (project.finished) return { label: "Status", value: "Finished", extraClass: "meta-value-success" }; if (!project.deadline) return { label: "Status", value: "Open", extraClass: "" }; if (project.seconds_left != null && project.seconds_left <= 0) return { label: "Time left", value: "Deadline passed", extraClass: "meta-value-danger" }; return { label: "Time left", value: formatTimeLeft(project.seconds_left), extraClass: "" }; }
    function stepTimeLeft(deadline) { if (!deadline) return null; const dt = new Date(deadline); if (Number.isNaN(dt.getTime())) return null; return Math.floor((dt.getTime() - Date.now()) / 1000); }
    function deepClone(value) { return JSON.parse(JSON.stringify(value)); }
    function countTaskProgress(steps) { return (steps || []).reduce((total, step) => { const nested = countTaskProgress(step.children || []); return { total: total.total + 1 + nested.total, done: total.done + Number(!!step.done) + nested.done }; }, { total: 0, done: 0 }); }
    function cacheProjectState(value) {
      try {
        localStorage.setItem(`pm_project_${projectId}`, JSON.stringify(value));
        const summaries = JSON.parse(localStorage.getItem("pm_project_summaries") || "null");
        if (!Array.isArray(summaries)) return;
        const index = summaries.findIndex(summary => summary.id === value.id);
        if (index < 0) return;
        const taskProgress = countTaskProgress(value.steps || []);
        summaries[index] = { ...summaries[index], id: value.id, name: value.name, deadline: value.deadline, description: value.description, finished: !!value.finished, icon: value.icon, seconds_left: value.seconds_left, task_total: taskProgress.total, task_done: taskProgress.done, updated_at: value.updated_at };
        localStorage.setItem("pm_project_summaries", JSON.stringify(summaries));
      } catch { }
    }
    function parseDateSafe(val) { const str = String(val || "").trim(); if (!str) return null; const dt = new Date(str); return Number.isNaN(dt.getTime()) ? null : dt.toISOString(); }
    function buildCardMenu(menuId, actions) {
      const isOpen = openContextMenuId === menuId;
      return `<div class="card-menu-wrap${isOpen ? " open" : ""}"><button class="card-menu-trigger" type="button" onclick='toggleContextMenu(${JSON.stringify(menuId)}, event)' aria-label="More actions" aria-expanded="${isOpen}"><svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="5" cy="12" r="1.65"/><circle cx="12" cy="12" r="1.65"/><circle cx="19" cy="12" r="1.65"/></svg></button><div class="card-menu${isOpen ? " show" : ""}" id="${escapeHtml(menuId)}">${actions.map(action => `<button class="card-menu-item${action.danger ? " danger" : ""}" type="button" onclick="event.stopPropagation(); closeContextMenu(); ${action.onclick}">${escapeHtml(action.label)}</button>`).join("")}</div></div>`;
    }

    async function api(url, options = {}) {
      const res = await fetch(url, { headers: { "Content-Type": "application/json" }, ...options });
      if (!res.ok) throw new Error(await res.text() || "Request failed");
      return res.headers.get("content-type")?.includes("application/json") ? res.json() : null;
    }

    // --- Project link helpers ---

    // Extracts a project ID from a link whose url is "PROJECTS/project?id={id}"
    function getProjectIdFromLink(link) {
      const raw = String(link.url || "");
      if (!raw.startsWith("PROJECTS/")) return null;
      const rest = raw.slice("PROJECTS/".length);
      try {
        const qmark = rest.indexOf("?");
        const params = new URLSearchParams(qmark >= 0 ? rest.slice(qmark + 1) : rest);
        return params.get("id") || null;
      } catch { return null; }
    }

    async function fetchLinkedProject(id) {
      if (id in projectCache) return projectCache[id];
      try {
        projectCache[id] = await api(`/api/projects/${id}`);
      } catch {
        projectCache[id] = null;
      }
      return projectCache[id];
    }

    function hasUncachedProjectLinks() {
      return (project.links || []).some(l => {
        const pid = getProjectIdFromLink(l);
        return pid && !(pid in projectCache);
      });
    }

    async function hydrateProjectLinks() {
      const ids = [...new Set(
        (project.links || []).map(l => getProjectIdFromLink(l)).filter(Boolean)
      )].filter(id => !(id in projectCache));
      if (!ids.length) return;
      await Promise.all(ids.map(id => fetchLinkedProject(id)));
      render(); // re-render with now-cached data; won't loop because all are cached
    }

    function renderProjectLinkCard(link, index, proj) {
      const loading = proj === undefined;
      const error = proj === null;
      const projectUrl = proj ? `${window.location.origin}/project?id=${proj.id}` : "#";
      const icon = renderIcon(proj?.icon || link.icon || "📌", "📌", proj?.name || link.title);
      const name = escapeHtml(normalizeDisplayText(proj?.name || link.title || "Project link"));
      const subtitle = loading ? "Project" : error ? "Unavailable" : proj?.finished ? "Finished" : proj?.seconds_left != null ? formatTimeLeft(proj.seconds_left) : "Project";
      const menu = buildCardMenu(`project-link-menu-${index}`, [
        { label: "Edit", onclick: `event.stopPropagation(); openEditLinkModal('${link.id}');` },
        { label: "Delete", onclick: `event.stopPropagation(); deleteLink('${link.id}');`, danger: true }
      ]);

      return `<div class="link-card link-card-project${loading ? " proj-link-loading" : ""}${proj?.finished ? " is-finished" : ""}${deleteMode && selectedDeleteIds.has(`link:${link.id}`) ? " selected-for-delete" : ""}" style="view-transition-name: l-${String(link.id).replace(/[^a-zA-Z0-9-]/g, "")}" onclick="${deleteMode ? `toggleDeleteSelection(event, 'link:${link.id}')` : `location.href='${escapeHtml(projectUrl)}'`}">
        ${menu}
        <div class="proj-link-icon">${loading ? "⏳" : icon}</div>
        <div class="proj-link-body">
          <div class="proj-link-name">${loading ? "Loading…" : name}</div>
          <div class="link-subtitle${error ? " danger" : proj?.finished ? " done" : ""}">${escapeHtml(subtitle)}</div>
        </div>

    }

    // --- Modal helpers ---

    function openModal(title, contentHtml, onSubmit) {
      modalTitle.textContent = title;
      modalForm.innerHTML = contentHtml;
      modalBackdrop.classList.add("show");
      initializeIconInputPreviews();
      modalForm.onsubmit = async (event) => {
        event.preventDefault();
        const btn = modalForm.querySelector('button[type="submit"]');
        if (btn) btn.disabled = true;
        try {
          await onSubmit(new FormData(modalForm));
        } catch (err) {
          confirmSheet({ title: "Could Not Save", message: err.message || "Please try again.", cancelLabel: null });
          if (btn) btn.disabled = false;
        }
      };
    }

    function closeModal() { modalBackdrop.classList.remove("show"); modalForm.innerHTML = ""; modalForm.onsubmit = null; closeIconPickerModal(); }
    function findStepAndParent(steps, targetId, parent = null) { for (let i = 0; i < (steps || []).length; i++) { const step = steps[i]; if (step.id === targetId) return { step, parent, index: i, collection: steps }; const nested = findStepAndParent(step.children || [], targetId, step); if (nested) return nested; } return null; }
    function getStepDepth(steps, targetId, depth = 0) { for (const step of (steps || [])) { if (step.id === targetId) return depth; const nestedDepth = getStepDepth(step.children || [], targetId, depth + 1); if (nestedDepth != null) return nestedDepth; } return null; }
    function getSubtreeDepth(step) { const children = step?.children || []; return children.length ? 1 + Math.max(...children.map(getSubtreeDepth)) : 0; }
    function canPlaceStepAt(source, targetParentId) { const parentDepth = targetParentId == null ? -1 : getStepDepth(project.steps || [], targetParentId); return parentDepth != null && parentDepth + 1 + getSubtreeDepth(source) <= MAX_STEP_DEPTH; }
    function toggleStepCollapse(stepId, event) { event?.stopPropagation(); if (collapsedStepIds.has(stepId)) collapsedStepIds.delete(stepId); else collapsedStepIds.add(stepId); window.pmAnimate(render); }
    function hasCompletedSteps(steps) { return (steps || []).some(step => step.done || hasCompletedSteps(step.children || [])); }
    function renderTaskVisibilityChange() { window.pmAnimate(render); }
    function toggleCompletedSteps(event) { event?.stopPropagation(); hideCompletedSteps = !hideCompletedSteps; localStorage.setItem("pm_hide_completed_steps", hideCompletedSteps ? "1" : "0"); renderTaskVisibilityChange(); }
    function showCompletedSteps(event) { event?.stopPropagation(); if (!hideCompletedSteps) return; hideCompletedSteps = false; localStorage.setItem("pm_hide_completed_steps", "0"); renderTaskVisibilityChange(); }
    function updateStepRecursive(steps, targetId, updater) { return (steps || []).map(step => step.id === targetId ? updater(step) : ({ ...step, children: updateStepRecursive(step.children || [], targetId, updater) })); }
    function removeStepRecursive(steps, targetId) { return (steps || []).filter(step => step.id !== targetId).map(step => ({ ...step, children: removeStepRecursive(step.children || [], targetId) })); }
    function containsStepId(steps, targetId) { return !!findStepAndParent(steps || [], targetId); }
    function removeStepAndCapture(steps, targetId) {
      let captured = null;
      const next = (steps || []).flatMap(step => {
        if (step.id === targetId) {
          captured = step;
          return [];
        }
        const nested = removeStepAndCapture(step.children || [], targetId);
        if (nested.captured) captured = nested.captured;
        return [{ ...step, children: nested.steps }];
      });
      return { steps: next, captured };
    }
    function insertStepAtTarget(steps, targetParentId, stepToInsert, position) {
      if (targetParentId == null) {
        const root = [...(steps || [])];
        if (position === "top") root.unshift(stepToInsert);
        else root.push(stepToInsert);
        return root;
      }
      return updateStepRecursive(steps || [], targetParentId, step => ({
        ...step,
        children: position === "top" ? [stepToInsert, ...(step.children || [])] : [...(step.children || []), stepToInsert]
      }));
    }
    function beginMoveStep(stepId) { moveState = { stepId, targetParentId: null }; openContextMenuId = null; render(); }
    function cancelMoveStep() { if (!moveState) return; moveState = null; render(); }
    function selectMoveTarget(targetParentId, event) {
      if (!moveState) return;
      event?.stopPropagation();
      if (targetParentId === moveState.stepId) return;
      const source = findStepAndParent(project.steps || [], moveState.stepId)?.step;
      if (!source) return;
      if (targetParentId && containsStepId(source.children || [], targetParentId)) return;
      if (!canPlaceStepAt(source, targetParentId)) { notify("Tasks can be nested up to three levels."); return; }
      moveState = { ...moveState, targetParentId };
      render();
    }
    async function confirmMoveStep(position) {
      if (!moveState) return;
      const updated = deepClone(project);
      const removed = removeStepAndCapture(updated.steps || [], moveState.stepId);
      if (!removed.captured) return cancelMoveStep();
      if (!canPlaceStepAt(removed.captured, moveState.targetParentId)) { notify("That move would exceed the three-level task structure."); return; }
      updated.steps = insertStepAtTarget(removed.steps, moveState.targetParentId, removed.captured, position);
      moveState = null;
      await saveProject(updated);
    }
    function toggleFloatingActions(event) { event.stopPropagation(); const isOpen = floatingActionsMenu.classList.toggle("show"); event.currentTarget?.setAttribute("aria-expanded", String(isOpen)); }
    function closeFloatingActions() { floatingActionsMenu.classList.remove("show"); floatingActions.querySelector(".floating-trigger")?.setAttribute("aria-expanded", "false"); }
    function openAddLinkFromMenu() { closeFloatingActions(); openAddLinkModal(); }
    function openAddProjectLinkFromMenu() { closeFloatingActions(); openAddProjectLinkModal(); }
    function openAddStepFromMenu() { closeFloatingActions(); openAddStepModal(); }
    function updateDeleteToolbar() {
      deleteCount.textContent = `${selectedDeleteIds.size} selected`;
      deleteToolbar.classList.toggle("show", deleteMode);
      floatingActions.classList.toggle("hidden", deleteMode);
    }
    function enterDeleteMode() {
      closeFloatingActions();
      moveState = null;
      deleteMode = true;
      selectedDeleteIds.clear();
      openContextMenuId = null;
      updateDeleteToolbar();
      render();
    }
    function cancelDeleteMode() {
      deleteMode = false;
      selectedDeleteIds.clear();
      updateDeleteToolbar();
      render();
    }
    function toggleDeleteSelection(event, key) {
      if (!deleteMode) return;
      event.preventDefault();
      event.stopPropagation();
      if (selectedDeleteIds.has(key)) selectedDeleteIds.delete(key);
      else selectedDeleteIds.add(key);
      updateDeleteToolbar();
      render();
    }
    async function confirmDeleteSelected() {
      if (!selectedDeleteIds.size) return;
      const count = selectedDeleteIds.size;
      const confirmed = await confirmSheet({
        title: count === 1 ? "Delete Item?" : `Delete ${count} Items?`,
        message: "This cannot be undone.",
        confirmLabel: "Delete",
        destructive: true
      });
      if (!confirmed) return;
      const updated = deepClone(project);
      const linkIds = [...selectedDeleteIds].filter(key => key.startsWith("link:")).map(key => key.slice(5));
      const stepIds = [...selectedDeleteIds].filter(key => key.startsWith("step:")).map(key => key.slice(5));
      if (linkIds.length) updated.links = (updated.links || []).filter(link => !linkIds.includes(link.id));
      for (const stepId of stepIds) updated.steps = removeStepRecursive(updated.steps || [], stepId);
      deleteMode = false;
      selectedDeleteIds.clear();
      updateDeleteToolbar();
      await saveProject(updated);
    }

    // Icon button + hidden input, meant to sit inline at the left of a name row
    function buildIconButton(targetInputId, fallback = "📌", value = "") {
      return `<button class="icon-picker-button" type="button" onclick='openIconPickerModal(${JSON.stringify(targetInputId)})' aria-label="Choose icon"><span class="icon-picker-preview" id="${escapeHtml(`${targetInputId}Preview`)}">${renderIcon(value, fallback, "icon preview")}</span><span class="icon-picker-edit" aria-hidden="true">＋</span></button><input type="hidden" id="${escapeHtml(targetInputId)}" name="icon" data-icon-fallback="${escapeHtml(fallback)}" data-icon-preview="${escapeHtml(`${targetInputId}Preview`)}" value="${escapeHtml(value)}" />`;
    }

    function updateIconPreview(targetInputId) {
      const input = document.getElementById(targetInputId);
      if (!input) return;
      const previewId = input.dataset.iconPreview;
      const preview = previewId ? document.getElementById(previewId) : null;
      if (!preview) return;
      preview.innerHTML = renderIcon(input.value, input.dataset.iconFallback || "📌", "icon preview");
    }

    function initializeIconInputPreviews() {
      modalForm.querySelectorAll("input[data-icon-preview]").forEach(input => {
        updateIconPreview(input.id);
        input.addEventListener("input", () => updateIconPreview(input.id));
      });
    }

    function standardIconChoicesHtml(targetInputId, fallback, currentValue = "") {
      return STANDARD_ICONS.map(icon => `<button class="icon-choice${String(icon.value).trim() === currentValue ? " is-selected" : ""}" type="button" onclick='selectStandardIcon(${JSON.stringify(targetInputId)}, ${JSON.stringify(icon.value)})' aria-label="${escapeHtml(icon.label)}" title="${escapeHtml(icon.label)}"><span class="icon-choice-visual">${renderIcon(icon.value, fallback, icon.label)}</span></button>`).join("");
    }

    function openIconPickerModal(targetInputId) {
      const input = document.getElementById(targetInputId);
      const fallback = input?.dataset.iconFallback || "📌";
      const currentValue = String(input?.value || "").trim();
      iconPickerBody.innerHTML = `<div class="icon-search-row"><input id="iconSearchInput" type="search" inputmode="search" autocomplete="off" placeholder="Search open-source icons" aria-label="Search open-source icons"></div><div id="iconSearchStatus" class="icon-search-status">Suggestions</div><div id="iconPickerGrid" class="icon-picker-grid">${standardIconChoicesHtml(targetInputId, fallback, currentValue)}</div><details class="icon-custom-details"><summary>Use emoji or image URL</summary><div class="icon-custom-row"><input id="iconPickerCustomInput" value="${escapeHtml(currentValue)}" placeholder="Emoji or image URL" aria-label="Custom icon value"><button class="btn btn-primary" type="button" onclick='applyCustomIcon(${JSON.stringify(targetInputId)})'>Use</button></div></details><a class="icon-source-note" href="https://iconify.design" target="_blank" rel="noreferrer">Open-source icons via Iconify</a>`;
      iconPickerBackdrop.classList.add("show");
      document.getElementById("iconSearchInput")?.addEventListener("input", event => scheduleIconSearch(targetInputId, fallback, event.target.value));
      const customInput = document.getElementById("iconPickerCustomInput");
      customInput?.addEventListener("keydown", event => { if (event.key === "Enter") { event.preventDefault(); applyCustomIcon(targetInputId); } });
    }

    function closeIconPickerModal() {
      iconPickerBackdrop.classList.remove("show");
      iconPickerBody.innerHTML = "";
    }

    function selectStandardIcon(targetInputId, value) {
      const input = document.getElementById(targetInputId);
      if (!input) return;
      input.value = value;
      updateIconPreview(targetInputId);
      closeIconPickerModal();
    }

    function applyCustomIcon(targetInputId) {
      const value = document.getElementById("iconPickerCustomInput")?.value.trim();
      if (!value) return;
      selectStandardIcon(targetInputId, value);
    }

    function scheduleIconSearch(targetInputId, fallback, query) {
      clearTimeout(iconSearchTimer);
      iconSearchTimer = setTimeout(() => searchRemoteIcons(targetInputId, fallback, query), 280);
    }

    async function searchRemoteIcons(targetInputId, fallback, query) {
      const normalized = String(query || "").trim();
      const grid = document.getElementById("iconPickerGrid");
      const status = document.getElementById("iconSearchStatus");
      if (!grid || !status) return;
      if (normalized.length < 2) {
        status.textContent = "Suggestions";
        grid.innerHTML = standardIconChoicesHtml(targetInputId, fallback, String(document.getElementById(targetInputId)?.value || "").trim());
        return;
      }
      status.textContent = "Searching…";
      try {
        const icons = await window.IconifyCatalog.search(normalized);
        if (document.getElementById("iconSearchInput")?.value.trim() !== normalized) return;
        status.textContent = icons.length ? `${icons.length} results` : "No icons found";
        grid.innerHTML = icons.map(icon => `<button class="icon-choice" type="button" onclick='selectStandardIcon(${JSON.stringify(targetInputId)}, ${JSON.stringify(icon.url)})' aria-label="${escapeHtml(icon.name)}" title="${escapeHtml(icon.name)}"><span class="icon-choice-visual">${renderIcon(icon.url, fallback, icon.name)}</span></button>`).join("");
      } catch {
        status.textContent = "Icon search unavailable";
      }
    }

    function toggleContextMenu(menuId, event) {
      event.stopPropagation();
      openContextMenuId = openContextMenuId === menuId ? null : menuId;
      render();
    }

    function closeContextMenu() {
      if (!openContextMenuId) return;
      openContextMenuId = null;
      render();
    }

    async function saveProject(updatedProject) {
      try {
        project = await api(`/api/projects/${projectId}`, { method: "PUT", body: JSON.stringify(updatedProject) });
        cacheProjectState(project);
        window.pmAnimate(render);
        closeModal();
      } catch (error) {
        notify("Could not save changes. Please try again.");
        throw error;
      }
    }

    // --- Render ---

    function renderStep(step, depth = 0) {
      const actions = [
        { label: "Edit", onclick: `event.stopPropagation(); openStepEditor('${step.id}');` },
        { label: "Move", onclick: `event.stopPropagation(); beginMoveStep('${step.id}');` },
        { label: "Delete", onclick: `event.stopPropagation(); deleteStep('${step.id}');`, danger: true }
      ];
      if (depth < MAX_STEP_DEPTH) actions.splice(2, 0, { label: "Add sub-task", onclick: `event.stopPropagation(); openAddSubStepModal('${step.id}');` });
      const menu = buildCardMenu(`step-menu-${step.id}`, actions);
      const moveClass = moveState?.stepId === step.id ? " move-source" : moveState?.targetParentId === step.id ? " move-target" : "";
      const deleteClass = deleteMode && selectedDeleteIds.has(`step:${step.id}`) ? " selected-for-delete" : "";
      const childCount = (step.children || []).length;
      const childrenOpen = childCount && !collapsedStepIds.has(step.id);
      const clickHandler = deleteMode ? `toggleDeleteSelection(event, 'step:${step.id}')` : moveState ? `selectMoveTarget('${step.id}', event)` : childCount ? `toggleStepCollapse('${step.id}', event)` : "";
      const metadata = step.deadline
        ? window.pmMeta.line({ deadline: step.deadline, secondsLeft: step.done ? null : stepTimeLeft(step.deadline) })
        : step.until_deadline
          ? `<div class="project-meta-line"><span class="meta-date">Until project deadline</span></div>`
          : "";
      return `<div class="step-item${moveClass}${deleteClass}${childCount ? " is-collapsible" : ""}${childCount && !childrenOpen ? " is-collapsed" : ""}" data-depth="${depth}" style="--tree-depth:${Math.min(depth, MAX_STEP_DEPTH)}; view-transition-name: s-${String(step.id).replace(/[^a-zA-Z0-9-]/g, "")}" ${childCount ? `aria-expanded="${childrenOpen}"` : ""} ${clickHandler ? `onclick="${clickHandler}"` : ""}>${menu}<div class="step-head">
        <input class="step-check" type="checkbox" ${step.done ? "checked" : ""} onclick="event.stopPropagation()" onchange="toggleStepDone('${step.id}', this.checked)" />
        <div class="step-main ${step.done ? "done-state" : ""}"><div class="step-title-row"><div class="step-title ${step.done ? "done" : ""}">${escapeHtml(normalizeDisplayText(step.title || "Untitled step"))}</div></div>${String(step.description || "").trim() ? `<div class="muted">${renderFormattedText(step.description, "", true)}</div>` : ""}
        </div>
      </div>${metadata ? `<div class="step-sub ${step.done ? "done-state" : ""}">${metadata}</div>` : ""}</div>`;
    }

    function flattenVisibleSteps(steps, depth = 0, rows = []) {
      for (const step of (steps || [])) {
        rows.push({ step, depth });
        if ((step.children || []).length && !collapsedStepIds.has(step.id)) flattenVisibleSteps(step.children, depth + 1, rows);
      }
      return rows;
    }

    function compactCompletedRows(rows) {
      if (!hideCompletedSteps || moveState || deleteMode) return rows.map(row => ({ type: "step", ...row }));
      const compacted = [];
      let completedSequence = [];
      const flushCompleted = () => {
        if (!completedSequence.length) return;
        compacted.push({ type: "completed", rows: completedSequence });
        completedSequence = [];
      };
      for (const row of rows) {
        if (row.step.done) completedSequence.push(row);
        else { flushCompleted(); compacted.push({ type: "step", ...row }); }
      }
      flushCompleted();
      return compacted;
    }

    function renderCompletedSequence(rows) {
      const depth = Math.min(rows[0]?.depth || 0, MAX_STEP_DEPTH);
      return `<button class="completed-sequence" type="button" style="--tree-depth:${depth}" onclick="showCompletedSteps(event)" aria-label="Show completed tasks"><span aria-hidden="true">…</span></button>`;
    }

    function renderStepTree(steps) {
      const s = steps || [];
      if (!s.length && !moveState) return `<div class="empty">No steps yet.</div>`;
      const rows = compactCompletedRows(flattenVisibleSteps(s));
      return `<div class="step-tree">${rows.map(row => row.type === "completed" ? renderCompletedSequence(row.rows) : renderStep(row.step, row.depth)).join("")}</div>`;
    }

    function renderLinks() {
      const l = [...(project.links || [])].sort((a, b) => {
        const aId = getProjectIdFromLink(a);
        const bId = getProjectIdFromLink(b);
        if (!!aId !== !!bId) return aId ? -1 : 1;
        if (!aId && !bId) return 0;
        const aProj = projectCache[aId];
        const bProj = projectCache[bId];
        const aFinished = !!aProj?.finished;
        const bFinished = !!bProj?.finished;
        if (aFinished !== bFinished) return aFinished ? 1 : -1;
        const aTs = aProj?.deadline ? new Date(aProj.deadline).getTime() : Number.POSITIVE_INFINITY;
        const bTs = bProj?.deadline ? new Date(bProj.deadline).getTime() : Number.POSITIVE_INFINITY;
        if (aTs !== bTs) return aTs - bTs;
        return String(aProj?.name || a.title || "").localeCompare(String(bProj?.name || b.title || ""));
      });
      if (!l.length) return `<div class="empty">No links yet.</div>`;
      const currentOrigin = window.location.origin;

      return `<div class="links-grid">${l.map((link, index) => {
        const pid = getProjectIdFromLink(link);

        if (pid) {
          // Project link — render rich card from cache (or loading state)
          const cached = pid in projectCache ? projectCache[pid] : undefined;
          return renderProjectLinkCard(link, index, cached);
        }

        // Regular link
        const rawUrl = String(link.url || "");
        const processedUrl = rawUrl.includes("PROJECTS/")
          ? rawUrl.replace("PROJECTS/", currentOrigin + "/")
          : rawUrl;

        return `<div class="link-card${deleteMode && selectedDeleteIds.has(`link:${link.id}`) ? " selected-for-delete" : ""}" style="view-transition-name: l-${String(link.id).replace(/[^a-zA-Z0-9-]/g, "")}" onclick="${deleteMode ? `toggleDeleteSelection(event, 'link:${link.id}')` : `window.open('${escapeHtml(processedUrl)}')`}">
          ${buildCardMenu(`link-menu-${index}`, [
            { label: "Edit", onclick: `event.stopPropagation(); openEditLinkModal('${link.id}');` },
            { label: "Delete", onclick: `event.stopPropagation(); deleteLink('${link.id}');`, danger: true }
          ])}
          <div class="link-icon">${renderIcon(link.icon, "🔗", link.title || "link icon")}</div>
          <div class="link-main">
            <div class="link-title">${escapeHtml(normalizeDisplayText(link.title || "Untitled link"))}</div>
            <div class="link-subtitle">${escapeHtml(formatLinkDestination(processedUrl))}</div>
          </div>
        </div>`;
      }).join("")}</div>`;
    }

    function render() {
      if (!project) return;
      const hasDoneTasks = hasCompletedSteps(project.steps || []);
      const linksMenuOpen = !!openContextMenuId && (openContextMenuId.startsWith("link-menu-") || openContextMenuId.startsWith("project-link-menu-"));
      const stepsMenuOpen = (!!openContextMenuId && openContextMenuId.startsWith("step-menu-")) || !!moveState;
      document.title = project.name ? `${project.name} · Project View` : "Project View";
      app.hidden = false; loadingState.hidden = true;
      app.className = `layout${deleteMode ? " delete-mode" : ""}`;
      app.innerHTML = `<section class="card hero project-hero"><div class="hero-head"><div class="hero-title-wrap"><div class="hero-icon">${renderIcon(project.icon, "📌", project.name || "project icon")}</div><div class="hero-copy"><h1 class="project-title">${escapeHtml(normalizeDisplayText(project.name || "Untitled Project"))}</h1></div></div><div class="project-hero-actions"><button class="icon-action" type="button" onclick="openProjectEditor()" aria-label="Edit project" title="Edit project"><svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L8 18l-4 1 1-4Z"/></svg></button><button class="icon-action${project.finished ? " is-complete" : ""}" type="button" onclick="toggleFinished()" aria-label="${project.finished ? "Reopen project" : "Mark project finished"}" title="${project.finished ? "Reopen project" : "Mark project finished"}"><svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="m8 12 2.6 2.6L16.5 9"/></svg></button></div></div>${project.description ? `<div class="project-description muted">${renderFormattedText(project.description)}</div>` : ""}${window.pmMeta.line({ deadline: project.deadline, secondsLeft: project.seconds_left, finished: project.finished })}</section>
      <section class="content-section${linksMenuOpen ? " has-open-menu" : ""}"><div class="section-head"><h2 class="section-title">Links</h2></div>${renderLinks()}</section>
      <section class="content-section steps-section${stepsMenuOpen ? " has-open-menu" : ""}${moveState && moveState.targetParentId == null ? " move-target" : ""}" ${moveState ? `onclick="selectMoveTarget(null, event)"` : ""}><div class="section-head"><h2 class="section-title">Tasks</h2>${hasDoneTasks && !moveState && !deleteMode ? `<button class="section-action" type="button" aria-pressed="${hideCompletedSteps}" onclick="toggleCompletedSteps(event)">${hideCompletedSteps ? "Show done" : "Hide done"}</button>` : ""}</div>${renderStepTree(project.steps)}</section>`;
      if (moveState) app.innerHTML += `<div class="move-toolbar"><button class="btn btn-secondary" type="button" onclick="cancelMoveStep()">Cancel</button><button class="btn btn-primary" type="button" onclick="confirmMoveStep('top')">Insert at start</button><button class="btn btn-primary" type="button" onclick="confirmMoveStep('bottom')">Insert at end</button></div>`;

      // Fetch any uncached linked project data and re-render when ready
      if (hasUncachedProjectLinks()) hydrateProjectLinks();
    }

    // --- Link modals ---

    function openProjectEditor() {
      openModal("Edit project", `<div class="form-grid"><div class="field full"><div class="name-icon-row">${buildIconButton("projectIconInput", "📌", project.icon || "📌")}<input name="name" value="${escapeHtml(project.name || "")}" placeholder="Project name" aria-label="Project name" required /></div></div><div class="field full"><label>Deadline</label><input name="deadline" type="datetime-local" value="${project.deadline ? new Date(project.deadline).toISOString().slice(0, 16) : ""}" /></div><div class="field full"><label>Description</label><textarea name="description">${escapeHtml(project.description || "")}</textarea></div></div><div class="modal-actions"><div class="modal-action-group"><button class="btn btn-secondary" type="button" onclick="closeModal()">Cancel</button><button class="btn btn-primary" type="submit">Save</button></div></div><div class="editor-danger"><button class="editor-danger-button" type="button" onclick="deleteProject()">Delete project…</button></div>`, async (formData) => {
        const updated = deepClone(project); updated.name = String(formData.get("name") || "").trim(); updated.icon = String(formData.get("icon") || "").trim() || "📌"; updated.description = String(formData.get("description") || "").trim();
        updated.deadline = parseDateSafe(formData.get("deadline")); addToStandardIcons(updated.icon, updated.name || "Project"); await saveProject(updated);
      });
    }

    function openAddLinkModal() {
      openModal("Add link", `<div class="form-grid"><div class="field full"><div class="name-icon-row">${buildIconButton("newLinkIconInput", "🔗", "")}<input name="title" placeholder="Link title" aria-label="Link title" required /></div></div><div class="field full"><label>URL</label><input name="url" inputmode="url" placeholder="https://example.com" required /></div></div><div class="modal-actions"><div class="modal-action-group"><button class="btn btn-secondary" type="button" onclick="closeModal()">Cancel</button><button class="btn btn-primary" type="submit">Add link</button></div></div>`, async (formData) => {
        const updated = deepClone(project); const newLink = { id: generateId(), title: String(formData.get("title") || "").trim(), url: String(formData.get("url") || "").trim(), icon: String(formData.get("icon") || "").trim() || "🔗" };
        updated.links = updated.links || []; updated.links.push(newLink); addToStandardIcons(newLink.icon, newLink.title || "Link"); await saveProject(updated);
      });
    }

    function openEditLinkModal(linkId) {
      const link = (project.links || []).find(l => l.id === linkId); if (!link) return;
      openModal("Edit link", `<div class="form-grid"><div class="field full"><div class="name-icon-row">${buildIconButton("editLinkIconInput", "🔗", link.icon || "🔗")}<input name="title" value="${escapeHtml(link.title || "")}" placeholder="Link title" aria-label="Link title" required /></div></div><div class="field full"><label>URL</label><input name="url" inputmode="url" value="${escapeHtml(link.url || "")}" required /></div></div><div class="modal-actions"><div class="modal-action-group"><button class="btn btn-secondary" type="button" onclick="closeModal()">Cancel</button><button class="btn btn-primary" type="submit">Save</button></div></div>`, async (formData) => {
        const updated = deepClone(project);
        const target = (updated.links || []).find(l => l.id === linkId); if (!target) return;
        target.title = String(formData.get("title") || "").trim(); target.url = String(formData.get("url") || "").trim(); target.icon = String(formData.get("icon") || "").trim() || "🔗";
        await saveProject(updated);
      });
    }

    // --- Project link picker ---

    async function openAddProjectLinkModal() {
      openModal("Link a project", `<div style="text-align:center;padding:28px;color:var(--muted)">Loading projects…</div>`, async () => { });

      let all;
      try {
        all = await api("/api/projects");
      } catch {
        modalForm.innerHTML = `<div style="color:var(--danger);padding:16px 4px;">Failed to load projects.</div><div class="inline-actions" style="margin-top:12px;justify-content:flex-end;"><button class="btn btn-secondary" type="button" onclick="closeModal()">Close</button></div>`;
        return;
      }

      // Exclude this project and ones already linked
      const alreadyLinked = new Set(
        (project.links || []).map(l => getProjectIdFromLink(l)).filter(Boolean)
      );
      _pickerProjects = all.filter(p => p.id !== projectId && !alreadyLinked.has(p.id));

      if (!_pickerProjects.length) {
        modalForm.innerHTML = `<div class="empty">No other projects available to link.</div><div class="inline-actions" style="margin-top:16px;justify-content:flex-end;padding-bottom:8px;"><button class="btn btn-secondary" type="button" onclick="closeModal()">Close</button></div>`;
        modalForm.onsubmit = e => e.preventDefault();
        return;
      }

      modalForm.innerHTML = `
        <div class="proj-picker-grid">
          ${_pickerProjects.map((p, i) => `
            <button class="proj-picker-item" type="button" onclick="addProjectLink(${i})">
              <div class="proj-picker-icon">${renderIcon(p.icon, "📌", p.name)}</div>
              <div class="proj-picker-info">
                <div class="proj-picker-name">${escapeHtml(p.name || "Untitled project")}</div>
                <div class="proj-picker-meta">${p.deadline ? escapeHtml(formatDeadline(p.deadline)) : "No deadline"} · ${p.finished ? "Finished" : "Open"}</div>
              </div>
            </button>
          `).join("")}
        </div>
        <div class="inline-actions" style="margin-top:16px;justify-content:flex-end;padding-bottom:8px;">
          <button class="btn btn-secondary" type="button" onclick="closeModal()">Cancel</button>
        </div>`;
      modalForm.onsubmit = e => e.preventDefault();
    }

    async function addProjectLink(pickerIndex) {
      const p = _pickerProjects[pickerIndex];
      if (!p) return;
      const updated = deepClone(project);
      updated.links = updated.links || [];
      updated.links.push({
        id: generateId(),
        title: p.name || "Untitled project",
        url: `PROJECTS/project?id=${p.id}`,
        icon: p.icon || "📌"
      });
      // Pre-warm the cache with what we already know
      projectCache[p.id] = p;
      await saveProject(updated);
    }

    // --- Step modals ---

    function stepFormHtml(step = null, submitLabel = "Save") {
      return `<div class="form-grid"><div class="field full"><label>Title</label><input name="title" value="${escapeHtml(step?.title || "")}" required /></div><div class="field full"><label>Description</label><textarea name="description">${escapeHtml(step?.description || "")}</textarea></div><div class="field full"><label>Step deadline</label><input name="deadline" type="datetime-local" value="${step?.deadline ? new Date(step.deadline).toISOString().slice(0, 16) : ""}" /></div></div><div class="modal-actions"><div class="modal-action-group"><button class="btn btn-secondary" type="button" onclick="closeModal()">Cancel</button><button class="btn btn-primary" type="submit">${submitLabel}</button></div></div>`;
    }

    function openAddStepModal() { openModal("New task", stepFormHtml(null, "Add task"), async (formData) => { const updated = deepClone(project); updated.steps = updated.steps || []; updated.steps.push({ id: generateId(), title: String(formData.get("title") || "").trim(), description: String(formData.get("description") || "").trim(), done: false, until_deadline: false, deadline: parseDateSafe(formData.get("deadline")), children: [] }); await saveProject(updated); }); }
    function openAddSubStepModal(parentId) {
      const parentDepth = getStepDepth(project.steps || [], parentId);
      if (parentDepth == null || parentDepth >= MAX_STEP_DEPTH) { notify("Tasks can be nested up to three levels."); return; }
      openModal("New sub-task", stepFormHtml(null, "Add sub-task"), async (formData) => {
        const updated = deepClone(project);
        updated.steps = updateStepRecursive(updated.steps || [], parentId, step => ({ ...step, children: [...(step.children || []), { id: generateId(), title: String(formData.get("title") || "").trim(), description: String(formData.get("description") || "").trim(), done: false, until_deadline: false, deadline: parseDateSafe(formData.get("deadline")), children: [] }] }));
        await saveProject(updated);
      });
    }
    function openStepEditor(stepId) { const found = findStepAndParent(project.steps || [], stepId); if (!found) return; openModal("Edit step", stepFormHtml(found.step, "Save"), async (formData) => { const updated = deepClone(project); updated.steps = updateStepRecursive(updated.steps || [], stepId, step => ({ ...step, title: String(formData.get("title") || "").trim(), description: String(formData.get("description") || "").trim(), deadline: parseDateSafe(formData.get("deadline")) })); await saveProject(updated); }); }

    async function toggleStepDone(stepId, done) { const updated = deepClone(project); updated.steps = updateStepRecursive(updated.steps || [], stepId, step => ({ ...step, done })); await saveProject(updated); }
    async function deleteStep(stepId) { if (!(await confirmSheet({ title: "Delete Task?", message: "Sub-tasks will be deleted too.", confirmLabel: "Delete", destructive: true }))) return; const updated = deepClone(project); updated.steps = removeStepRecursive(updated.steps || [], stepId); await saveProject(updated); }
    async function toggleFinished() { project = await api(`/api/projects/${projectId}/finish`, { method: "PATCH", body: JSON.stringify({ finished: !project.finished }) }); cacheProjectState(project); window.pmAnimate(render); }
    async function deleteProject() { if (!(await confirmSheet({ title: "Delete Project?", message: "This permanently deletes the project, its links, and all tasks.", confirmLabel: "Delete", destructive: true }))) return; await api(`/api/projects/${projectId}`, { method: "DELETE" }); try { localStorage.removeItem(`pm_project_${projectId}`); const summaries = JSON.parse(localStorage.getItem("pm_project_summaries") || "null"); if (Array.isArray(summaries)) localStorage.setItem("pm_project_summaries", JSON.stringify(summaries.filter(summary => summary.id !== projectId))); } catch { } location.href = "/"; }
    async function loadProject() {
      if (!projectId) { loadingState.textContent = "No project selected."; return; }
      try {
        const cached = JSON.parse(localStorage.getItem(`pm_project_${projectId}`) || "null");
        if (cached?.id === projectId) { project = cached; render(); }
      } catch { }
      try {
        project = await api(`/api/projects/${projectId}`);
        try { localStorage.setItem(`pm_project_${projectId}`, JSON.stringify(project)); } catch { }
        render();
      } catch (e) {
        if (!project) loadingState.textContent = "Could not load this project.";
        else notify("Showing the most recently loaded version.");
      }
    }

    applyTheme(document.documentElement.dataset.theme || "dark");
    matchMedia("(prefers-color-scheme: light)").addEventListener("change", event => {
      if (!localStorage.getItem(THEME_STORAGE_KEY)) applyTheme(event.matches ? "light" : "dark");
    });
    closeModalBtn.addEventListener("click", closeModal);
    closeIconPickerBtn.addEventListener("click", closeIconPickerModal);
    modalBackdrop.addEventListener("click", (e) => { if (e.target === modalBackdrop) closeModal(); });
    iconPickerBackdrop.addEventListener("click", (e) => { if (e.target === iconPickerBackdrop) closeIconPickerModal(); });
    settingsBackdrop?.addEventListener("click", (e) => { if (e.target === settingsBackdrop) closeSettingsModal(); });
    document.addEventListener("click", (e) => {
      if (openContextMenuId && !e.target.closest(".card-menu-wrap")) closeContextMenu();
      if (!e.target.closest(".floating-actions")) closeFloatingActions();
    });
    document.addEventListener("keydown", (e) => {
      if (e.key !== "Escape") return;
      if (settingsBackdrop?.classList.contains("show")) closeSettingsModal();
      else if (iconPickerBackdrop.classList.contains("show")) closeIconPickerModal();
      else closeModal();
    });

    window.openSettingsModal = openSettingsModal;
    window.goBack = goBack;
    window.closeSettingsModal = closeSettingsModal;
    window.toggleTheme = toggleTheme;
    window.openIconPickerModal = openIconPickerModal;
    window.closeIconPickerModal = closeIconPickerModal;
    window.selectStandardIcon = selectStandardIcon;
    window.applyCustomIcon = applyCustomIcon;
    window.toggleContextMenu = toggleContextMenu;
    window.openProjectEditor = openProjectEditor;
    window.openAddLinkModal = openAddLinkModal;
    window.openEditLinkModal = openEditLinkModal;
    window.deleteLink = async (linkId) => { if (await confirmSheet({ title: "Delete Link?", confirmLabel: "Delete", destructive: true })) { const u = deepClone(project); u.links = (u.links || []).filter(l => l.id !== linkId); saveProject(u); } };
    window.openAddProjectLinkModal = openAddProjectLinkModal;
    window.addProjectLink = addProjectLink;
    window.openAddStepModal = openAddStepModal;
    window.openAddSubStepModal = openAddSubStepModal;
    window.toggleStepCollapse = toggleStepCollapse;
    window.toggleCompletedSteps = toggleCompletedSteps;
    window.showCompletedSteps = showCompletedSteps;
    window.openStepEditor = openStepEditor;
    window.toggleStepDone = toggleStepDone;
    window.deleteStep = deleteStep;
    window.beginMoveStep = beginMoveStep;
    window.selectMoveTarget = selectMoveTarget;
    window.cancelMoveStep = cancelMoveStep;
    window.confirmMoveStep = confirmMoveStep;
    window.toggleFloatingActions = toggleFloatingActions;
    window.openAddLinkFromMenu = openAddLinkFromMenu;
    window.openAddProjectLinkFromMenu = openAddProjectLinkFromMenu;
    window.openAddStepFromMenu = openAddStepFromMenu;
    window.enterDeleteMode = enterDeleteMode;
    window.cancelDeleteMode = cancelDeleteMode;
    window.confirmDeleteSelected = confirmDeleteSelected;
    window.toggleDeleteSelection = toggleDeleteSelection;
    window.toggleFinished = toggleFinished;
    window.deleteProject = deleteProject;
    window.closeModal = closeModal;

    loadProject();
  </script>
</body>

</html>
