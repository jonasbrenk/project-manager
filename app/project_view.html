<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <link rel="icon" type="image/png" sizes="192x192" href="/static/icon-192.png?v=4">
  <link rel="apple-touch-icon" sizes="180x180" href="/static/apple-touch-icon.png?v=4">
  <link rel="apple-touch-icon-precomposed" sizes="180x180" href="/static/apple-touch-icon.png?v=4">
  <link rel="manifest" href="/site.webmanifest?v=1">
  <script src="/static/iconify-catalog.js?v=1" defer></script>
  <meta name="theme-color" content="#0b1020">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Projects">
  <title>Project View</title>
  <script>
    (() => {
      const saved = localStorage.getItem("pm_theme_mode");
      const theme = saved === "light" || saved === "dark"
        ? saved
        : (matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark");
      document.documentElement.dataset.theme = theme;
      document.documentElement.style.colorScheme = theme;
      document.querySelector('meta[name="theme-color"]')?.setAttribute("content", theme === "light" ? "#f2f2f7" : "#0b1020");
    })();
  </script>

  <style>
    :root {
      --bg: #0b1020;
      --card: rgba(19, 26, 47, .92);
      --card2: rgba(28, 38, 70, .8);
      --text: #eef2ff;
      --muted: #a8b3cf;
      --line: rgba(255, 255, 255, .08);
      --accent: #4f7cff;
      --accentSoft: rgba(79, 124, 255, .15);
      --danger: #ff6a6a;
      --dangerSoft: rgba(255, 106, 106, .12);
      --dangerSoftAlt: rgba(255, 106, 106, .06);
      --dangerBorder: rgba(255, 106, 106, .28);
      --dangerText: #ffd9d9;
      --successSoft: rgba(88, 196, 143, .12);
      --successBorder: rgba(88, 196, 143, .28);
      --successText: #d9ffea;
      --shadow: 0 18px 50px rgba(0, 0, 0, .28);
      --radius: 22px;
      --bgTop: #172344;
      --bgBottom: #0b1020;
      --surfaceSoft: rgba(255, 255, 255, .05);
      --panelBg: #0f172d;
      --toggleOff: rgba(255, 255, 255, .16);
      --doneFade: .56
    }

    html[data-theme="light"] {
      --bg: #edf3ff;
      --card: rgba(255, 255, 255, .88);
      --card2: rgba(242, 247, 255, .92);
      --text: #17233c;
      --muted: #5d6a84;
      --line: rgba(23, 35, 60, .12);
      --accent: #2f6df6;
      --accentSoft: rgba(47, 109, 246, .12);
      --danger: #d74d4d;
      --dangerSoft: rgba(215, 77, 77, .12);
      --dangerSoftAlt: rgba(215, 77, 77, .08);
      --dangerBorder: rgba(215, 77, 77, .28);
      --dangerText: #b43333;
      --successSoft: rgba(88, 196, 143, .14);
      --successBorder: rgba(88, 196, 143, .32);
      --successText: #217a52;
      --shadow: 0 18px 45px rgba(63, 88, 138, .14);
      --bgTop: #f9fbff;
      --bgBottom: #dfe9ff;
      --surfaceSoft: rgba(20, 34, 59, .04);
      --panelBg: #ffffff;
      --toggleOff: rgba(21, 34, 59, .16);
      --doneFade: .5
    }

    * {
      box-sizing: border-box
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: radial-gradient(circle at top, var(--bgTop) 0%, var(--bgBottom) 58%);
      color: var(--text);
      font-family: Inter, system-ui, sans-serif
    }

    button,
    input,
    textarea {
      font: inherit
    }

    .page {
      width: min(1120px, calc(100% - 24px));
      margin: 0 auto;
      padding: 24px 0 90px
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      margin-bottom: 16px;
      flex-wrap: wrap
    }

    .settings-trigger {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      padding: 0
    }

    .settings-trigger svg {
      width: 16px;
      height: 16px;
      display: block;
      flex-shrink: 0
    }

    .back-link {
      text-decoration: none;
      color: var(--text);
      background: var(--surfaceSoft);
      border: 1px solid var(--line);
      padding: 10px 14px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      gap: 8px
    }

    .layout {
      display: grid;
      gap: 16px
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      padding: 18px;
      position: relative;
      z-index: 0
    }

    .card.has-open-menu {
      z-index: 40
    }

    .hero {
      display: grid;
      gap: 18px
    }

    .hero-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      flex-wrap: wrap
    }

    .hero-title-wrap {
      display: flex;
      gap: 14px;
      align-items: center;
      min-width: 0
    }

    .hero-copy {
      min-width: 0;
      flex: 1 1 auto;
      display: grid;
      gap: 8px
    }

    .hero-icon {
      width: 64px;
      height: 64px;
      border-radius: 20px;
      display: grid;
      place-items: center;
      background: var(--accentSoft);
      border: 1px solid rgba(79, 124, 255, .28);
      font-size: 1.7rem;
      flex-shrink: 0;
      overflow: hidden
    }

    h1,
    h2,
    h3,
    p {
      margin: 0
    }

    .project-title {
      font-size: clamp(1.5rem, 3vw, 2.4rem);
      line-height: 1.1;
      margin-bottom: 8px;
      word-break: break-word
    }

    .muted {
      color: var(--muted);
      line-height: 1.5
    }

    .formatted-text {
      display: grid;
      gap: 8px;
      min-width: 0
    }

    .formatted-text.compact {
      gap: 6px
    }

    .formatted-paragraph {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      overflow-wrap: anywhere
    }

    .formatted-list {
      margin: 0;
      padding-left: 1.2rem;
      display: grid;
      gap: 4px
    }

    .formatted-list li {
      white-space: pre-wrap;
      word-break: break-word;
      overflow-wrap: anywhere
    }

    .indent-1 {
      margin-left: 1.4rem
    }

    .indent-2 {
      margin-left: 2.8rem
    }

    .indent-3 {
      margin-left: 4.2rem
    }

    .meta-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px
    }

    .meta-box {
      padding: 12px 16px;
      border-radius: 16px;
      background: var(--card2);
      border: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      justify-content: center
    }

    .meta-label {
      color: var(--muted);
      font-size: .65rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 4px
    }

    .meta-value {
      font-size: .95rem;
      font-weight: 700;
      line-height: 1.3;
      word-break: break-word
    }

    .meta-value-danger {
      color: var(--dangerText)
    }

    .meta-value-success {
      color: var(--successText)
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap
    }

    .section-head-actions { display: flex; align-items: center; gap: 8px }

    .section-title {
      font-size: 1.08rem;
      font-weight: 700
    }

    .section-toggle {
      width: 32px;
      height: 32px;
      display: grid;
      place-items: center;
      border: 0;
      border-radius: 50%;
      background: var(--surfaceSoft);
      color: var(--muted);
      cursor: pointer;
      transition: transform .18s ease, background-color .18s ease
    }

    .content-section.is-collapsed .section-toggle { transform: rotate(-90deg) }
    .content-section.is-collapsed .section-body { display: none }
    html[data-theme="dark"] .section-toggle {
      background: rgba(91, 117, 177, .3);
      border: 1px solid rgba(183, 205, 255, .2);
      color: #dce7ff;
      box-shadow: 0 1px 3px rgba(0, 0, 0, .22)
    }

    .btn {
      border: 0;
      border-radius: 999px;
      padding: 11px 15px;
      cursor: pointer;
      font-weight: 600;
      white-space: nowrap
    }

    .btn-primary {
      background: var(--accent);
      color: white
    }

    .btn-secondary {
      background: var(--surfaceSoft);
      color: var(--text);
      border: 1px solid var(--line)
    }

    .btn-danger {
      background: var(--dangerSoft);
      color: var(--dangerText);
      border: 1px solid var(--dangerBorder)
    }

    .btn-ok {
      background: var(--successSoft);
      color: var(--successText);
      border: 1px solid var(--successBorder)
    }

    .inline-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap
    }

    .links-grid,
    .step-tree {
      display: grid;
      gap: 12px
    }

    /* Standard link card */
    .link-card {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 14px;
      align-items: center;
      padding: 14px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, .03);
      position: relative
    }

    .link-icon {
      width: 50px;
      height: 50px;
      display: grid;
      place-items: center;
      border-radius: 16px;
      background: var(--accentSoft);
      border: 1px solid rgba(79, 124, 255, .25);
      font-size: 1.35rem;
      overflow: hidden
    }

    .file-type-icon {
      width: 100%;
      height: 100%;
      display: block
    }

    .file-image-preview { width: 100%; height: 100%; object-fit: cover; display: block }

    .button-spinner {
      width: 15px;
      height: 15px;
      border: 2px solid currentColor;
      border-right-color: transparent;
      border-radius: 50%;
      display: inline-block;
      animation: button-spin .7s linear infinite
    }

    @keyframes button-spin { to { transform: rotate(360deg) } }

    .link-main {
      min-width: 0;
      overflow: hidden
    }

    .link-title {
      font-weight: 700;
      margin-bottom: 6px
    }

    .link-url {
      color: var(--muted);
      text-decoration: none;
      word-break: break-all;
      line-height: 1.4;
      text-wrap: nowrap;
      text-overflow: ellipsis;
    }

    /* Project link card */
    .link-card-project {
      align-items: flex-start;
      background: rgba(79, 124, 255, .05);
      border-color: rgba(79, 124, 255, .18);
      padding: 16px
    }

    .proj-link-icon {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      background: var(--accentSoft);
      border: 1px solid rgba(79, 124, 255, .3);
      font-size: 1.5rem;
      overflow: hidden;
      flex-shrink: 0
    }

    .proj-link-body {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 0;
      padding-right: 42px
    }

    .proj-link-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
      flex-wrap: wrap
    }

    .proj-link-name {
      font-weight: 700;
      font-size: 1rem;
      line-height: 1.2
    }

    .proj-link-desc {
      color: var(--muted);
      font-size: .88rem;
      line-height: 1.4;
      margin-bottom: 6px
    }

    .proj-link-meta {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
      margin-top: 4px;
      justify-self: stretch
    }

    .proj-link-meta .pill.warning,
    .meta-grid .meta-box.warning {
      border-color: color-mix(in srgb, var(--accent) 45%, var(--line));
      box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--accent) 20%, transparent);
    }

    .proj-link-meta .pill.danger {
      color: var(--dangerText);
      border-color: var(--dangerBorder);
      background: var(--dangerSoft);
    }

    .proj-link-loading {
      opacity: .6
    }

    .link-card-project.is-finished {
      opacity: .68
    }

    .link-card-project.is-finished .card-menu-trigger {
      opacity: .58
    }

    .pill.done {
      color: #58c48f;
      border-color: rgba(88, 196, 143, .3);
      background: rgba(88, 196, 143, .12)
    }

    /* Project link picker modal */
    .proj-picker-grid {
      display: grid;
      gap: 8px;
      max-height: 52vh;
      overflow-y: auto;
      padding-right: 2px
    }

    .proj-picker-item {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255, 255, 255, .03);
      cursor: pointer;
      color: var(--text);
      text-align: left;
      transition: border-color .15s, background .15s;
      width: 100%
    }

    .proj-picker-item:hover {
      border-color: rgba(79, 124, 255, .4);
      background: rgba(79, 124, 255, .08)
    }

    .proj-picker-icon {
      width: 44px;
      height: 44px;
      border-radius: 13px;
      display: grid;
      place-items: center;
      background: var(--accentSoft);
      border: 1px solid rgba(79, 124, 255, .25);
      font-size: 1.25rem;
      overflow: hidden;
      flex-shrink: 0
    }

    .proj-picker-info {
      min-width: 0
    }

    .proj-picker-name {
      font-weight: 700;
      font-size: .95rem;
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .proj-picker-meta {
      color: var(--muted);
      font-size: .82rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .proj-picker-arrow {
      color: var(--muted);
      font-size: 1.1rem;
      flex-shrink: 0
    }

    .card-menu-wrap {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 3
    }

    .card-menu-wrap.open {
      z-index: 120
    }

    .card-menu-trigger {
      width: 34px;
      height: 34px;
      position: relative;
      z-index: 1;
      font-family: "SF Pro Display", "Segoe UI", Inter, system-ui, sans-serif;
      font-size: 1.02rem;
      font-weight: 800;
      letter-spacing: .14em;
      line-height: 1
    }

    .card-menu {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      min-width: 176px;
      padding: 10px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: var(--panelBg);
      box-shadow: var(--shadow);
      display: none;
      gap: 8px;
      z-index: 121
    }

    .card-menu.show {
      display: grid
    }

    .card-menu-item {
      width: 100%;
      border: 1px solid transparent;
      border-radius: 12px;
      background: var(--surfaceSoft);
      color: var(--text);
      padding: 12px 14px;
      text-align: left;
      cursor: pointer;
      font-family: "SF Pro Text", "Segoe UI", Inter, system-ui, sans-serif;
      font-size: .89rem;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase
    }

    .card-menu-item:hover {
      border-color: rgba(79, 124, 255, .4);
      background: rgba(79, 124, 255, .1)
    }

    .card-menu-item.danger {
      color: var(--dangerText);
      background: var(--dangerSoft);
      border-color: var(--dangerBorder)
    }

    .icon-btn {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, .05);
      color: var(--text);
      width: 38px;
      height: 38px;
      border-radius: 999px;
      cursor: pointer;
      display: grid;
      place-items: center;
      font-weight: 700;
      flex-shrink: 0;
      text-decoration: none;
      font-size: .95rem
    }

    .icon-btn.danger {
      color: var(--dangerText);
      border-color: var(--dangerBorder);
      background: var(--dangerSoft)
    }

    .step-item {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, .03);
      border-radius: 18px;
      padding: 14px;
      position: relative;
      display: grid;
      gap: 10px
    }

    .step-head {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 12px;
      align-items: flex-start;
      padding-right: 42px
    }

    .step-check {
      margin-top: 4px;
      width: 19px;
      height: 19px;
      accent-color: var(--accent);
      cursor: pointer
    }

    .project-hero-actions .icon-action {
      transition: color .18s ease, background-color .18s ease, transform .18s ease
    }

    .step-title {
      font-weight: 700;
      margin-bottom: 6px;
      transition: color .18s ease, opacity .18s ease
    }

    .step-title.done {
      text-decoration: line-through;
      color: var(--muted)
    }

    .step-main.done-state,
    .step-sub.done-state {
      opacity: var(--doneFade)
    }

    .step-item:has(.step-check:checked) .card-menu-trigger {
      opacity: var(--doneFade)
    }

    .step-main {
      min-width: 0;
      width: 100%;
      transition: opacity .18s ease
    }

    .step-sub {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      color: var(--muted);
      font-size: .9rem;
      width: 100%;
      transition: opacity .18s ease
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 7px 10px;
      border: 1px solid var(--line);
      background: var(--surfaceSoft);
      width: 100%;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .children {
      margin-top: 4px;
      margin-left: 18px;
      display: grid;
      gap: 10px;
      border-left: 2px solid rgba(255, 255, 255, .07);
      padding-left: 12px;
      min-width: 0;
      box-sizing: border-box
    }

    .children>.step-item {
      width: 100%;
      max-width: 100%
    }

    .empty {
      padding: 24px;
      border: 1px dashed var(--line);
      border-radius: 18px;
      text-align: center;
      color: var(--muted)
    }

    .step-item.move-target {
      border-color: color-mix(in srgb, var(--successText) 42%, var(--line));
      background: color-mix(in srgb, var(--successSoft) 62%, var(--card));
      box-shadow: 0 0 0 2px color-mix(in srgb, var(--successText) 20%, transparent)
    }

    .step-item.move-source {
      border-color: color-mix(in srgb, var(--accent) 52%, var(--line));
      background: color-mix(in srgb, var(--accentSoft) 48%, var(--card));
      box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 26%, transparent)
    }

    .steps-section.move-target {
      border-color: color-mix(in srgb, var(--successText) 42%, var(--line));
      background: color-mix(in srgb, var(--successSoft) 35%, var(--card));
      box-shadow: 0 0 0 2px color-mix(in srgb, var(--successText) 20%, transparent)
    }

    .move-toolbar {
      position: fixed;
      right: 18px;
      left: 18px;
      bottom: calc(18px + env(safe-area-inset-bottom, 0px));
      z-index: 135;

      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: nowrap;

      padding: 10px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: var(--panelBg);
      box-shadow: var(--shadow);
      box-sizing: border-box;

      max-width: 100%;
      overflow: hidden;
    }

    .move-toolbar .btn {
      min-height: 34px;
      padding: 7px 10px;
      border-radius: 12px;
      box-sizing: border-box;

      flex: 1 1 0;
      min-width: 0;
      white-space: nowrap;
      font-size: 14px;
    }

    .link-card.selected-for-delete,
    .step-item.selected-for-delete {
      border-color: var(--dangerBorder);
      background: color-mix(in srgb, var(--dangerSoft) 70%, var(--card));
      box-shadow: 0 0 0 2px color-mix(in srgb, var(--danger) 24%, transparent)
    }

    .delete-mode .step-check {
      pointer-events: none
    }

    .floating-actions {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 110
    }

    .floating-actions.hidden {
      opacity: 0;
      pointer-events: none
    }

    .floating-actions-menu {
      position: absolute;
      right: 0;
      bottom: calc(100% + 10px);
      min-width: 196px;
      padding: 10px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: var(--panelBg);
      box-shadow: var(--shadow);
      display: none;
      gap: 8px
    }

    .floating-actions-menu.show {
      display: grid
    }

    .menu-item {
      width: 100%;
      border: 1px solid transparent;
      border-radius: 12px;
      background: var(--surfaceSoft);
      color: var(--text);
      padding: 12px 14px;
      text-align: left;
      cursor: pointer;
      font-family: "SF Pro Text", "Segoe UI", Inter, system-ui, sans-serif;
      font-size: .9rem;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase
    }

    .menu-item:hover {
      border-color: rgba(79, 124, 255, .4);
      background: rgba(79, 124, 255, .1)
    }

    .menu-item.danger {
      color: var(--danger)
    }

    .floating-trigger {
      width: 56px;
      height: 56px;
      border-radius: 999px;
      box-shadow: var(--shadow);
      background: var(--panelBg);
      color: var(--text);
      border: 1px solid var(--line);

<body>
  <div class="app-scroll" id="appScroll">
  <main class="page">

  <script>
    const DEFAULT_STANDARD_ICONS = [
      { label: "Folder", value: "https://api.iconify.design/lucide/folder.svg", removable: false },
      { label: "Document", value: "https://api.iconify.design/lucide/file-text.svg", removable: false },
      { label: "Education", value: "https://api.iconify.design/lucide/graduation-cap.svg", removable: false },
      { label: "Launch", value: "https://api.iconify.design/lucide/rocket.svg", removable: false },
      { label: "Code", value: "https://api.iconify.design/lucide/code-2.svg", removable: false },
      { label: "Analytics", value: "https://api.iconify.design/lucide/chart-no-axes-column-increasing.svg", removable: false },
      { label: "Link", value: "https://api.iconify.design/lucide/link.svg", removable: false },
      { label: "Design", value: "https://api.iconify.design/lucide/palette.svg", removable: false },
      { label: "Calendar", value: "https://api.iconify.design/lucide/calendar-days.svg", removable: false },
      { label: "Goal", value: "https://api.iconify.design/lucide/crosshair.svg", removable: false }
    ];
    const LEGACY_STANDARD_ICON_VALUES = new Set(["1f4c1", "1f4c4", "1f393", "1f680", "1f4bb", "1f4ca", "1f517", "1f3a8", "1f4c5", "1f3af"].map(code => `https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/${code}.png`));
    const STANDARD_ICONS_STORAGE_KEY = "project_manager_standard_icons";
    const DEFAULT_PROJECT_ICON = "/static/icon-placeholder.svg";
    const THEME_STORAGE_KEY = "pm_theme_mode";
    let STANDARD_ICONS = loadStandardIcons();
    const projectId = new URLSearchParams(location.search).get("id");
    const app = document.getElementById("app");
    const loadingState = document.getElementById("loadingState");
    const modalBackdrop = document.getElementById("modalBackdrop");
    const modalTitle = document.getElementById("modalTitle");
    const modalForm = document.getElementById("modalForm");
    const closeModalBtn = document.getElementById("closeModalBtn");
    const iconPickerBackdrop = document.getElementById("iconPickerBackdrop");
    const iconPickerBody = document.getElementById("iconPickerBody");
    const closeIconPickerBtn = document.getElementById("closeIconPickerBtn");
    const settingsBackdrop = document.getElementById("settingsBackdrop");
    const themeSwitch = document.getElementById("themeSwitch");
    const floatingActions = document.getElementById("floatingActions");
    const floatingActionsMenu = document.getElementById("floatingActionsMenu");
    const managementActions = document.getElementById("managementActions");
    const managementActionsMenu = document.getElementById("managementActionsMenu");
    const deleteToolbar = document.getElementById("deleteToolbar");
    const deleteCount = document.getElementById("deleteCount");
    let project = null;
    let openContextMenuId = null;
    let moveState = null;
    let deleteMode = false;
    let selectedDeleteIds = new Set();
    const MAX_STEP_DEPTH = 2;
    const collapsedStepIds = new Set();
    const collapsedSections = new Set(JSON.parse(localStorage.getItem("pm_collapsed_sections") || "[]"));
    let hideCompletedSteps = localStorage.getItem("pm_hide_completed_steps") === "1";
    let iconSearchTimer = null;
    let toastTimer = null;

    const SWIPE_ICON_EDIT = `<svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L8 18l-4 1 1-4Z"/></svg>`;
    const SWIPE_ICON_ADD = `<svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>`;
    const SWIPE_ICON_SHARE = `<svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 16V4M8 8l4-4 4 4M5 14v5h14v-5"/></svg>`;
    const SWIPE_ICON_MOVE = `<svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v18M3 12h18M12 3 9 6M12 3l3 3M12 21l-3-3M12 21l3-3M3 12l3-3M3 12l3 3M21 12l-3-3M21 12l-3 3"/></svg>`;
    const SWIPE_ICON_DELETE = `<svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16M10 11v6M14 11v6M6 7l1 13h10l1-13M9 7V4h6v3"/></svg>`;
    window.pmSwipeDisabled = () => deleteMode || !!moveState;

    function swipeActionsHtml(actions) {
      return `<div class="swipe-actions${actions.length >= 4 ? " swipe-actions-grid" : ""}">${actions.map(action => `<button class="swipe-btn ${action.className}" type="button" aria-label="${escapeHtml(action.label)}" title="${escapeHtml(action.label)}" onclick="event.stopPropagation(); window.pmSwipeClose?.(); ${action.onclick}">${action.icon}<span>${escapeHtml(action.label)}</span></button>`).join("")}</div>`;
    }

    function editDeleteSwipeActions(editCall, deleteCall) {
      return swipeActionsHtml([
        { label: "Edit", className: "swipe-edit", icon: SWIPE_ICON_EDIT, onclick: editCall },
        { label: "Delete", className: "swipe-delete", icon: SWIPE_ICON_DELETE, onclick: deleteCall }
      ]);
    }

    // Cache for linked project data: id -> project object (or null on error)
    const projectCache = {};
    // Temp storage for project picker modal
    let _pickerProjects = [];

    function generateId() {
      if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID();
      return Math.random().toString(36).slice(2) + Date.now().toString(36);
    }

    function loadStandardIcons() { try { const saved = JSON.parse(localStorage.getItem(STANDARD_ICONS_STORAGE_KEY) || "null"); if (Array.isArray(saved) && saved.length) return [...DEFAULT_STANDARD_ICONS, ...saved.filter(icon => !LEGACY_STANDARD_ICON_VALUES.has(String(icon?.value || "").trim()) && !DEFAULT_STANDARD_ICONS.some(defaultIcon => defaultIcon.value === icon?.value))]; } catch { } return [...DEFAULT_STANDARD_ICONS]; }
    function saveStandardIcons() { localStorage.setItem(STANDARD_ICONS_STORAGE_KEY, JSON.stringify(STANDARD_ICONS)); }
    function addToStandardIcons(iconValue, label = "Custom") { const value = String(iconValue || "").trim(); if (!value) return; if (STANDARD_ICONS.some(icon => String(icon.value).trim() === value)) return; STANDARD_ICONS.unshift({ label: String(label || "Custom").trim() || "Custom", value, removable: true }); saveStandardIcons(); }

      if (!confirmed) return;
      const updated = deepClone(project);
      const linkIds = [...selectedDeleteIds].filter(key => key.startsWith("link:")).map(key => key.slice(5));
      const stepIds = [...selectedDeleteIds].filter(key => key.startsWith("step:")).map(key => key.slice(5));
      if (linkIds.length) updated.links = (updated.links || []).filter(link => !linkIds.includes(link.id));
      for (const stepId of stepIds) updated.steps = removeStepRecursive(updated.steps || [], stepId);
      deleteMode = false;
      selectedDeleteIds.clear();
      updateDeleteToolbar();
      await saveProject(updated);
    }

    // Icon button + hidden input, meant to sit inline at the left of a name row
    function buildIconButton(targetInputId, fallback = DEFAULT_PROJECT_ICON, value = "") {
      return `<button class="icon-picker-button" type="button" onclick='openIconPickerModal(${JSON.stringify(targetInputId)})' aria-label="Choose icon"><span class="icon-picker-preview" id="${escapeHtml(`${targetInputId}Preview`)}">${renderIcon(value, fallback, "icon preview")}</span><span class="icon-picker-edit" aria-hidden="true">＋</span></button><input type="hidden" id="${escapeHtml(targetInputId)}" name="icon" data-icon-fallback="${escapeHtml(fallback)}" data-icon-preview="${escapeHtml(`${targetInputId}Preview`)}" value="${escapeHtml(value)}" />`;
    }

    function updateIconPreview(targetInputId) {
      const input = document.getElementById(targetInputId);
      if (!input) return;
      const previewId = input.dataset.iconPreview;
      const preview = previewId ? document.getElementById(previewId) : null;
      if (!preview) return;
      preview.innerHTML = renderIcon(input.value, input.dataset.iconFallback || DEFAULT_PROJECT_ICON, "icon preview");
    }

    function initializeIconInputPreviews() {
      modalForm.querySelectorAll("input[data-icon-preview]").forEach(input => {
        updateIconPreview(input.id);
        input.addEventListener("input", () => updateIconPreview(input.id));
      });
    }

    function standardIconChoicesHtml(targetInputId, fallback, currentValue = "") {
      return STANDARD_ICONS.map(icon => `<button class="icon-choice${String(icon.value).trim() === currentValue ? " is-selected" : ""}" type="button" onclick='selectStandardIcon(${JSON.stringify(targetInputId)}, ${JSON.stringify(icon.value)})' aria-label="${escapeHtml(icon.label)}" title="${escapeHtml(icon.label)}"><span class="icon-choice-visual">${renderIcon(icon.value, fallback, icon.label)}</span></button>`).join("");
    }

    function openIconPickerModal(targetInputId) {
      const input = document.getElementById(targetInputId);
      const fallback = input?.dataset.iconFallback || DEFAULT_PROJECT_ICON;
      const currentValue = String(input?.value || "").trim();
      iconPickerBody.innerHTML = `<div class="icon-search-row"><input id="iconSearchInput" type="search" inputmode="search" autocomplete="off" placeholder="Search open-source icons" aria-label="Search open-source icons"></div><div id="iconSearchStatus" class="icon-search-status">Suggestions</div><div id="iconPickerGrid" class="icon-picker-grid">${standardIconChoicesHtml(targetInputId, fallback, currentValue)}</div><details class="icon-custom-details"><summary>Use emoji or image URL</summary><div class="icon-custom-row"><input id="iconPickerCustomInput" value="${escapeHtml(currentValue)}" placeholder="Emoji or image URL" aria-label="Custom icon value"><button class="btn btn-primary" type="button" onclick='applyCustomIcon(${JSON.stringify(targetInputId)})'>Use</button></div></details><a class="icon-source-note" href="https://iconify.design" target="_blank" rel="noreferrer">Open-source icons via Iconify</a>`;
      iconPickerBackdrop.classList.add("show");
      window.pmSheetOpened?.(iconPickerBackdrop, "#iconSearchInput");
      document.getElementById("iconSearchInput")?.addEventListener("input", event => scheduleIconSearch(targetInputId, fallback, event.target.value));
      const customInput = document.getElementById("iconPickerCustomInput");
      customInput?.addEventListener("keydown", event => { if (event.key === "Enter") { event.preventDefault(); applyCustomIcon(targetInputId); } });
    }

    function closeIconPickerModal() {
      const wasOpen = iconPickerBackdrop.classList.contains("show");
      iconPickerBackdrop.classList.remove("show");
      iconPickerBody.innerHTML = "";
      if (wasOpen) window.pmSheetClosed?.(iconPickerBackdrop);
    }

    function selectStandardIcon(targetInputId, value) {
      const input = document.getElementById(targetInputId);
      if (!input) return;
      input.value = value;
      updateIconPreview(targetInputId);
      closeIconPickerModal();
    }

    function applyCustomIcon(targetInputId) {
      const value = document.getElementById("iconPickerCustomInput")?.value.trim();
      if (!value) return;
      selectStandardIcon(targetInputId, value);
    }

    function scheduleIconSearch(targetInputId, fallback, query) {
      clearTimeout(iconSearchTimer);
      iconSearchTimer = setTimeout(() => searchRemoteIcons(targetInputId, fallback, query), 280);
    }

    async function searchRemoteIcons(targetInputId, fallback, query) {
      const normalized = String(query || "").trim();
      const grid = document.getElementById("iconPickerGrid");
      const status = document.getElementById("iconSearchStatus");
      if (!grid || !status) return;
      if (normalized.length < 2) {
        status.textContent = "Suggestions";
        grid.innerHTML = standardIconChoicesHtml(targetInputId, fallback, String(document.getElementById(targetInputId)?.value || "").trim());
        return;
      }
      status.textContent = "Searching…";
      try {
        const icons = await window.IconifyCatalog.search(normalized);
        if (document.getElementById("iconSearchInput")?.value.trim() !== normalized) return;
        status.textContent = icons.length ? `${icons.length} results` : "No icons found";
        grid.innerHTML = icons.map(icon => `<button class="icon-choice" type="button" onclick='selectStandardIcon(${JSON.stringify(targetInputId)}, ${JSON.stringify(icon.url)})' aria-label="${escapeHtml(icon.name)}" title="${escapeHtml(icon.name)}"><span class="icon-choice-visual">${renderIcon(icon.url, fallback, icon.name)}</span></button>`).join("");
      } catch {
        status.textContent = "Icon search unavailable";
      }
    }

    function toggleContextMenu(menuId, event) {
      event.stopPropagation();
      const nextMenuId = openContextMenuId === menuId ? null : menuId;
      setContextMenuOpen(openContextMenuId, false);
      openContextMenuId = nextMenuId;
      setContextMenuOpen(openContextMenuId, true);
    }

    function closeContextMenu() {
      if (!openContextMenuId) return;
      setContextMenuOpen(openContextMenuId, false);
      openContextMenuId = null;
    }

    function setContextMenuOpen(menuId, isOpen) {
      if (!menuId) return;
      const menu = document.getElementById(menuId);
      const wrapper = menu?.closest(".card-menu-wrap");
      wrapper?.classList.toggle("open", isOpen);
      menu?.classList.toggle("show", isOpen);
      wrapper?.querySelector(".card-menu-trigger")?.setAttribute("aria-expanded", String(isOpen));
    }

    async function saveProject(updatedProject) {
      if (window.pmOffline?.offline()) {
        project = window.pmOffline.queueProject(updatedProject);
        cacheProjectState(project);
        window.pmAnimate(render);
        closeModal();
        notify("Saved on this device. It will sync when online.");
        return;
      }
      try {
        project = await api(`/api/projects/${projectId}`, { method: "PUT", body: JSON.stringify(updatedProject) });
        cacheProjectState(project);
        window.pmAnimate(render);
        closeModal();
      } catch (error) {
        notify("Could not save changes. Please try again.");

      }
    }

    // --- Render ---

    function emptyStateHtml(kind, title, actionLabel, onclick) {
      const icon = kind === "tasks"
        ? `<svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="8.5"/><path d="m8.2 12 2.4 2.5 5.3-5.2"/></svg>`
        : `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="m9.5 14.5 5-5M7.2 16.8l-1.1 1.1a3 3 0 0 1-4.2-4.2l4-4a3 3 0 0 1 4.2 0M16.8 7.2l1.1-1.1a3 3 0 0 1 4.2 4.2l-4 4a3 3 0 0 1-4.2 0"/></svg>`;
      return `<div class="empty-state"><div class="empty-state-icon">${icon}</div><strong>${escapeHtml(title)}</strong><button class="btn empty-action" type="button" onclick="${onclick}">${escapeHtml(actionLabel)}</button></div>`;
    }

    function renderStep(step, depth = 0) {
      const actions = [
        { label: "Edit", icon: SWIPE_ICON_EDIT, onclick: `event.stopPropagation(); openStepEditor('${step.id}');` }
      ];
      if (depth < MAX_STEP_DEPTH) actions.push({ label: "Add sub-task", icon: SWIPE_ICON_ADD, onclick: `event.stopPropagation(); openAddSubStepModal('${step.id}');` });
      actions.push(
        { label: "Move", icon: SWIPE_ICON_MOVE, onclick: `event.stopPropagation(); beginMoveStep('${step.id}');` },
        { label: "Delete", icon: SWIPE_ICON_DELETE, onclick: `event.stopPropagation(); deleteStep('${step.id}');`, danger: true }
      );
      const menu = buildCardMenu(`step-menu-${step.id}`, actions);
      const swipeActions = [
        { label: "Edit", className: "swipe-edit", icon: SWIPE_ICON_EDIT, onclick: `openStepEditor('${step.id}');` }
      ];
      if (depth < MAX_STEP_DEPTH) swipeActions.push({ label: "Subtask", className: "swipe-add", icon: SWIPE_ICON_ADD, onclick: `openAddSubStepModal('${step.id}');` });
      swipeActions.push(
        { label: "Move", className: "swipe-move", icon: SWIPE_ICON_MOVE, onclick: `beginMoveStep('${step.id}');` },
        { label: "Delete", className: "swipe-delete", icon: SWIPE_ICON_DELETE, onclick: `deleteStep('${step.id}');` }
      );
      const moveClass = moveState?.stepId === step.id ? " move-source" : moveState?.anchorId === step.id ? " move-target" : "";
      const deleteClass = deleteMode && selectedDeleteIds.has(`step:${step.id}`) ? " selected-for-delete" : "";
      const childCount = (step.children || []).length;
      const childrenOpen = childCount && !collapsedStepIds.has(step.id);
      const clickHandler = deleteMode ? `toggleDeleteSelection(event, 'step:${step.id}')` : moveState ? `selectMoveTarget('${step.id}', event)` : childCount ? `toggleStepCollapse('${step.id}', event)` : "";
      const metadata = step.deadline
        ? window.pmMeta.line({ deadline: step.deadline, secondsLeft: step.done ? null : stepTimeLeft(step.deadline) })
        : step.until_deadline
          ? `<div class="project-meta-line"><span class="meta-date">Until project deadline</span></div>`
          : "";
      return `<div class="swipe-row" style="view-transition-name: s-${String(step.id).replace(/[^a-zA-Z0-9-]/g, "")}">${swipeActionsHtml(swipeActions)}<div class="step-item swipe-target${moveClass}${deleteClass}${childCount ? " is-collapsible" : ""}${childCount && !childrenOpen ? " is-collapsed" : ""}" data-step-id="${escapeHtml(step.id)}" data-delete-key="step:${escapeHtml(step.id)}" data-depth="${depth}" style="--tree-depth:${Math.min(depth, MAX_STEP_DEPTH)}" ${childCount ? `aria-expanded="${childrenOpen}"` : ""} ${clickHandler ? `onclick="${clickHandler}"` : ""}>${menu}<div class="step-head">
        <input class="step-check" data-step-id="${escapeHtml(step.id)}" type="checkbox" ${step.done ? "checked" : ""} onclick="event.stopPropagation()" onchange="toggleStepDone('${step.id}', this.checked)" />
        <div class="step-main ${step.done ? "done-state" : ""}"><div class="step-title-row"><div class="step-title ${step.done ? "done" : ""}">${escapeHtml(normalizeDisplayText(step.title || "Untitled step"))}</div></div>${String(step.description || "").trim() ? `<div class="muted">${renderFormattedText(step.description, "", true)}</div>` : ""}
        </div>
      </div>${metadata ? `<div class="step-sub ${step.done ? "done-state" : ""}">${metadata}</div>` : ""}</div></div>`;
    }

    function flattenVisibleSteps(steps, depth = 0, rows = []) {
      for (const step of (steps || [])) {
        rows.push({ step, depth });
        if ((step.children || []).length && !collapsedStepIds.has(step.id)) flattenVisibleSteps(step.children, depth + 1, rows);
      }
      return rows;
    }

    function compactCompletedRows(rows) {
      if (!hideCompletedSteps || moveState || deleteMode) return rows.map(row => ({ type: "step", ...row }));
      const compacted = [];
      let completedSequence = [];
      const flushCompleted = () => {
        if (!completedSequence.length) return;
        compacted.push({ type: "completed", rows: completedSequence });
        completedSequence = [];
      };
      for (const row of rows) {
        if (row.step.done) completedSequence.push(row);
        else { flushCompleted(); compacted.push({ type: "step", ...row }); }
      }
      flushCompleted();
      return compacted;
    }

    function renderCompletedSequence(rows) {
      const depth = Math.min(rows[0]?.depth || 0, MAX_STEP_DEPTH);
      return `<button class="completed-sequence" type="button" style="--tree-depth:${depth}" onclick="showCompletedSteps(event)" aria-label="Show completed tasks"><span aria-hidden="true">…</span></button>`;
    }

    function renderStepTree(steps) {
      const s = steps || [];
      if (!s.length && !moveState) return emptyStateHtml("tasks", "No tasks yet", "Add task", "openAddStepModal()");
      const rows = compactCompletedRows(flattenVisibleSteps(s));
      return `<div class="step-tree">${rows.map(row => row.type === "completed" ? renderCompletedSequence(row.rows) : renderStep(row.step, row.depth)).join("")}</div>`;
    }

    function renderTaskTreeInPlace() {
      const section = app.querySelector(".steps-section");
      if (!section) return renderPreservingScroll();
      const hasDoneTasks = hasCompletedSteps(project.steps || []);
      const stepsMenuOpen = (!!openContextMenuId && openContextMenuId.startsWith("step-menu-")) || !!moveState;
      section.classList.toggle("has-open-menu", stepsMenuOpen);
      section.innerHTML = `${sectionHeader("tasks", "Tasks", hasDoneTasks && !moveState && !deleteMode ? `<button class="section-action" type="button" aria-pressed="${hideCompletedSteps}" onclick="toggleCompletedSteps(event)">${hideCompletedSteps ? "Show done" : "Hide done"}</button>` : "")}<div class="section-body">${renderStepTree(project.steps)}</div>`;
    }

    function renderLinks() {
      const l = [...(project.links || [])].sort((a, b) => {
        const aId = getProjectIdFromLink(a);
        const bId = getProjectIdFromLink(b);
        if (!!aId !== !!bId) return aId ? -1 : 1;
        if (!aId && !bId) return 0;
        const aProj = projectCache[aId];
        const bProj = projectCache[bId];
        const aFinished = !!aProj?.finished;
        const bFinished = !!bProj?.finished;
        if (aFinished !== bFinished) return aFinished ? 1 : -1;
        const aTs = aProj?.deadline ? new Date(aProj.deadline).getTime() : Number.POSITIVE_INFINITY;
        const bTs = bProj?.deadline ? new Date(bProj.deadline).getTime() : Number.POSITIVE_INFINITY;
        if (aTs !== bTs) return aTs - bTs;
        return String(aProj?.name || a.title || "").localeCompare(String(bProj?.name || b.title || ""));
      });
      if (!l.length) return emptyStateHtml("links", "No links yet", "Add link", "openAddLinkModal()");
      const currentOrigin = window.location.origin;

      return `<div class="links-grid">${l.map((link, index) => {
        const pid = getProjectIdFromLink(link);

        if (pid) {
          // Project link — render rich card from cache (or loading state)
          const cached = pid in projectCache ? projectCache[pid] : undefined;
          return renderProjectLinkCard(link, index, cached);
        }

        // Regular link
        const rawUrl = String(link.url || "");
        const processedUrl = rawUrl.includes("PROJECTS/")
          ? rawUrl.replace("PROJECTS/", currentOrigin + "/")
          : rawUrl;

        return `<div class="swipe-row" style="view-transition-name: l-${String(link.id).replace(/[^a-zA-Z0-9-]/g, "")}">${editDeleteSwipeActions(`openEditLinkModal('${link.id}');`, `deleteLink('${link.id}');`)}<div class="link-card swipe-target${deleteMode && selectedDeleteIds.has(`link:${link.id}`) ? " selected-for-delete" : ""}" data-delete-key="link:${escapeHtml(link.id)}" onclick="${deleteMode ? `toggleDeleteSelection(event, 'link:${link.id}')` : `window.open('${escapeHtml(processedUrl)}')`}">
          ${buildCardMenu(`link-menu-${index}`, [
            { label: "Edit", icon: SWIPE_ICON_EDIT, onclick: `event.stopPropagation(); openEditLinkModal('${link.id}');` },
            { label: "Delete", icon: SWIPE_ICON_DELETE, onclick: `event.stopPropagation(); deleteLink('${link.id}');`, danger: true }
          ])}
          <div class="link-icon">${renderIcon(link.icon, "🔗", link.title || "link icon")}</div>
          <div class="link-main">
            <div class="link-title">${escapeHtml(normalizeDisplayText(link.title || "Untitled link"))}</div>
            <div class="link-subtitle">${escapeHtml(formatLinkDestination(processedUrl))}</div>
          </div>
        </div></div>`;
      }).join("")}</div>`;
    }

    function fileUrl(ownerProjectId, fileId) { return `/api/projects/${encodeURIComponent(ownerProjectId)}/files/${encodeURIComponent(fileId)}`; }
    function formatFileSize(size) {
      const bytes = Number(size) || 0;
      if (bytes < 1024) return `${bytes} B`;
      if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
      return `${(bytes / (1024 * 1024)).toFixed(1)} MB`;
    }
    function fileTypeLabel(file) {
      const name = String(file.name || "").toLowerCase();
      if (name.endsWith(".pdf")) return "PDF";
      if (name.endsWith(".md") || name.endsWith(".markdown")) return "MD";
      if (name.endsWith(".html") || name.endsWith(".htm")) return "HTML";
      if (/\.(doc|docx|odt)$/.test(name)) return "DOC";
      if (/\.(xls|xlsx|csv)$/.test(name)) return "SHEET";
      if (/\.(ppt|pptx)$/.test(name)) return "SLIDE";
      if (/\.(png|jpe?g|gif|webp|svg|avif)$/.test(name)) return "IMAGE";
      return "FILE";
    }
    function isImageFile(file) { return /^image\//.test(String(file.content_type || "")) || /\.(png|jpe?g|gif|webp|svg|avif)$/i.test(String(file.name || "")); }
    function fileIconHtml(file, url) {
      if (isImageFile(file)) return `<img class="file-image-preview" src="${escapeHtml(url)}" alt="">`;
      const extension = (String(file.name || "").split(".").pop() || "file").toUpperCase().slice(0, 5);
      const label = extension === String(file.name || "").toUpperCase() ? "FILE" : extension;
      const type = fileTypeLabel(file);
      const color = type === "PDF" ? "#dc2626" : type === "DOC" ? "#2563eb" : type === "SHEET" ? "#16a34a" : type === "SLIDE" ? "#ea580c" : type === "HTML" ? "#e34f26" : type === "MD" ? "#6b7280" : "#6366f1";
      return `<svg class="file-type-icon" viewBox="0 0 48 48" role="img" aria-label="${escapeHtml(label)} file"><path fill="${color}" d="M11 4h17l9 9v27a4 4 0 0 1-4 4H11a4 4 0 0 1-4-4V8a4 4 0 0 1 4-4Z"/><path fill="rgba(255,255,255,.28)" d="M28 4v9h9Z"/><text x="24" y="32" text-anchor="middle" fill="white" font-size="8" font-weight="800" font-family="Arial, sans-serif">${escapeHtml(label)}</text></svg>`;
    }
    async function shareFile(ownerProjectId, fileId, encodedName, encodedContentType) {
      ownerProjectId = decodeURIComponent(ownerProjectId);
      fileId = decodeURIComponent(fileId);
      const name = decodeURIComponent(encodedName);
      const contentType = decodeURIComponent(encodedContentType);
      const url = new URL(fileUrl(ownerProjectId, fileId), location.origin).href;
      try {
        const response = await fetch(url);
        if (!response.ok) throw new Error("Could not load file");
        const blob = await response.blob();
        const file = new File([blob], name, { type: contentType || blob.type });
        if (navigator.canShare?.({ files: [file] })) {
          await navigator.share({ files: [file], title: name });
          return;
        }
        if (navigator.share) {
          await navigator.share({ title: name, url });
          return;
        }
        await navigator.clipboard?.writeText(url);
        notify("File link copied.");
      } catch (error) {
        if (error.name !== "AbortError") notify("Could not share this file.");
      }
    }
    function renderFiles() {
      const ownFiles = (project.files || []).map(file => ({ ...file, ownerProjectId: project.id, ownerProjectName: "" }));
      const linkedFiles = (project.file_links || []).map(file => ({ ...file, id: file.source_file_id, ownerProjectId: file.source_project_id, ownerProjectName: file.source_project_name, linkId: file.id }));
      const files = [...ownFiles, ...linkedFiles];
      if (!files.length) return emptyStateHtml("links", "No files yet", "Upload file", "openUploadFileModal()");
      return `<div class="links-grid">${files.map((file, index) => {
        const linked = !!file.linkId;
        const deleteCall = linked ? `deleteFileLink('${file.linkId}')` : `deleteFile('${file.id}')`;
        const url = fileUrl(file.ownerProjectId, file.id);
        const subtitle = `${fileTypeLabel(file)} · ${formatFileSize(file.size)}${linked && file.ownerProjectName ? ` · ${escapeHtml(file.ownerProjectName)}` : ""}`;
        const shareCall = `shareFile('${encodeURIComponent(file.ownerProjectId)}', '${encodeURIComponent(file.id)}', '${encodeURIComponent(file.name || "Document")}', '${encodeURIComponent(file.content_type || "")}')`;
        return `<div class="swipe-row" style="view-transition-name: f-${String(file.linkId || file.id).replace(/[^a-zA-Z0-9-]/g, "")}">${swipeActionsHtml([{ label: "Share", className: "swipe-share", icon: SWIPE_ICON_SHARE, onclick: shareCall }, { label: linked ? "Remove" : "Delete", className: "swipe-delete", icon: SWIPE_ICON_DELETE, onclick: deleteCall }])}<div class="link-card swipe-target" onclick="window.open('${escapeHtml(url)}', '_blank')">${buildCardMenu(`file-menu-${index}`, [{ label: "Open", icon: SWIPE_ICON_ADD, onclick: `window.open('${url}', '_blank');` }, { label: "Share", icon: SWIPE_ICON_SHARE, onclick: shareCall }, { label: linked ? "Remove link" : "Delete", icon: SWIPE_ICON_DELETE, onclick: deleteCall, danger: true }])}<div class="link-icon">${fileIconHtml(file, url)}</div><div class="link-main"><div class="link-title">${escapeHtml(file.name || "Document")}</div><div class="link-subtitle">${subtitle}</div></div></div></div>`;
      }).join("")}</div>`;
    }

    function render() {
      if (!project) return;
      window.pmSwipeClose?.();
      const hasDoneTasks = hasCompletedSteps(project.steps || []);
      const linksMenuOpen = !!openContextMenuId && (openContextMenuId.startsWith("link-menu-") || openContextMenuId.startsWith("project-link-menu-"));
      const stepsMenuOpen = (!!openContextMenuId && openContextMenuId.startsWith("step-menu-")) || !!moveState;
      document.title = project.name ? `${project.name} · Project View` : "Project View";
      app.hidden = false; loadingState.hidden = true;
      app.className = `layout${deleteMode ? " delete-mode" : ""}`;
      app.innerHTML = `<section class="card hero project-hero"><div class="hero-head"><div class="hero-title-wrap"><div class="hero-icon">${renderIcon(project.icon, "📌", project.name || "project icon")}</div><div class="hero-copy"><h1 class="project-title">${escapeHtml(normalizeDisplayText(project.name || "Untitled Project"))}</h1></div></div><div class="project-hero-actions"><button class="icon-action" type="button" onclick="openProjectEditor()" aria-label="Edit project" title="Edit project"><svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L8 18l-4 1 1-4Z"/></svg></button><button class="icon-action${project.finished ? " is-complete" : ""}" type="button" onclick="toggleFinished()" aria-label="${project.finished ? "Reopen project" : "Mark project finished"}" title="${project.finished ? "Reopen project" : "Mark project finished"}"><svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="m8 12 2.6 2.6L16.5 9"/></svg></button></div></div>${project.description ? `<div class="project-description muted">${renderFormattedText(project.description)}</div>` : ""}${window.pmMeta.line({ deadline: project.deadline, secondsLeft: project.seconds_left, finished: project.finished })}</section>
      <section data-section="links" class="content-section${linksMenuOpen ? " has-open-menu" : ""}${collapsedSections.has("links") ? " is-collapsed" : ""}">${sectionHeader("links", "Links")}<div class="section-body">${renderLinks()}</div></section>
      <section data-section="files" class="content-section${collapsedSections.has("files") ? " is-collapsed" : ""}">${sectionHeader("files", "Files")}<div class="section-body">${renderFiles()}</div></section>
      <section data-section="tasks" class="content-section steps-section${stepsMenuOpen ? " has-open-menu" : ""}${collapsedSections.has("tasks") ? " is-collapsed" : ""}" ${moveState ? `onclick="selectMoveTarget(null, event)"` : ""}>${sectionHeader("tasks", "Tasks", hasDoneTasks && !moveState && !deleteMode ? `<button class="section-action" type="button" aria-pressed="${hideCompletedSteps}" onclick="toggleCompletedSteps(event)">${hideCompletedSteps ? "Show done" : "Hide done"}</button>` : "")}<div class="section-body">${renderStepTree(project.steps)}</div></section>`;
      if (window.pmOffline?.offline()) document.querySelectorAll("[data-requires-online]").forEach(button => { button.disabled = true; button.title = "Unavailable while offline"; });
      if (moveState) {
        const anchor = moveState.anchorId ? findStepAndParent(project.steps || [], moveState.anchorId)?.step : null;
        const source = findStepAndParent(project.steps || [], moveState.stepId)?.step;
        const canMoveIntoAnchor = !!anchor && !!source && canPlaceStepAt(source, anchor.id);
        app.innerHTML += anchor
          ? `<div class="move-toolbar"><button class="btn btn-secondary" type="button" onclick="cancelMoveStep()">Cancel</button>${canMoveIntoAnchor ? `<button class="btn btn-primary" type="button" onclick="moveStepInto('${anchor.id}')">Child</button>` : ""}<button class="btn btn-primary" type="button" onclick="moveStepBefore('${anchor.id}')">Before</button><button class="btn btn-primary" type="button" onclick="moveStepAfter('${anchor.id}')">After</button></div>`
          : `<div class="move-toolbar"><button class="btn btn-secondary" type="button" onclick="cancelMoveStep()">Cancel</button><button class="btn btn-primary" type="button" onclick="confirmMoveStep('top')">Move to start</button><button class="btn btn-primary" type="button" onclick="confirmMoveStep('bottom')">Move to end</button></div>`;
      }

      // Fetch any uncached linked project data and re-render when ready
      if (hasUncachedProjectLinks()) hydrateProjectLinks();
    }

    // --- Link modals ---

    function openProjectEditor() {
      openModal("Edit project", `<div class="form-grid"><div class="field full"><div class="name-icon-row">${buildIconButton("projectIconInput", DEFAULT_PROJECT_ICON, project.icon || DEFAULT_PROJECT_ICON)}<input name="name" value="${escapeHtml(project.name || "")}" placeholder="Project name" aria-label="Project name" required /></div></div><div class="field full"><label>Deadline</label><input name="deadline" type="datetime-local" value="${project.deadline ? new Date(project.deadline).toISOString().slice(0, 16) : ""}" /></div><div class="field full"><label>Description</label><textarea name="description">${escapeHtml(project.description || "")}</textarea></div></div><div class="modal-actions"><div class="modal-action-group"><button class="btn btn-secondary" type="button" onclick="closeModal()">Cancel</button><button class="btn btn-primary" type="submit">Save</button></div></div><div class="editor-danger"><button class="editor-danger-button" type="button" onclick="deleteProject()">Delete project…</button></div>`, async (formData) => {
        const updated = deepClone(project); updated.name = String(formData.get("name") || "").trim(); updated.icon = String(formData.get("icon") || "").trim() || DEFAULT_PROJECT_ICON; updated.description = String(formData.get("description") || "").trim();
        updated.deadline = parseDateSafe(formData.get("deadline")); addToStandardIcons(updated.icon, updated.name || "Project"); await saveProject(updated);
      });
    }

    function openAddLinkModal() {
      openModal("Add link", `<div class="form-grid"><div class="field full"><div class="name-icon-row">${buildIconButton("newLinkIconInput", "🔗", "")}<input name="title" placeholder="Link title" aria-label="Link title" required /></div></div><div class="field full"><label>URL</label><input name="url" inputmode="url" placeholder="https://example.com" required /></div></div><div class="modal-actions"><div class="modal-action-group"><button class="btn btn-secondary" type="button" onclick="closeModal()">Cancel</button><button class="btn btn-primary" type="submit">Add link</button></div></div>`, async (formData) => {
        const updated = deepClone(project); const newLink = { id: generateId(), title: String(formData.get("title") || "").trim(), url: String(formData.get("url") || "").trim(), icon: String(formData.get("icon") || "").trim() || "🔗" };
        updated.links = updated.links || []; updated.links.push(newLink); addToStandardIcons(newLink.icon, newLink.title || "Link"); await saveProject(updated);
      });
    }

    function openEditLinkModal(linkId) {
      const link = (project.links || []).find(l => l.id === linkId); if (!link) return;
      openModal("Edit link", `<div class="form-grid"><div class="field full"><div class="name-icon-row">${buildIconButton("editLinkIconInput", "🔗", link.icon || "🔗")}<input name="title" value="${escapeHtml(link.title || "")}" placeholder="Link title" aria-label="Link title" required /></div></div><div class="field full"><label>URL</label><input name="url" inputmode="url" value="${escapeHtml(link.url || "")}" required /></div></div><div class="modal-actions"><div class="modal-action-group"><button class="btn btn-secondary" type="button" onclick="closeModal()">Cancel</button><button class="btn btn-primary" type="submit">Save</button></div></div>`, async (formData) => {
        const updated = deepClone(project);
        const target = (updated.links || []).find(l => l.id === linkId); if (!target) return;
        target.title = String(formData.get("title") || "").trim(); target.url = String(formData.get("url") || "").trim(); target.icon = String(formData.get("icon") || "").trim() || "🔗";
        await saveProject(updated);
      });
    }

    // --- Project link picker ---

    async function openAddProjectLinkModal() {
      if (window.pmOffline?.offline()) { notify("Linking another project requires a connection."); return; }
      openModal("Link a project", `<div style="text-align:center;padding:28px;color:var(--muted)">Loading projects…</div>`, async () => { });

      let all;
      try {
        all = await api("/api/projects");
      } catch {
        modalForm.innerHTML = `<div style="color:var(--danger);padding:16px 4px;">Failed to load projects.</div><div class="inline-actions" style="margin-top:12px;justify-content:flex-end;"><button class="btn btn-secondary" type="button" onclick="closeModal()">Close</button></div>`;
        return;
      }

      // Exclude this project and ones already linked
      const alreadyLinked = new Set(
        (project.links || []).map(l => getProjectIdFromLink(l)).filter(Boolean)
      );
      _pickerProjects = all.filter(p => p.id !== projectId && !alreadyLinked.has(p.id));

      if (!_pickerProjects.length) {
        modalForm.innerHTML = `<div class="empty">No other projects available to link.</div><div class="inline-actions" style="margin-top:16px;justify-content:flex-end;padding-bottom:8px;"><button class="btn btn-secondary" type="button" onclick="closeModal()">Close</button></div>`;
        modalForm.onsubmit = e => e.preventDefault();
        return;
      }

      modalForm.innerHTML = `
        <div class="proj-picker-grid">
          ${_pickerProjects.map((p, i) => `
            <button class="proj-picker-item" type="button" onclick="addProjectLink(${i})">
              <div class="proj-picker-icon">${renderIcon(p.icon, "📌", p.name)}</div>
              <div class="proj-picker-info">
                <div class="proj-picker-name">${escapeHtml(p.name || "Untitled project")}</div>
                <div class="proj-picker-meta">${p.deadline ? escapeHtml(formatDeadline(p.deadline)) : "No deadline"} · ${p.finished ? "Finished" : "Open"}</div>
              </div>
            </button>
          `).join("")}
        </div>
        <div class="inline-actions" style="margin-top:16px;justify-content:flex-end;padding-bottom:8px;">
          <button class="btn btn-secondary" type="button" onclick="closeModal()">Cancel</button>
        </div>`;
      modalForm.onsubmit = e => e.preventDefault();
    }

    async function addProjectLink(pickerIndex) {
      const p = _pickerProjects[pickerIndex];
      if (!p) return;
      const updated = deepClone(project);
      updated.links = updated.links || [];
      updated.links.push({
        id: generateId(),
        title: p.name || "Untitled project",
        url: `PROJECTS/project?id=${p.id}`,
        icon: p.icon || "📌"
      });
      // Pre-warm the cache with what we already know
      projectCache[p.id] = p;
      await saveProject(updated);
    }

    async function openUploadFileModal() {
      if (window.pmOffline?.offline()) { notify("File uploads require a connection."); return; }
      closeFloatingActions();
      openModal("Upload file", `<div class="form-grid"><div class="field full"><label>File</label><input name="file" type="file" required /></div></div><div class="modal-actions"><div class="modal-action-group"><button class="btn btn-secondary" type="button" onclick="closeModal()">Cancel</button><button class="btn btn-primary" type="submit" data-loading-label="Uploading…">Upload</button></div></div>`, async formData => {
        const response = await fetch(`/api/projects/${projectId}/files`, { method: "POST", body: formData });
        if (!response.ok) throw new Error(await response.text() || "Could not upload file");
        const file = await response.json();
        project.files = [...(project.files || []), file];
        cacheProjectState(project);
        closeModal();
        render();
      });
    }

    let filePickerFiles = [];
    async function openLinkProjectFileModal() {
      if (window.pmOffline?.offline()) { notify("Linking a project file requires a connection."); return; }
      closeFloatingActions();
      openModal("Link a project file", `<div style="text-align:center;padding:28px;color:var(--muted)">Loading files…</div>`, async () => {});
      try {
        const projects = await api("/api/projects");
        filePickerFiles = projects.filter(source => source.id !== projectId).flatMap(source => (source.files || []).map(file => ({ ...file, sourceProjectId: source.id, sourceProjectName: source.name })));
      } catch {
        modalForm.innerHTML = `<div class="empty">Could not load project files.</div>`;
        return;
      }
      if (!filePickerFiles.length) {
        modalForm.innerHTML = `<div class="empty">No project files are available.</div>`;
        return;
      }
      modalForm.innerHTML = `<div class="proj-picker-grid">${filePickerFiles.map((file, index) => `<button class="proj-picker-item" type="button" onclick="addProjectFileLink(${index})"><div class="proj-picker-icon file-type-icon">${fileTypeLabel(file)}</div><div class="proj-picker-info"><div class="proj-picker-name">${escapeHtml(file.name)}</div><div class="proj-picker-meta">${escapeHtml(file.sourceProjectName)} · ${formatFileSize(file.size)}</div></div></button>`).join("")}</div><div class="inline-actions" style="margin-top:16px;justify-content:flex-end;padding-bottom:8px;"><button class="btn btn-secondary" type="button" onclick="closeModal()">Cancel</button></div>`;
      modalForm.onsubmit = event => event.preventDefault();
    }

    async function addProjectFileLink(index) {
      const file = filePickerFiles[index];
      if (!file) return;
      const updated = deepClone(project);
      updated.file_links = [...(updated.file_links || []), { id: generateId(), source_project_id: file.sourceProjectId, source_file_id: file.id, source_project_name: file.sourceProjectName, name: file.name, content_type: file.content_type, size: file.size }];
      await saveProject(updated);
    }

    async function deleteFile(fileId) {
      if (!(await confirmSheet({ title: "Delete File?", message: "This permanently removes the uploaded file.", confirmLabel: "Delete", destructive: true }))) return;
      const response = await fetch(`/api/projects/${projectId}/files/${fileId}`, { method: "DELETE" });
      if (!response.ok) { notify("Could not delete the file."); return; }
      project.files = (project.files || []).filter(file => file.id !== fileId);
      cacheProjectState(project);
      render();
      notify("File deleted.");
    }
    async function deleteFileLink(linkId) {
      const updated = deepClone(project);
      updated.file_links = (updated.file_links || []).filter(link => link.id !== linkId);
      await saveProject(updated);
      notify("File link removed.");
    }

    // --- Step modals ---

    function stepFormHtml(step = null, submitLabel = "Save") {
      return `<div class="form-grid"><div class="field full"><label>Title</label><input name="title" value="${escapeHtml(step?.title || "")}" required /></div><div class="field full"><label>Description</label><textarea name="description">${escapeHtml(step?.description || "")}</textarea></div><div class="field full"><label>Step deadline</label><input name="deadline" type="datetime-local" value="${step?.deadline ? new Date(step.deadline).toISOString().slice(0, 16) : ""}" /></div></div><div class="modal-actions"><div class="modal-action-group"><button class="btn btn-secondary" type="button" onclick="closeModal()">Cancel</button><button class="btn btn-primary" type="submit">${submitLabel}</button></div></div>`;
    }

    function openAddStepModal() { openModal("New task", stepFormHtml(null, "Add task"), async (formData) => { const updated = deepClone(project); updated.steps = updated.steps || []; updated.steps.push({ id: generateId(), title: String(formData.get("title") || "").trim(), description: String(formData.get("description") || "").trim(), done: false, until_deadline: false, deadline: parseDateSafe(formData.get("deadline")), children: [] }); await saveProject(updated); }); }
    function openAddSubStepModal(parentId) {
      const parentDepth = getStepDepth(project.steps || [], parentId);
      if (parentDepth == null || parentDepth >= MAX_STEP_DEPTH) { notify("Tasks can be nested up to three levels."); return; }
      openModal("New sub-task", stepFormHtml(null, "Add sub-task"), async (formData) => {
        const updated = deepClone(project);
        updated.steps = updateStepRecursive(updated.steps || [], parentId, step => ({ ...step, children: [...(step.children || []), { id: generateId(), title: String(formData.get("title") || "").trim(), description: String(formData.get("description") || "").trim(), done: false, until_deadline: false, deadline: parseDateSafe(formData.get("deadline")), children: [] }] }));
        await saveProject(updated);
      });
    }
    function openStepEditor(stepId) { const found = findStepAndParent(project.steps || [], stepId); if (!found) return; openModal("Edit step", stepFormHtml(found.step, "Save"), async (formData) => { const updated = deepClone(project); updated.steps = updateStepRecursive(updated.steps || [], stepId, step => ({ ...step, title: String(formData.get("title") || "").trim(), description: String(formData.get("description") || "").trim(), deadline: parseDateSafe(formData.get("deadline")) })); await saveProject(updated); }); }

    function renderPreservingScroll() {
      const scroller = document.getElementById("appScroll");
      const scrollTop = scroller?.scrollTop;
      render();
      if (scrollTop == null) return;
      const restoreScroll = () => { scroller.scrollTop = scrollTop; };
      restoreScroll();
      requestAnimationFrame(restoreScroll);
    }
    async function toggleStepDone(stepId, done) {
      const updated = deepClone(project);
      updated.steps = updateStepRecursive(updated.steps || [], stepId, step => ({ ...step, done }));
      if (window.pmOffline?.offline()) {
        project = window.pmOffline.queueProject(updated);
        cacheProjectState(project);
        if (hideCompletedSteps) renderTaskTreeInPlace(); else updateStepDoneDom(stepId, done);
        return;
      }
      project = await api(`/api/projects/${projectId}`, { method: "PUT", body: JSON.stringify(updated) });
      cacheProjectState(project);
      if (hideCompletedSteps) renderTaskTreeInPlace();
      else updateStepDoneDom(stepId, done);
    }
    async function deleteStep(stepId) { if (!(await confirmSheet({ title: "Delete Task?", message: "Sub-tasks will be deleted too.", confirmLabel: "Delete", destructive: true }))) return; const updated = deepClone(project); updated.steps = removeStepRecursive(updated.steps || [], stepId); await saveProject(updated); }
    async function toggleFinished() {
      if (window.pmOffline?.offline()) {
        project = window.pmOffline.queueProject({ ...project, finished: !project.finished });
        cacheProjectState(project);
        updateProjectFinishedDom();
        return;
      }
      project = await api(`/api/projects/${projectId}/finish`, { method: "PATCH", body: JSON.stringify({ finished: !project.finished }) });
      cacheProjectState(project);
      updateProjectFinishedDom();
    }

    function updateStepDoneDom(stepId, done) {
      const checkbox = [...app.querySelectorAll(".step-check")].find(input => input.dataset.stepId === stepId);
      const row = checkbox?.closest(".step-item");
      if (!checkbox || !row) return renderTaskTreeInPlace();
      checkbox.checked = done;
      row.querySelector(".step-main")?.classList.toggle("done-state", done);
      row.querySelector(".step-title")?.classList.toggle("done", done);
      const step = findStepAndParent(project.steps || [], stepId)?.step;
      const sub = row.querySelector(".step-sub");
      sub?.classList.toggle("done-state", done);
      if (step?.deadline && sub) sub.innerHTML = window.pmMeta.line({ deadline: step.deadline, secondsLeft: done ? null : stepTimeLeft(step.deadline) });
    }

    function updateProjectFinishedDom() {
      const hero = app.querySelector(".project-hero");
      const finishButton = hero?.querySelectorAll(".project-hero-actions .icon-action")[1];
      if (!hero || !finishButton) return;
      const finished = !!project.finished;
      const label = finished ? "Reopen project" : "Mark project finished";
      finishButton.classList.toggle("is-complete", finished);
      finishButton.setAttribute("aria-label", label);
      finishButton.setAttribute("title", label);
      const meta = hero.querySelector(".project-meta-line");
      if (meta) meta.outerHTML = window.pmMeta.line({ deadline: project.deadline, secondsLeft: project.seconds_left, finished });
    }
    async function deleteProject() { if (!(await confirmSheet({ title: "Delete Project?", message: "This permanently deletes the project, its links, and all tasks.", confirmLabel: "Delete", destructive: true }))) return; if (window.pmOffline?.offline()) window.pmOffline.queueDelete(projectId); else await api(`/api/projects/${projectId}`, { method: "DELETE" }); try { localStorage.removeItem(`pm_project_${projectId}`); const summaries = JSON.parse(localStorage.getItem("pm_project_summaries") || "null"); if (Array.isArray(summaries)) localStorage.setItem("pm_project_summaries", JSON.stringify(summaries.filter(summary => summary.id !== projectId))); } catch { } location.href = "/"; }
    function navigationSummary() {
      try {
        const summary = JSON.parse(sessionStorage.getItem("pm_project_loading_summary") || "null");
        sessionStorage.removeItem("pm_project_loading_summary");
        return summary?.id === projectId ? summary : null;
      } catch { return null; }
    }
    function renderProjectLoading() {
      loadingState.className = "card";
      loadingState.innerHTML = `<div class="project-loading-spinner" role="status" aria-live="polite"><span>Loading project…</span></div>`;
    }
    async function loadProject() {
      if (!projectId) { loadingState.textContent = "No project selected."; return; }
      try {
        const cached = JSON.parse(localStorage.getItem(`pm_project_${projectId}`) || "null");
        if (cached?.id === projectId) { project = cached; render(); }
      } catch { }
      if (window.pmOffline?.offline()) {
        if (!project) {
          loadingState.className = "card";
          loadingState.textContent = "This project is not saved offline. Connect once to open it.";
        }
        return;
      }
      if (!project) renderProjectLoading();
      try {
        project = await api(`/api/projects/${projectId}`);
        try { localStorage.setItem(`pm_project_${projectId}`, JSON.stringify(project)); } catch { }
        render();
      } catch (e) {
        if (!project) loadingState.textContent = "Could not load this project.";
        else notify("Showing the most recently loaded version.");
      }
    }

    applyTheme(document.documentElement.dataset.theme || "dark");
    matchMedia("(prefers-color-scheme: light)").addEventListener("change", event => {
      if (!localStorage.getItem(THEME_STORAGE_KEY)) applyTheme(event.matches ? "light" : "dark");
    });
    closeModalBtn.addEventListener("click", closeModal);
    closeIconPickerBtn.addEventListener("click", closeIconPickerModal);
    modalBackdrop.addEventListener("click", (e) => { if (e.target === modalBackdrop) closeModal(); });
    iconPickerBackdrop.addEventListener("click", (e) => { if (e.target === iconPickerBackdrop) closeIconPickerModal(); });
    settingsBackdrop?.addEventListener("click", (e) => { if (e.target === settingsBackdrop) closeSettingsModal(); });
    document.addEventListener("click", (e) => {
      if (openContextMenuId && !e.target.closest(".card-menu-wrap")) closeContextMenu();
      if (!e.target.closest(".floating-actions")) closeFloatingActions();
      if (!e.target.closest(".management-actions")) closeManagementActions();
    });
    document.addEventListener("keydown", (e) => {
      if (e.key !== "Escape") return;
      if (settingsBackdrop?.classList.contains("show")) closeSettingsModal();
      else if (iconPickerBackdrop.classList.contains("show")) closeIconPickerModal();
      else closeModal();
    });

    window.openSettingsModal = openSettingsModal;
    window.goBack = goBack;
    window.closeSettingsModal = closeSettingsModal;
    window.toggleTheme = toggleTheme;
    window.openIconPickerModal = openIconPickerModal;
    window.closeIconPickerModal = closeIconPickerModal;
    window.selectStandardIcon = selectStandardIcon;
    window.applyCustomIcon = applyCustomIcon;
    window.toggleContextMenu = toggleContextMenu;
    window.openProjectEditor = openProjectEditor;
    window.openAddLinkModal = openAddLinkModal;
    window.openEditLinkModal = openEditLinkModal;
    window.deleteLink = async (linkId) => { if (await confirmSheet({ title: "Delete Link?", confirmLabel: "Delete", destructive: true })) { const u = deepClone(project); u.links = (u.links || []).filter(l => l.id !== linkId); saveProject(u); } };
    window.openAddProjectLinkModal = openAddProjectLinkModal;
    window.addProjectLink = addProjectLink;
    window.openUploadFileModal = openUploadFileModal;
    window.openLinkProjectFileModal = openLinkProjectFileModal;
    window.addProjectFileLink = addProjectFileLink;
    window.deleteFile = deleteFile;
    window.deleteFileLink = deleteFileLink;
    window.shareFile = shareFile;
    window.openAddStepModal = openAddStepModal;
    window.openAddSubStepModal = openAddSubStepModal;
    window.toggleStepCollapse = toggleStepCollapse;
    window.toggleSection = toggleSection;
    window.toggleCompletedSteps = toggleCompletedSteps;
    window.showCompletedSteps = showCompletedSteps;
    window.openStepEditor = openStepEditor;
    window.toggleStepDone = toggleStepDone;
    window.deleteStep = deleteStep;
    window.beginMoveStep = beginMoveStep;
    window.selectMoveTarget = selectMoveTarget;
    window.cancelMoveStep = cancelMoveStep;
    window.confirmMoveStep = confirmMoveStep;
    window.moveStepBefore = moveStepBefore;
    window.moveStepAfter = moveStepAfter;
    window.moveStepInto = moveStepInto;
    window.toggleFloatingActions = toggleFloatingActions;
    window.toggleManagementActions = toggleManagementActions;
    window.openAddLinkFromMenu = openAddLinkFromMenu;
    window.openAddProjectLinkFromMenu = openAddProjectLinkFromMenu;
    window.openAddStepFromMenu = openAddStepFromMenu;
    window.enterDeleteMode = enterDeleteMode;
    window.cancelDeleteMode = cancelDeleteMode;
    window.confirmDeleteSelected = confirmDeleteSelected;
    window.toggleDeleteSelection = toggleDeleteSelection;
    window.toggleFinished = toggleFinished;
    window.deleteProject = deleteProject;
    window.closeModal = closeModal;

    loadProject();
  </script>
</body>

</html>
