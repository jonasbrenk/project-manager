<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <link rel="icon" type="image/png" sizes="192x192" href="/static/icon-192.png?v=3">
  <link rel="apple-touch-icon" sizes="180x180" href="/static/apple-touch-icon.png?v=3">
  <link rel="manifest" href="/site.webmanifest?v=1">
  <script src="/static/iconify-catalog.js?v=1" defer></script>
  <meta name="theme-color" content="#0b1020">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Projects">
  <title>Project Manager</title>
  <script>
    (() => {
      const saved = localStorage.getItem("pm_theme_mode");
      const theme = saved === "light" || saved === "dark"
        ? saved
        : (matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark");
      document.documentElement.dataset.theme = theme;
      document.documentElement.style.colorScheme = theme;
      document.querySelector('meta[name="theme-color"]')?.setAttribute("content", theme === "light" ? "#f2f2f7" : "#0b1020");
    })();
  </script>
  <style>
:root {
  --bg: #0b1020; --card: rgba(19, 26, 47, .92); --card2: rgba(28, 38, 70, .8);
  --text: #eef2ff; --muted: #a8b3cf; --line: rgba(255, 255, 255, .08);
  --accent: #4f7cff; --accentSoft: rgba(79, 124, 255, .16); --danger: #ff6a6a;
  --shadow: 0 18px 50px rgba(0,0,0,.28); --radius: 22px;
  --bgTop: #172344; --bgBottom: #0b1020; --surfaceSoft: rgba(255,255,255,.04);
  --panelBg: #0f172d; --toggleOff: rgba(255,255,255,.16);
  --dangerSoft: rgba(255, 106, 106, .12); --dangerBorder: rgba(255, 106, 106, .28); --dangerText: #ffd9d9;
}

html[data-theme="light"] {
  --bg: #edf3ff; --card: rgba(255, 255, 255, .88); --card2: rgba(242, 247, 255, .92);
  --text: #17233c; --muted: #5d6a84; --line: rgba(23, 35, 60, .12);
  --accent: #2f6df6; --accentSoft: rgba(47, 109, 246, .12); --danger: #d74d4d;
  --shadow: 0 18px 45px rgba(63, 88, 138, .14); --bgTop: #f9fbff; --bgBottom: #dfe9ff;
  --surfaceSoft: rgba(20, 34, 59, .04); --panelBg: #ffffff; --toggleOff: rgba(21, 34, 59, .16);
  --dangerSoft: rgba(215, 77, 77, .12); --dangerBorder: rgba(215, 77, 77, .28); --dangerText: #b43333;
}

* { box-sizing: border-box; }
html, body { 
  margin: 0; min-height: 100%; color: var(--text); 
  font-family: Inter, system-ui, sans-serif;
  background: radial-gradient(circle at top, var(--bgTop) 0%, var(--bgBottom) 58%);
}

/* Layout Containers */
.page { width: min(1120px, calc(100% - 24px)); margin: 0 auto; padding: 24px 0 148px; display: grid; gap: 18px; }
.hero, .project-list { display: grid; gap: 18px; }

/* Components: Cards & Panels */
.card { 
  background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); 
  box-shadow: var(--shadow); backdrop-filter: blur(12px); padding: 18px; 
}
.hero-card { display: flex; justify-content: space-between; gap: 18px; flex-wrap: wrap; align-items: flex-start; position: relative; }
.hero-copy-wrap { display: grid; gap: 10px; }
.panel-head { display: flex; justify-content: space-between; gap: 16px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
.panel-x {
  width: 40px;
  height: 40px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: var(--surfaceSoft);
  color: var(--text);
  display: grid;
  place-items: center;
  font: inherit;
  font-size: 1.4rem;
  line-height: 1;
  cursor: pointer;
  flex-shrink: 0;
}

/* Typography */
.title { font-size: clamp(1.8rem, 4vw, 2.8rem); margin: 0 0 6px; }
.panel-title { margin: 0; font-size: 1.1rem; }
.subtitle, .muted, label { color: var(--muted); line-height: 1.5; font-size: .9rem; }

/* Stats */
.stats { display: flex; gap: 12px; flex-wrap: wrap; }
.stat { 
  flex: 1 1 96px; padding: 12px 14px; background: var(--card2); 
  border: 1px solid var(--line); border-radius: 18px; 
}
.stat-label { font-size: .84rem; margin-bottom: 8px; color: var(--muted); }
.stat-value { font-size: 1.28rem; font-weight: 700; }

/* Forms & Inputs */
.form-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
.field { display: grid; gap: 8px; min-width: 0; }
.span-2 { grid-column: span 2; }
.span-4 { grid-column: 1 / -1; }
.icon-input-row { display: grid; grid-template-columns: minmax(0, 1fr) 48px auto; gap: 10px; align-items: center; }
.icon-input-row input { min-width: 0; }

.icon-preview {
  width: 48px; height: 48px; border-radius: 12px; border: 1px solid var(--line);
  background: var(--surfaceSoft); display: grid; place-items: center; overflow: hidden;
  flex-shrink: 0; font-size: 1.35rem;
}

.icon-preview img { width: 100%; height: 100%; object-fit: cover; display: block; }

.template-icon-btn {
  width: 42px;
  height: 42px;
  padding: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 12px;
  font-size: 1rem;
  line-height: 1;
  flex-shrink: 0;
  text-align: center;
}

.template-icon-btn span {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  height: 100%;
  line-height: 1;
  transform: translateX(-1px);
}

input, textarea { 
  width: 100%; background: var(--surfaceSoft); border: 1px solid var(--line); 
  color: var(--text); border-radius: 14px; padding: 12px 14px; outline: none; font: inherit;
  color-scheme: inherit;
}

input[type="datetime-local"] {
  display: block;
  width: 100%;
  max-width: 100%;
  min-width: 0;
  inline-size: 100%;
  max-inline-size: 100%;
  min-inline-size: 0;
  box-sizing: border-box;
}

@supports (-webkit-touch-callout: none) {
  input[type="datetime-local"] {
    width: -webkit-fill-available;
    max-width: -webkit-fill-available;
  }
}

textarea { min-height: 100px; resize: vertical; }
input:focus, textarea:focus { border-color: rgba(79,124,255,.7); box-shadow: 0 0 0 3px rgba(79,124,255,.15); }

/* Buttons */
.actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 16px; flex-wrap: wrap; }
.btn { border: 0; border-radius: 999px; padding: 12px 16px; cursor: pointer; font-weight: 600; font: inherit; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-secondary { background: var(--surfaceSoft); color: var(--text); border: 1px solid var(--line); }
.settings-btn {
  width: 44px;
  height: 44px;
  padding: 0;
  position: absolute;
  top: 18px;
  right: 18px;
}

.settings-trigger {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border-radius: 999px;
}

.settings-trigger svg {
  width: 16px;
  height: 16px;
  display: block;
  flex-shrink: 0;
}

/* Project List Items */
.project-card {
  display: grid; grid-template-columns: auto minmax(0, 1fr); align-items: flex-start; gap: 16px; position: relative;
  padding: 16px; border-radius: 18px; border: 1px solid rgba(79,124,255,.18); text-decoration: none; color: inherit;
  background: rgba(79,124,255,.05);
  transition: border-color .15s, background .15s, transform .15s;
}
.project-card:hover { border-color: rgba(79,124,255,.4); background: rgba(79,124,255,.08); }
.project-card.is-finished {
  opacity: .68;
  background: color-mix(in srgb, var(--card) 70%, var(--surfaceSoft));
}
.project-icon {
  width: 56px; height: 56px; display: grid; place-items: center; border-radius: 16px;
  background: var(--accentSoft); font-size: 1.5rem; border: 1px solid rgba(79,124,255,.3); overflow: hidden; flex-shrink: 0;
}
.project-card-body { min-width: 0; display: grid; gap: 12px; }
.project-card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
.project-copy { min-width: 0; }
.project-name { margin: 0 0 4px; font-size: 1rem; font-weight: 700; line-height: 1.2; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.project-desc {
  margin: 0; color: var(--muted); line-height: 1.45; font-size: .88rem;
}
.formatted-text { display: grid; gap: 8px; min-width: 0; }
.formatted-text.compact { gap: 6px; }
.formatted-paragraph {
  margin: 0; white-space: pre-wrap; word-break: break-word; overflow-wrap: anywhere;
}
.formatted-list { margin: 0; padding-left: 1.2rem; display: grid; gap: 4px; }
.formatted-list li { white-space: pre-wrap; word-break: break-word; overflow-wrap: anywhere; }
.indent-1 { margin-left: 1.4rem; }
.indent-2 { margin-left: 2.8rem; }
.indent-3 { margin-left: 4.2rem; }
.project-meta { grid-column: 1 / -1; display: grid; gap: 8px; grid-template-columns: repeat(2, minmax(0, 1fr)); text-align: left; }
.badge { 
  display: inline-flex; align-items: center; justify-content: center; border-radius: 999px; 
  width: 100%; min-width: 0; padding: 9px 12px; background: var(--surfaceSoft); border: 1px solid var(--line); font-size: .72rem;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.badge.danger {
  color: var(--dangerText);
  border-color: var(--dangerBorder);
  background: var(--dangerSoft);
}
.badge.warning {
  border-color: color-mix(in srgb, var(--accent) 45%, var(--line));
  box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--accent) 20%, transparent);
}
.done { color: #58c48f; }
.project-card.selected-for-delete {
  border-color: var(--accent);
  background: color-mix(in srgb, var(--accentSoft) 70%, var(--card));
  box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 28%, transparent);
}

.project-card.visibility-selected {
  border-color: var(--accent);
  background: color-mix(in srgb, var(--accentSoft) 82%, var(--card));
  box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 34%, transparent);
}
.empty { padding: 28px; text-align: center; color: var(--muted); border: 1px dashed var(--line); border-radius: 18px; }

.settings-backdrop {
  position: fixed; inset: 0; background: rgba(7,10,18,.68);
  display: none; align-items: center; justify-content: center; padding: 16px; z-index: 80;
}

.settings-backdrop.show { display: flex; }

.settings-modal {
  width: min(420px, 100%); background: var(--panelBg); border: 1px solid var(--line);
  border-radius: 24px; box-shadow: var(--shadow); padding: 18px; display: grid; gap: 18px;
}

.modal-backdrop {
  position: fixed; inset: 0; background: rgba(7,10,18,.68);
  display: none; align-items: center; justify-content: center; padding: 16px; z-index: 90;
}

.modal-backdrop.show { display: flex; }

.modal-panel {
  width: min(720px, 100%); max-height: calc(100vh - 32px); overflow: auto;
  background: var(--panelBg); border: 1px solid var(--line); border-radius: 24px;
  box-shadow: var(--shadow); padding: 18px;
}

.floating-actions {
  position: fixed; right: 18px; bottom: 18px; z-index: 110;
}

.floating-actions.hidden {
  opacity: 0;
  pointer-events: none;
}

.floating-actions-menu {
  position: absolute; right: 0; bottom: calc(100% + 10px);
  min-width: 196px; padding: 10px; border-radius: 18px;
  border: 1px solid var(--line); background: var(--panelBg); box-shadow: var(--shadow);
  display: none; gap: 8px;
}

.floating-actions-menu.show { display: grid; }

.menu-item {
  width: 100%; border: 1px solid transparent; border-radius: 12px;
  background: var(--surfaceSoft); color: var(--text); padding: 12px 14px; text-align: left; cursor: pointer;
  font-family: "SF Pro Text", "Segoe UI", Inter, system-ui, sans-serif;
  font-size: .9rem;
  font-weight: 600;
  letter-spacing: .08em;
  text-transform: uppercase;
}

.menu-item:hover { border-color: rgba(79,124,255,.4); background: rgba(79,124,255,.1); }
.menu-item.danger { color: var(--danger); }

.floating-trigger {
  width: 56px; height: 56px; border-radius: 999px; font-size: 1.4rem;
  box-shadow: var(--shadow);
  background: var(--panelBg);
  color: var(--text);
  border: 1px solid var(--line);
  font-family: "SF Pro Display", "Segoe UI", Inter, system-ui, sans-serif;
  font-size: 1.18rem;
  font-weight: 800;
  letter-spacing: .16em;
  line-height: 1;
}

.delete-toolbar .btn-primary {
  background: var(--dangerSoft);
  color: var(--dangerText);
  border: 1px solid var(--dangerBorder);
}

.delete-toolbar.visibility-mode .btn-primary {
  background: var(--accent);
  color: #fff;
  border: 0;
}

#hiddenSection {
  position: relative;
  z-index: 1;
}

.project-card.visibility-pending {
  border-color: var(--accent);
  box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 24%, transparent);
}

.visibility-toggle {
  position: absolute;
  top: 12px;
  right: 12px;
  padding: 8px 12px;
  font-size: .72rem;
  border-radius: 999px;
  z-index: 12;
}

.delete-toolbar {
  position: fixed; right: 18px; bottom: 18px; left: auto;
  width: min(520px, calc(100vw - 36px));
  display: none; align-items: center; justify-content: space-between; gap: 12px;
  padding: 14px 16px; border-radius: 18px; border: 1px solid var(--line);
  background: var(--panelBg); box-shadow: var(--shadow); z-index: 111;
}

.delete-toolbar.show { display: flex; }

.toolbar-copy { display: grid; gap: 4px; min-width: 0; }

.settings-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.settings-row {
  display: flex; align-items: center; justify-content: space-between; gap: 16px;
  padding: 14px 16px; border: 1px solid var(--line); border-radius: 18px; background: var(--surfaceSoft);
}

.settings-copy { display: grid; gap: 4px; }
.settings-copy strong { font-size: .98rem; }

.theme-switch {
  position: relative; width: 52px; height: 32px; border: 0; border-radius: 999px;
  background: var(--toggleOff); cursor: pointer; flex-shrink: 0; transition: background .18s ease;
}

.theme-switch::after {
  content: ""; position: absolute; top: 3px; left: 3px; width: 26px; height: 26px;
  border-radius: 999px; background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,.18);
  transition: transform .18s ease;
}

.theme-switch.active { background: var(--accent); }
.theme-switch.active::after { transform: translateX(20px); }

/* Icon Picker */
.icon-picker { 
  position: fixed; inset: 0; background: rgba(7,10,18,.68); 
  display: none; align-items: center; justify-content: center; padding: 16px; z-index: 110; 
}
.icon-picker.show { display: flex; }
.icon-picker-panel { 
  width: min(760px, 100%); max-height: calc(100vh - 32px); background: var(--panelBg); 
  border: 1px solid var(--line); border-radius: 24px; padding: 18px; display: flex; flex-direction: column; 
}
.icon-picker-grid { 
  display: grid; grid-template-columns: repeat(auto-fit, minmax(92px, 1fr)); gap: 12px; 
  margin-top: 14px; overflow-y: auto; padding-right: 4px; 
}
.icon-choice { 
  background: var(--surfaceSoft); border: 1px solid var(--line); border-radius: 18px; 
  padding: 12px; cursor: pointer; color: var(--text); display: grid; gap: 10px; justify-items: center; font: inherit;
}
.icon-choice:hover { border-color: rgba(79,124,255,.55); background: rgba(79,124,255,.08); }
.icon-choice-visual { 
  width: 46px; height: 46px; border-radius: 14px; display: grid; place-items: center; 
  background: var(--accentSoft); border: 1px solid rgba(79,124,255,.25); font-size: 1.25rem; 
}

.project-card { position: relative; } /* Needed for absolute positioning */

.hide-toggle {
  position: absolute; top: 12px; right: 12px;
  padding: 6px 12px; font-size: 0.7rem; text-transform: uppercase;
  letter-spacing: 0.05em; border-radius: 8px; z-index: 10;
  transition: all 0.2s ease; opacity: 0.8;
}
.project-card:hover .hide-toggle { opacity: 1; border-color: var(--accent); }

 

/* Responsiveness */
@media (min-width: 561px) {
  .hero-copy-wrap { padding-right: 140px; }
  .stats { margin-top: 54px; }
}

@media (max-width: 820px) {
  .form-grid { grid-template-columns: 1fr; }
  .span-2, .span-4 { grid-column: auto; }
  .project-card-top { flex-direction: column; }
  .project-meta { text-align: left; }
}

@media (max-width: 560px) {
  .page { width: calc(100% - 16px); padding-top: 16px; padding-bottom: 168px; }
  .card { padding: 16px; border-radius: 18px; }
  .hero-card { display: block; }
  .hero-copy-wrap { width: 100%; padding-right: 108px; }
  .stats { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); width: 100%; margin-top: 16px; }
  .stat { padding: 10px 12px; width: 100%; min-width: 0; }
  .stat-value { font-size: 1.05rem; }
  .settings-btn { top: 16px; right: 16px; }
  .project-card { padding: 14px; gap: 12px; }
  .project-icon { width: 50px; height: 50px; }
  .actions .btn { flex: 1; }
  .hide-toggle { top: 8px; right: 8px; padding: 8px 10px; }
  .project-meta { margin-top: 8px; grid-template-columns: minmax(0, 1.45fr) minmax(0, .95fr); width: 100%; }
  .icon-input-row { grid-template-columns: minmax(0, 1fr) 44px 40px; gap: 8px; }
  .icon-preview { width: 44px; height: 44px; }
  .template-icon-btn { width: 40px; height: 40px; }
  .floating-trigger { width: 58px; height: 58px; font-size: 1.5rem; }
  .floating-actions-menu { min-width: 196px; gap: 8px; }
  .menu-item { min-height: 48px; font-size: .96rem; }
  .delete-toolbar {
    right: 12px;
    bottom: 12px;
    width: calc(100vw - 24px);
    flex-direction: column;
    align-items: stretch;
  }
} 


.icon-choice {
  position: relative;
  background: var(--surfaceSoft);
  border: 1px solid var(--line);
  border-radius: 18px;
  padding: 12px;
  cursor: pointer;
  color: var(--text);
  display: grid;
  gap: 10px;
  justify-items: center;
  font: inherit;
}

.icon-choice-delete {
  position: absolute;
  top: 8px;
  right: 8px;
  width: 24px;
  height: 24px;
  border: 0;
  border-radius: 999px;
  background: rgba(0,0,0,.72);
  color: #fff;
  display: grid;
  place-items: center;
  cursor: pointer;
  font-size: 14px;
  line-height: 1;
  z-index: 2;
}

.icon-choice-delete:hover {
  background: rgba(255, 106, 106, .9);
}

.icon-choice-visual--fallback {
  background: #000;
  border: 1px solid rgba(255,255,255,.08);
}

.icon-choice-label {
  font-size: .84rem;
  color: var(--muted);
  line-height: 1.25;
  word-break: break-word;
}

<body>
  <div class="app-scroll" id="appScroll">
  <main class="page landing-page">
    <header class="landing-header">
      <h1 class="title">Projects</h1>
      <div class="nav-actions">
        <button id="themeToggleBtn" class="landing-settings settings-trigger" type="button" onclick="toggleTheme()" aria-label="Toggle light or dark appearance"></button>
      </div>
    </header>

    <section class="project-browser">
      <div class="search-shell">
        <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"></circle><path d="m20 20-3.5-3.5"></path></svg>
        <input id="projectSearch" type="search" inputmode="search" autocomplete="off" placeholder="Search projects" aria-label="Search projects">
        <button id="searchClear" class="search-clear" type="button" onclick="clearProjectSearch()" aria-label="Clear search" hidden>×</button>
      </div>
      <div class="segmented-control" role="group" aria-label="Filter projects">
        <button class="segment is-active" type="button" data-filter="all" onclick="setProjectFilter('all')">All <span id="allCount">0</span></button>
        <button class="segment" type="button" data-filter="open" onclick="setProjectFilter('open')">Open <span id="openCount">0</span></button>
        <button class="segment" type="button" data-filter="finished" onclick="setProjectFilter('finished')">Finished <span id="doneCount">0</span></button>
      </div>
      <div class="projects-surface">
        <div id="projectList" class="project-list" aria-live="polite"><div class="empty loading-skeleton">Loading projects…</div></div>
        <details class="hidden-section" id="hiddenSection" hidden>
          <summary><span>Hidden</span><span id="hiddenCount" class="hidden-count">0</span></summary>
          <div id="hiddenList" class="project-list"></div>
        </details>
      </div>
    </section>
  </main>
  </div>

  <div class="floating-actions" id="floatingActions">
    <div id="floatingActionsMenu" class="floating-actions-menu">
      <button class="menu-item" type="button" onclick="openCreateProjectModal()">New project</button>
      <button class="menu-item" type="button" onclick="enterVisibilityMode()">Visibility</button>
      <button class="menu-item danger" type="button" onclick="enterDeleteMode()">Delete</button>
    </div>
    <button class="floating-trigger" type="button" onclick="toggleFloatingActions(event)" aria-label="Project actions" aria-expanded="false"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg></button>
  </div>

  <div id="createProjectBackdrop" class="modal-backdrop">
    <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="createProjectTitle" onclick="event.stopPropagation()">
      <div class="modal-head">
        <h3 id="createProjectTitle">Create project</h3>
        <button class="icon-btn" type="button" onclick="closeCreateProjectModal()" aria-label="Close">×</button>
      </div>
      <form id="projectForm">
        <div class="form-grid">

  <script>
    const DEFAULT_STANDARD_ICONS = [
      { label: "Folder", value: "https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f4c1.png", removable: false },

      { label: "Code", value: "https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f4bb.png", removable: false },
      { label: "Chart", value: "https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f4ca.png", removable: false },

      { label: "Target", value: "https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f3af.png", removable: false }
    ];
    const STANDARD_ICONS_STORAGE_KEY = "project_manager_standard_icons";
    const THEME_STORAGE_KEY = "pm_theme_mode";
    let STANDARD_ICONS = loadStandardIcons();
    const projectList = document.getElementById("projectList");
    const projectForm = document.getElementById("projectForm");
    const allCount = document.getElementById("allCount");
    const openCount = document.getElementById("openCount");
    const doneCount = document.getElementById("doneCount");
    const settingsBackdrop = document.getElementById("settingsBackdrop");
    const themeSwitch = document.getElementById("themeSwitch");
    const createProjectBackdrop = document.getElementById("createProjectBackdrop");
    const floatingActions = document.getElementById("floatingActions");
    const floatingActionsMenu = document.getElementById("floatingActionsMenu");
    const deleteToolbar = document.getElementById("deleteToolbar");
    const deleteCount = document.getElementById("deleteCount");
    const toolbarHint = document.getElementById("toolbarHint");
    const toolbarConfirmBtn = document.getElementById("toolbarConfirmBtn");
    const projectSearch = document.getElementById("projectSearch");
    const searchClear = document.getElementById("searchClear");
    let currentProjects = [];
    let activeProjectFilter = "all";
    let deleteMode = false;
    let visibilityMode = false;
    let selectedProjectIds = new Set();
    let projectsRequestSequence = 0;
    let iconSearchTimer = null;



    function loadStandardIcons() {
      try {
        const saved = JSON.parse(localStorage.getItem(STANDARD_ICONS_STORAGE_KEY) || "null");

        if (Array.isArray(saved) && saved.length) {
          const defaultValues = new Set(DEFAULT_STANDARD_ICONS.map(icon => String(icon.value).trim()));

          return saved.map(icon => {
            const value = String(icon?.value || "").trim();

            return {
              label: String(icon?.label || "Custom").trim() || "Custom",
              value,
              removable: "removable" in (icon || {})
                ? !!icon.removable
                : !defaultValues.has(value)
            };
          });
        }
      } catch {}

      return [...DEFAULT_STANDARD_ICONS];
    }
    function saveStandardIcons() { localStorage.setItem(STANDARD_ICONS_STORAGE_KEY, JSON.stringify(STANDARD_ICONS)); }
    function addToStandardIcons(iconValue, label = "Custom") {
      const value = String(iconValue || "").trim();
      if (!value) return;
      if (STANDARD_ICONS.some(icon => String(icon.value).trim() === value)) return;
      STANDARD_ICONS.unshift({ label: String(label || "Custom").trim() || "Custom", value, removable: true });
      saveStandardIcons();
    }
    function escapeHtml(value = "") { return String(value).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;"); }
    function normalizeDisplayText(value = "") { return String(value).replaceAll("-->", "→"); }
    function isImageUrl(value = "") { const v = String(value).trim(); return /^https?:\/\//i.test(v) && /\.(png|jpe?g|gif|webp|svg|avif)(\?.*)?$/i.test(v); }
    function renderIcon(icon, fallback = "📌", alt = "icon") { const value = String(icon || "").trim(); return isImageUrl(value) ? `<img src="${escapeHtml(value)}" alt="${escapeHtml(alt)}" style="width:100%;height:100%;object-fit:cover;border-radius:inherit;display:block;" />` : escapeHtml(value || fallback); }
    function clampIndent(level) { return Math.max(0, Math.min(3, Number(level) || 0)); }
    function renderFormattedText(value, fallback = "", compact = false) {
      const source = String(value || "").replace(/\r\n?/g, "\n");
      if (!source.trim()) return fallback ? `<div class="formatted-text${compact ? " compact" : ""}"><p class="formatted-paragraph">${escapeHtml(normalizeDisplayText(fallback))}</p></div>` : "";

      const lines = source.split("\n");
      const parts = [];
      let paragraphLines = [];
      let paragraphIndent = 0;
      let listItems = [];
      let listIndent = 0;

      function flushParagraph() {
        if (!paragraphLines.length) return;
        parts.push(`<p class="formatted-paragraph indent-${clampIndent(paragraphIndent)}">${escapeHtml(normalizeDisplayText(paragraphLines.join("\n")))}</p>`);
        paragraphLines = [];
        paragraphIndent = 0;
      }

      function flushList() {
        if (!listItems.length) return;
        parts.push(`<ul class="formatted-list indent-${clampIndent(listIndent)}">${listItems.join("")}</ul>`);
        listItems = [];
        listIndent = 0;
      }

      for (const rawLine of lines) {
        if (!rawLine.trim()) {
          flushParagraph();
          flushList();
          continue;
        }

        const indentMatch = rawLine.match(/^(\t*)/);
        const indent = indentMatch ? indentMatch[1].length : 0;
        const trimmedLine = rawLine.slice(indent);

        if (/^- /.test(trimmedLine)) {
          flushParagraph();
          if (listItems.length && indent !== listIndent) flushList();
          if (!listItems.length) listIndent = indent;
          listItems.push(`<li>${escapeHtml(normalizeDisplayText(trimmedLine.slice(2)))}</li>`);
          continue;
        }

        flushList();
        if (!paragraphLines.length) paragraphIndent = indent;
        paragraphLines.push(rawLine);
      }

      flushParagraph();
      flushList();
      return `<div class="formatted-text${compact ? " compact" : ""}">${parts.join("")}</div>`;
    }
    function updateIconPreview(inputId) {
      const input = document.getElementById(inputId);
      if (!input) return;
      const previewId = input.dataset.iconPreview;
      const preview = previewId ? document.getElementById(previewId) : null;
      if (!preview) return;
      preview.innerHTML = renderIcon(input.value, input.dataset.iconFallback || "📌", "icon preview");
    }
    const THEME_ICON_SUN = `<svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>`;
    const THEME_ICON_MOON = `<svg viewBox="0 0 24 24" aria-hidden="true" fill="currentColor"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/></svg>`;
    function applyTheme(theme, persist = false) {
      const resolved = theme === "light" ? "light" : "dark";
      document.documentElement.dataset.theme = resolved;
      document.documentElement.style.colorScheme = resolved;
      document.querySelector('meta[name="theme-color"]')?.setAttribute("content", resolved === "light" ? "#f2f2f7" : "#0b1020");
      if (persist) localStorage.setItem(THEME_STORAGE_KEY, resolved);
      const toggleBtn = document.getElementById("themeToggleBtn");
      if (toggleBtn) toggleBtn.innerHTML = resolved === "light" ? THEME_ICON_SUN : THEME_ICON_MOON;
    }
    function toggleTheme() { applyTheme(document.documentElement.dataset.theme === "light" ? "dark" : "light", true); }
    function confirmSheet({ title, message = "", confirmLabel = "OK", cancelLabel = "Cancel", destructive = false }) {
      return new Promise(resolve => {
        document.getElementById("confirmSheet")?.remove();
        const backdrop = document.createElement("div");
        backdrop.id = "confirmSheet";
        backdrop.className = "confirm-backdrop";
        backdrop.innerHTML = `<div class="confirm-alert" role="alertdialog" aria-modal="true" aria-label="${escapeHtml(title)}"><div class="confirm-copy"><strong>${escapeHtml(title)}</strong>${message ? `<p>${escapeHtml(message)}</p>` : ""}</div><div class="confirm-actions">${cancelLabel != null ? `<button class="confirm-btn" type="button" data-action="cancel">${escapeHtml(cancelLabel)}</button>` : ""}<button class="confirm-btn confirm-primary${destructive ? " destructive" : ""}" type="button" data-action="confirm">${escapeHtml(confirmLabel)}</button></div></div>`;
        const done = value => { backdrop.remove(); document.removeEventListener("keydown", onKey, true); resolve(value); };
        const onKey = event => { if (event.key === "Escape") { event.stopPropagation(); done(false); } };
        backdrop.addEventListener("click", event => {
          const action = event.target.closest("[data-action]")?.dataset.action;
          if (action) done(action === "confirm");
          else if (event.target === backdrop) done(false);
        });
        document.addEventListener("keydown", onKey, true);
        document.body.appendChild(backdrop);
        backdrop.querySelector(".confirm-primary")?.focus();
      });
    }
    function openSettingsModal() { settingsBackdrop?.classList.add("show"); }
    function closeSettingsModal() { settingsBackdrop?.classList.remove("show"); }
    function formatDeadline(deadline) { if (!deadline) return "No deadline"; const dt = new Date(deadline); if (Number.isNaN(dt.getTime())) return "Invalid deadline"; return dt.toLocaleString([], {year:"numeric",month:"short",day:"2-digit",hour:"2-digit",minute:"2-digit"}); }
    function formatTimeLeft(seconds) { if (seconds == null) return "No deadline"; if (seconds <= 0) return "Deadline passed"; const days = Math.floor(seconds / 86400); const hours = Math.floor((seconds % 86400) / 3600); const minutes = Math.floor((seconds % 3600) / 60); if (days > 0) return `${days}d ${hours}h left`; if (hours > 0) return `${hours}h ${minutes}m left`; return `${minutes}m left`; }
    function isDueSoon(seconds) { return seconds != null && seconds > 0 && seconds <= 7 * 24 * 60 * 60; }
    function landingStandardIconChoicesHtml(targetInputId, fallback, currentValue = "") {
      return STANDARD_ICONS.map((icon, index) => {
        const safeLabel = escapeHtml(icon.label || "");
        const safeValue = String(icon.value || "").trim();
        return `<div class="icon-choice${currentValue === safeValue ? " is-selected" : ""}" onclick='selectStandardIcon(${JSON.stringify(targetInputId)}, ${JSON.stringify(safeValue)})' role="button" tabindex="0" aria-label="${safeLabel}">${icon.removable ? `<button class="icon-choice-delete" type="button" onclick="event.stopPropagation(); removeStandardIcon(${index})" title="Delete icon" aria-label="Delete icon">×</button>` : ""}<div class="icon-choice-visual">${renderIcon(safeValue, fallback, safeLabel)}</div></div>`;
      }).join("");
    }

    function buildIconPickerHtml(targetInputId, fallback) {
      const currentValue = String(document.getElementById(targetInputId)?.value || "").trim();
      return `
        <div id="iconPicker" class="icon-picker show" data-target-input-id="${targetInputId}" data-fallback="${fallback}">
          <div class="icon-picker-panel">
            <div class="panel-head">
              <h2 class="panel-title">Choose icon</h2>
              <button class="panel-x" type="button" onclick="closeIconPicker()" aria-label="Close">×</button>
            </div>

            <div class="icon-search-row"><input id="landingIconSearchInput" type="search" inputmode="search" autocomplete="off" placeholder="Search open-source icons" aria-label="Search open-source icons"></div>
            <div id="landingIconSearchStatus" class="icon-search-status">Suggestions</div>
            <div id="landingIconPickerGrid" class="icon-picker-grid">${landingStandardIconChoicesHtml(targetInputId, fallback, currentValue)}</div>
            <details class="icon-custom-details"><summary>Use emoji or image URL</summary><div class="icon-custom-row"><input id="landingIconPickerCustomInput" value="${escapeHtml(currentValue)}" placeholder="Emoji or image URL" aria-label="Custom icon value"><button class="btn btn-primary" type="button" onclick='applyIconPickerCustom(${JSON.stringify(targetInputId)})'>Use</button></div></details>
            <a class="icon-source-note" href="https://iconify.design" target="_blank" rel="noreferrer">Open-source icons via Iconify</a>
          </div>
        </div>
      `;
    }

    function openIconPicker(targetInputId, fallback = "📌") {
      closeIconPicker();
      document.body.insertAdjacentHTML("beforeend", buildIconPickerHtml(targetInputId, fallback));
      wireIconPicker(targetInputId);
    }

    function wireIconPicker(targetInputId) {
      const picker = document.getElementById("iconPicker");
      picker.addEventListener("click", (event) => {
        if (event.target === picker) closeIconPicker();
      });
      picker.addEventListener("keydown", event => {
        if (!["Enter", " "].includes(event.key)) return;
        const choice = event.target.closest(".icon-choice");
        if (!choice) return;
        event.preventDefault();
        choice.click();
      });
      document.getElementById("landingIconPickerCustomInput")?.addEventListener("keydown", event => {
        if (event.key === "Enter") { event.preventDefault(); applyIconPickerCustom(targetInputId); }
      });
      document.getElementById("landingIconSearchInput")?.addEventListener("input", event => {
        clearTimeout(iconSearchTimer);
        iconSearchTimer = setTimeout(() => searchLandingRemoteIcons(targetInputId, document.getElementById("iconPicker")?.dataset.fallback || "📌", event.target.value), 280);
      });
    }

    function closeIconPicker() {
      document.getElementById("iconPicker")?.remove();
    }

    function selectStandardIcon(targetInputId, value) {
      const input = document.getElementById(targetInputId);
      if (input) input.value = value;
      if (input) updateIconPreview(targetInputId);
      closeIconPicker();
    }

    function applyIconPickerCustom(targetInputId) {
      const value = document.getElementById("landingIconPickerCustomInput")?.value.trim();
      if (!value) return;
      selectStandardIcon(targetInputId, value);
    }

    async function searchLandingRemoteIcons(targetInputId, fallback, query) {
      const normalized = String(query || "").trim();
      const grid = document.getElementById("landingIconPickerGrid");
      const status = document.getElementById("landingIconSearchStatus");
      if (!grid || !status) return;
      if (normalized.length < 2) {
        status.textContent = "Suggestions";
        grid.innerHTML = landingStandardIconChoicesHtml(targetInputId, fallback, String(document.getElementById(targetInputId)?.value || "").trim());
        return;
      }
      status.textContent = "Searching…";
      try {
        const icons = await window.IconifyCatalog.search(normalized);
        if (document.getElementById("landingIconSearchInput")?.value.trim() !== normalized) return;
        status.textContent = icons.length ? `${icons.length} results` : "No icons found";
        grid.innerHTML = icons.map(icon => `<div class="icon-choice" onclick='selectStandardIcon(${JSON.stringify(targetInputId)}, ${JSON.stringify(icon.url)})' role="button" tabindex="0" aria-label="${escapeHtml(icon.name)}"><div class="icon-choice-visual">${renderIcon(icon.url, fallback, icon.name)}</div></div>`).join("");
      } catch {
        status.textContent = "Icon search unavailable";
      }
    }

    function removeStandardIcon(index) {
      const icon = STANDARD_ICONS[index];
      if (!icon || !icon.removable) return;

      STANDARD_ICONS.splice(index, 1);
      saveStandardIcons();

      const picker = document.getElementById("iconPicker");
      if (!picker) return;

      const targetInputId = picker.dataset.targetInputId || "";
      const fallback = picker.dataset.fallback || "📌";

      picker.remove();
      document.body.insertAdjacentHTML("beforeend", buildIconPickerHtml(targetInputId, fallback));
      wireIconPicker(targetInputId);
    }
const HIDDEN_KEY = "pm_hidden_ids";
let hiddenIds = new Set(JSON.parse(localStorage.getItem(HIDDEN_KEY) || "[]"));

document.getElementById("icon")?.addEventListener("input", () => updateIconPreview("icon"));
updateIconPreview("icon");
applyTheme(document.documentElement.dataset.theme || "dark");
matchMedia("(prefers-color-scheme: light)").addEventListener("change", event => {
  if (!localStorage.getItem(THEME_STORAGE_KEY)) applyTheme(event.matches ? "light" : "dark");
});

function closeCreateProjectModal() {
  projectForm.reset();
  updateIconPreview("icon");
  createProjectBackdrop.classList.remove("show");
}

function openCreateProjectModal() {
  closeFloatingActions();
  createProjectBackdrop.classList.add("show");
}

function toggleFloatingActions(event) {
  event.stopPropagation();
  const isOpen = floatingActionsMenu.classList.toggle("show");
  event.currentTarget?.setAttribute("aria-expanded", String(isOpen));
}

function closeFloatingActions() {
  floatingActionsMenu.classList.remove("show");
  floatingActions.querySelector(".floating-trigger")?.setAttribute("aria-expanded", "false");
}

function updateDeleteToolbar() {
  if (deleteMode) {
    deleteCount.textContent = `${selectedProjectIds.size} selected`;
    toolbarHint.textContent = "Selected projects will be deleted permanently.";
    toolbarConfirmBtn.textContent = "Delete";
    toolbarConfirmBtn.onclick = confirmDeleteSelected;
  } else if (visibilityMode) {
    deleteCount.textContent = `${selectedProjectIds.size} visible`;
    toolbarHint.textContent = "Highlighted projects will stay visible after confirm.";
    toolbarConfirmBtn.textContent = "Confirm";
    toolbarConfirmBtn.onclick = confirmVisibilityChanges;
  }
  deleteToolbar.classList.toggle("show", deleteMode || visibilityMode);
  deleteToolbar.classList.toggle("visibility-mode", visibilityMode);
  floatingActions.classList.toggle("hidden", deleteMode || visibilityMode);
}

function enterDeleteMode() {
  closeFloatingActions();
  visibilityMode = false;
  deleteMode = true;
  selectedProjectIds.clear();
  updateDeleteToolbar();
  renderProjects();
}

function enterVisibilityMode() {
  closeFloatingActions();
  deleteMode = false;
  visibilityMode = true;
  selectedProjectIds = new Set(currentProjects.filter(project => !hiddenIds.has(project.id)).map(project => project.id));
  updateDeleteToolbar();
  renderProjects();
}

function cancelActionMode() {
  deleteMode = false;
  visibilityMode = false;
  selectedProjectIds.clear();
  updateDeleteToolbar();
  renderProjects();
}

function toggleProjectSelection(event, id) {
  if (!deleteMode) return;
  event.preventDefault();
  event.stopPropagation();
  if (selectedProjectIds.has(id)) selectedProjectIds.delete(id);
  else selectedProjectIds.add(id);
  updateDeleteToolbar();
  renderProjects();
}

async function confirmDeleteSelected() {
  if (!selectedProjectIds.size) return;
  const count = selectedProjectIds.size;
  const confirmed = await confirmSheet({
    title: count === 1 ? "Delete Project?" : `Delete ${count} Projects?`,
    message: "This cannot be undone.",
    confirmLabel: "Delete",
    destructive: true
  });
  if (!confirmed) return;
  await Promise.all([...selectedProjectIds].map(id => fetch(`/api/projects/${id}`, { method: "DELETE" })));
  cancelActionMode();
  await loadProjects(true);
}

function togglePendingVisibility(event, id) {
  if (!visibilityMode) return;
  event.preventDefault();
  event.stopPropagation();
  if (selectedProjectIds.has(id)) selectedProjectIds.delete(id);
  else selectedProjectIds.add(id);
  updateDeleteToolbar();
  renderProjects();
}

function confirmVisibilityChanges() {
  hiddenIds = new Set();
  for (const { id } of currentProjects) {
    if (!selectedProjectIds.has(id)) hiddenIds.add(id);
  }
  localStorage.setItem(HIDDEN_KEY, JSON.stringify([...hiddenIds]));
  window.pmAnimate(cancelActionMode);
}

function setProjectFilter(filter) {
  activeProjectFilter = ["all", "open", "finished"].includes(filter) ? filter : "all";
  document.querySelectorAll(".segment").forEach(button => {
    button.classList.toggle("is-active", button.dataset.filter === activeProjectFilter);
  });
  renderProjects();
}

function clearProjectSearch() {
  projectSearch.value = "";
  searchClear.hidden = true;
  projectSearch.focus();
  renderProjects();
}

const SWIPE_ICON_HIDE = `<svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3l18 18"/><path d="M10.6 5.1A10.4 10.4 0 0 1 12 5c7 0 10 7 10 7a17.6 17.6 0 0 1-3.2 4.2M6.6 6.6A16.7 16.7 0 0 0 2 12s3 7 10 7a9.9 9.9 0 0 0 4.4-1"/><path d="M9.9 9.9a3 3 0 0 0 4.2 4.2"/></svg>`;
const SWIPE_ICON_SHOW = `<svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>`;
const SWIPE_ICON_DELETE = `<svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16M10 11v6M14 11v6M6 7l1 13h10l1-13M9 7V4h6v3"/></svg>`;

window.pmSwipeDisabled = () => deleteMode || visibilityMode;

function swipeToggleHidden(event, id) {
  event.preventDefault();
  event.stopPropagation();
  if (hiddenIds.has(id)) hiddenIds.delete(id);
  else hiddenIds.add(id);
  localStorage.setItem(HIDDEN_KEY, JSON.stringify([...hiddenIds]));
  window.pmSwipeClose?.();
  window.pmAnimate(renderProjects);
}

async function swipeDelete(event, id) {
  event.preventDefault();
  event.stopPropagation();
  window.pmSwipeClose?.();
  const confirmed = await confirmSheet({ title: "Delete Project?", message: "This cannot be undone.", confirmLabel: "Delete", destructive: true });
  if (!confirmed) return;
  await fetch(`/api/projects/${id}`, { method: "DELETE" });
  await loadProjects(true);
}

window.swipeToggleHidden = swipeToggleHidden;
window.swipeDelete = swipeDelete;

function renderProjects() {
  window.pmSwipeClose?.();
  const projects = currentProjects;
  allCount.textContent = projects.length;
  doneCount.textContent = projects.filter(p => p.finished).length;
  openCount.textContent = projects.filter(p => !p.finished).length;

  const renderCard = (p) => {
    const isVisible = visibilityMode ? selectedProjectIds.has(p.id) : !hiddenIds.has(p.id);
    const swipeable = !deleteMode && !visibilityMode;
    return `
      <div class="swipe-row" style="view-transition-name: p-${String(p.id).replace(/[^a-zA-Z0-9-]/g, "")}">
      ${swipeable ? `<div class="swipe-actions"><button class="swipe-btn swipe-hide" type="button" onclick="swipeToggleHidden(event, '${p.id}')">${hiddenIds.has(p.id) ? SWIPE_ICON_SHOW : SWIPE_ICON_HIDE}<span>${hiddenIds.has(p.id) ? "Show" : "Hide"}</span></button><button class="swipe-btn swipe-delete" type="button" onclick="swipeDelete(event, '${p.id}')">${SWIPE_ICON_DELETE}<span>Delete</span></button></div>` : ""}
      <a class="project-card swipe-target${p.finished ? " is-finished" : ""}${deleteMode && selectedProjectIds.has(p.id) ? " selected-for-delete" : ""}${visibilityMode && isVisible ? " visibility-selected" : ""}" href="/project?id=${encodeURIComponent(p.id)}" onclick="${deleteMode ? `toggleProjectSelection(event, '${p.id}')` : visibilityMode ? `togglePendingVisibility(event, '${p.id}')` : ""}">
        <div class="project-icon">
          ${renderIcon(p.icon, "📌", p.name)}
        </div>

        <div class="project-card-body">
          <div class="project-card-top">
            <div class="project-copy">
              <h3 class="project-name">${escapeHtml(normalizeDisplayText(p.name))}</h3>
              <div class="project-desc">${renderFormattedText(p.description || "", "", true)}</div>
            </div>
          </div>
          ${Number(p.task_total) > 0 ? `<div class="project-progress"><div class="project-progress-track"><div class="project-progress-fill" style="width:${Math.round((Number(p.task_done) || 0) / Number(p.task_total) * 100)}%"></div></div><span>${Number(p.task_done) || 0}/${Number(p.task_total)} tasks</span></div>` : ""}
          ${window.pmMeta.line({ deadline: p.deadline, secondsLeft: p.seconds_left, finished: p.finished })}
        </div>
        ${visibilityMode ? `<button class="btn btn-secondary visibility-toggle" type="button" onclick="togglePendingVisibility(event, '${p.id}')">${isVisible ? "Visible" : "Hidden"}</button>` : ""}
      </a>
      </div>`;
  };

    const query = projectSearch.value.trim().toLocaleLowerCase();
    const matchesSearch = p => !query || `${p.name || ""} ${p.description || ""}`.toLocaleLowerCase().includes(query);
    const matchesFilter = p => activeProjectFilter === "all" || (activeProjectFilter === "finished" ? p.finished : !p.finished);
    const filtered = projects.filter(p => matchesSearch(p) && matchesFilter(p));
    const visible = visibilityMode ? filtered : filtered.filter(p => !hiddenIds.has(p.id));
    const hidden = visibilityMode ? [] : filtered.filter(p => hiddenIds.has(p.id));

  projectList.innerHTML = visible.length ? visible.map(renderCard).join("") : `<div class="empty">${query || activeProjectFilter !== "all" ? "No matching projects." : "No active projects yet."}</div>`;
  
  const hSection = document.getElementById("hiddenSection");
  if (hidden.length) {
    hSection.hidden = false;
    document.getElementById("hiddenCount").textContent = String(hidden.length);
    document.getElementById("hiddenList").innerHTML = hidden.map(renderCard).join("");
  } else {
    hSection.hidden = true;
    document.getElementById("hiddenList").innerHTML = "";
  }
}

async function loadProjects(animate = false) {
  const requestSequence = ++projectsRequestSequence;
  const res = await fetch("/api/projects?summary=1", { headers: { "Accept": "application/json" } });
  if (!res.ok) throw new Error("Could not load projects");
  const incomingProjects = await res.json();
  if (requestSequence !== projectsRequestSequence) return;
  if (visibilityMode) {
    const previousIds = new Set(currentProjects.map(project => project.id));
    const incomingIds = new Set(incomingProjects.map(project => project.id));
    selectedProjectIds = new Set([...selectedProjectIds].filter(id => incomingIds.has(id)));
    for (const project of incomingProjects) {
      if (!previousIds.has(project.id) && !hiddenIds.has(project.id)) selectedProjectIds.add(project.id);
    }
  }
  currentProjects = incomingProjects;
  try { localStorage.setItem("pm_project_summaries", JSON.stringify(currentProjects)); } catch { }
  if (animate) window.pmAnimate(renderProjects);
  else renderProjects();
}

function renderCachedProjects() {
  try {
    const cachedProjects = JSON.parse(localStorage.getItem("pm_project_summaries") || "null");
    if (!Array.isArray(cachedProjects)) return false;
    currentProjects = cachedProjects;
    renderProjects();
    return true;
  } catch {
    return false;
  }
}

    projectForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      const rawIcon = projectForm.icon.value.trim() || "📌";
      addToStandardIcons(rawIcon, projectForm.name.value.trim() || "Project");
      const payload = {
        name: projectForm.name.value.trim(),
        icon: rawIcon,
        deadline: projectForm.deadline.value ? new Date(projectForm.deadline.value).toISOString() : null,
        description: projectForm.description.value.trim(),
        finished: false,
        links: [],
        steps: []
      };
      const res = await fetch("/api/projects", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
      if (!res.ok) { confirmSheet({ title: "Could Not Create Project", message: "Please check your connection and try again.", cancelLabel: null }); return; }
      closeCreateProjectModal();
      await loadProjects();
    });

    window.openIconPicker = openIconPicker;
    window.closeIconPicker = closeIconPicker;
    window.selectStandardIcon = selectStandardIcon;
    window.openCreateProjectModal = openCreateProjectModal;
    window.closeCreateProjectModal = closeCreateProjectModal;
    window.toggleFloatingActions = toggleFloatingActions;
    window.enterDeleteMode = enterDeleteMode;
    window.enterVisibilityMode = enterVisibilityMode;
    window.cancelActionMode = cancelActionMode;
    window.confirmDeleteSelected = confirmDeleteSelected;
    window.toggleProjectSelection = toggleProjectSelection;
    window.togglePendingVisibility = togglePendingVisibility;
    window.confirmVisibilityChanges = confirmVisibilityChanges;
    window.openSettingsModal = openSettingsModal;
    window.closeSettingsModal = closeSettingsModal;
    window.toggleTheme = toggleTheme;
    window.setProjectFilter = setProjectFilter;
    window.clearProjectSearch = clearProjectSearch;
    projectSearch.addEventListener("input", () => {
      searchClear.hidden = !projectSearch.value;
      renderProjects();
    });
    document.querySelector("#hiddenSection summary")?.addEventListener("click", event => {
      if (!document.startViewTransition || matchMedia("(prefers-reduced-motion: reduce)").matches) return;
      event.preventDefault();
      const section = document.getElementById("hiddenSection");
      window.pmAnimate(() => { section.open = !section.open; });
    });
    settingsBackdrop?.addEventListener("click", (event) => { if (event.target === settingsBackdrop) closeSettingsModal(); });
    createProjectBackdrop?.addEventListener("click", (event) => { if (event.target === createProjectBackdrop) closeCreateProjectModal(); });
    document.addEventListener("click", () => closeFloatingActions());
    document.addEventListener("keydown", (event) => {
      if (event.key !== "Escape") return;
      closeSettingsModal();
      closeCreateProjectModal();
      closeFloatingActions();
    });
    updateDeleteToolbar();
    renderCachedProjects();
    window.addEventListener("pageshow", event => {
      if (!event.persisted) return;
      renderCachedProjects();
      loadProjects().catch(() => {});
    });
    loadProjects().catch(() => {
      if (!currentProjects.length) projectList.innerHTML = `<div class="empty">Could not load projects.</div>`;
    });
  </script>
</body>
