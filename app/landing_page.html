  <script>
    (() => {
      const saved = localStorage.getItem("pm_theme_mode");
      const theme = saved === "light" || saved === "dark"
        ? saved
        : (matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark");
      document.documentElement.dataset.theme = theme;
      document.documentElement.style.colorScheme = theme;
      document.querySelector('meta[name="theme-color"]')?.setAttribute("content", theme === "light" ? "#f2f2f7" : "#0b1020");
    })();
  </script>

  <script>
    const DEFAULT_STANDARD_ICONS = [
      { label: "Folder", value: "https://api.iconify.design/lucide/folder.svg", removable: false },
      { label: "Document", value: "https://api.iconify.design/lucide/file-text.svg", removable: false },
      { label: "Education", value: "https://api.iconify.design/lucide/graduation-cap.svg", removable: false },
      { label: "Launch", value: "https://api.iconify.design/lucide/rocket.svg", removable: false },
      { label: "Code", value: "https://api.iconify.design/lucide/code-2.svg", removable: false },
      { label: "Analytics", value: "https://api.iconify.design/lucide/chart-no-axes-column-increasing.svg", removable: false },
      { label: "Link", value: "https://api.iconify.design/lucide/link.svg", removable: false },
      { label: "Design", value: "https://api.iconify.design/lucide/palette.svg", removable: false },
      { label: "Calendar", value: "https://api.iconify.design/lucide/calendar-days.svg", removable: false },
      { label: "Goal", value: "https://api.iconify.design/lucide/crosshair.svg", removable: false }
    ];
    const LEGACY_STANDARD_ICON_VALUES = new Set(["1f4c1", "1f4c4", "1f393", "1f680", "1f4bb", "1f4ca", "1f517", "1f3a8", "1f4c5", "1f3af"].map(code => `https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/${code}.png`));
    const STANDARD_ICONS_STORAGE_KEY = "project_manager_standard_icons";
    const DEFAULT_PROJECT_ICON = "/static/icon-placeholder.svg";
    const THEME_STORAGE_KEY = "pm_theme_mode";
    const iconStore = window.PM.icons.createStore(DEFAULT_STANDARD_ICONS, LEGACY_STANDARD_ICON_VALUES);
    let STANDARD_ICONS = iconStore.load();
    const projectList = document.getElementById("projectList");
    const projectForm = document.getElementById("projectForm");
    const allCount = document.getElementById("allCount");
    const openCount = document.getElementById("openCount");
    const doneCount = document.getElementById("doneCount");
    const settingsBackdrop = document.getElementById("settingsBackdrop");
    const themeSwitch = document.getElementById("themeSwitch");
    const createProjectBackdrop = document.getElementById("createProjectBackdrop");
    const floatingActions = document.getElementById("floatingActions");
    const floatingActionsMenu = document.getElementById("floatingActionsMenu");
    const managementActions = document.getElementById("managementActions");
    const managementActionsMenu = document.getElementById("managementActionsMenu");
    const deleteToolbar = document.getElementById("deleteToolbar");
    const deleteCount = document.getElementById("deleteCount");
    const toolbarHint = document.getElementById("toolbarHint");
    const toolbarConfirmBtn = document.getElementById("toolbarConfirmBtn");
    const projectSearch = document.getElementById("projectSearch");
    const searchClear = document.getElementById("searchClear");
    let currentProjects = [];
    let deletedItems = [];
    let activeProjectFilter = "all";
    let deleteMode = false;
    let visibilityMode = false;
    let selectedProjectIds = new Set();
    let projectsRequestSequence = 0;
    let iconSearchTimer = null;
    const apiRequest = window.PM.api.request;



    function loadStandardIcons() {
      try {
        const saved = JSON.parse(localStorage.getItem(STANDARD_ICONS_STORAGE_KEY) || "null");

        if (Array.isArray(saved) && saved.length) {
          const defaultValues = new Set(DEFAULT_STANDARD_ICONS.map(icon => String(icon.value).trim()));
          const customIcons = saved.filter(icon => !LEGACY_STANDARD_ICON_VALUES.has(String(icon?.value || "").trim())).map(icon => {
            const value = String(icon?.value || "").trim();
            return {
              label: String(icon?.label || "Custom").trim() || "Custom",
              value,
              removable: "removable" in (icon || {})
                ? !!icon.removable
                : !defaultValues.has(value)
            };
          });
          return [...DEFAULT_STANDARD_ICONS, ...customIcons.filter(icon => !defaultValues.has(icon.value))];
        }
      } catch {}

      return [...DEFAULT_STANDARD_ICONS];
    }
    function saveStandardIcons() { iconStore.save(); }
    function addToStandardIcons(iconValue, label = "Custom") {
      iconStore.add(iconValue, label);
      STANDARD_ICONS = iconStore.values;
    }
    const { escape: escapeHtml, normalize: normalizeDisplayText, isImageUrl, icon: renderIcon } = window.PM.html;
    function clampIndent(level) { return Math.max(0, Math.min(3, Number(level) || 0)); }
    function renderFormattedText(value, fallback = "", compact = false) {
      const source = String(value || "").replace(/\r\n?/g, "\n");
      if (!source.trim()) return fallback ? `<div class="formatted-text${compact ? " compact" : ""}"><p class="formatted-paragraph">${escapeHtml(normalizeDisplayText(fallback))}</p></div>` : "";

      const lines = source.split("\n");
      const parts = [];
      let paragraphLines = [];
      let paragraphIndent = 0;
      let listItems = [];
      let listIndent = 0;

      function flushParagraph() {
        if (!paragraphLines.length) return;
        parts.push(`<p class="formatted-paragraph indent-${clampIndent(paragraphIndent)}">${escapeHtml(normalizeDisplayText(paragraphLines.join("\n")))}</p>`);
        paragraphLines = [];
        paragraphIndent = 0;
      }

      function flushList() {
        if (!listItems.length) return;
        parts.push(`<ul class="formatted-list indent-${clampIndent(listIndent)}">${listItems.join("")}</ul>`);
        listItems = [];
        listIndent = 0;
      }

      for (const rawLine of lines) {
        if (!rawLine.trim()) {
          flushParagraph();
          flushList();
          continue;
        }

        const indentMatch = rawLine.match(/^(\t*)/);
        const indent = indentMatch ? indentMatch[1].length : 0;
        const trimmedLine = rawLine.slice(indent);

        if (/^- /.test(trimmedLine)) {
          flushParagraph();
          if (listItems.length && indent !== listIndent) flushList();
          if (!listItems.length) listIndent = indent;
          listItems.push(`<li>${escapeHtml(normalizeDisplayText(trimmedLine.slice(2)))}</li>`);
          continue;
        }

        flushList();
        if (!paragraphLines.length) paragraphIndent = indent;
        paragraphLines.push(rawLine);
      }

      flushParagraph();
      flushList();
      return `<div class="formatted-text${compact ? " compact" : ""}">${parts.join("")}</div>`;
    }
    function updateIconPreview(inputId) {
      const input = document.getElementById(inputId);
      if (!input) return;
      const previewId = input.dataset.iconPreview;
      const preview = previewId ? document.getElementById(previewId) : null;
      if (!preview) return;
      preview.innerHTML = renderIcon(input.value, input.dataset.iconFallback || "📌", "icon preview");
    }
    const THEME_ICON_SUN = `<svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>`;
    const THEME_ICON_MOON = `<svg viewBox="0 0 24 24" aria-hidden="true" fill="currentColor"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/></svg>`;
    function applyTheme(theme, persist = false) {
      const resolved = window.PM.theme.apply(theme, persist);
      const toggleBtn = document.getElementById("themeToggleBtn");
      if (toggleBtn) toggleBtn.innerHTML = resolved === "light" ? THEME_ICON_SUN : THEME_ICON_MOON;
    }
    function toggleTheme() { applyTheme(document.documentElement.dataset.theme === "light" ? "dark" : "light", true); }
    function confirmSheet({ title, message = "", confirmLabel = "OK", cancelLabel = "Cancel", destructive = false }) {
      return new Promise(resolve => {
        document.getElementById("confirmSheet")?.remove();
        const backdrop = document.createElement("div");
        backdrop.id = "confirmSheet";
        backdrop.className = "confirm-backdrop";
        backdrop.innerHTML = `<div class="confirm-alert" role="alertdialog" aria-modal="true" aria-label="${escapeHtml(title)}"><div class="confirm-copy"><strong>${escapeHtml(title)}</strong>${message ? `<p>${escapeHtml(message)}</p>` : ""}</div><div class="confirm-actions">${cancelLabel != null ? `<button class="confirm-btn" type="button" data-action="cancel">${escapeHtml(cancelLabel)}</button>` : ""}<button class="confirm-btn confirm-primary${destructive ? " destructive" : ""}" type="button" data-action="confirm">${escapeHtml(confirmLabel)}</button></div></div>`;
        const done = value => { backdrop.remove(); document.removeEventListener("keydown", onKey, true); resolve(value); };
        const onKey = event => { if (event.key === "Escape") { event.stopPropagation(); done(false); } };
        backdrop.addEventListener("click", event => {
          const action = event.target.closest("[data-action]")?.dataset.action;
          if (action) done(action === "confirm");
          else if (event.target === backdrop) done(false);
        });
        document.addEventListener("keydown", onKey, true);
        document.body.appendChild(backdrop);
        backdrop.querySelector(".confirm-primary")?.focus();
      });
    }
    function openSettingsModal() { settingsBackdrop?.classList.add("show"); }
    function closeSettingsModal() { settingsBackdrop?.classList.remove("show"); }
    const formatDeadline = window.PM.time.formatDeadline;
    const formatTimeLeft = seconds => window.PM.time.formatRemaining(seconds);
    const isDueSoon = window.PM.time.dueSoon;
    function landingStandardIconChoicesHtml(targetInputId, fallback, currentValue = "") {
      return STANDARD_ICONS.map((icon, index) => {
        const safeLabel = escapeHtml(icon.label || "");
        const safeValue = String(icon.value || "").trim();
        return `<div class="icon-choice${currentValue === safeValue ? " is-selected" : ""}" onclick='selectStandardIcon(${JSON.stringify(targetInputId)}, ${JSON.stringify(safeValue)})' role="button" tabindex="0" aria-label="${safeLabel}">${icon.removable ? `<button class="icon-choice-delete" type="button" onclick="event.stopPropagation(); removeStandardIcon(${index})" title="Delete icon" aria-label="Delete icon">×</button>` : ""}<div class="icon-choice-visual">${renderIcon(safeValue, fallback, safeLabel)}</div></div>`;
      }).join("");
    }

    function buildIconPickerHtml(targetInputId, fallback) {
      const currentValue = String(document.getElementById(targetInputId)?.value || "").trim();
      return `
        <div id="iconPicker" class="icon-picker show" data-target-input-id="${targetInputId}" data-fallback="${fallback}" role="dialog" aria-modal="true" aria-label="Choose project icon">
          <div class="icon-picker-panel">
            <div class="panel-head">
              <h2 class="panel-title">Choose icon</h2>
              <button class="panel-x" type="button" onclick="closeIconPicker()" aria-label="Close">×</button>
            </div>

            <div class="icon-search-row"><input id="landingIconSearchInput" type="search" inputmode="search" autocomplete="off" placeholder="Search open-source icons" aria-label="Search open-source icons"></div>
            <div id="landingIconSearchStatus" class="icon-search-status">Suggestions</div>
            <div id="landingIconPickerGrid" class="icon-picker-grid">${landingStandardIconChoicesHtml(targetInputId, fallback, currentValue)}</div>
            <details class="icon-custom-details"><summary>Use emoji or image URL</summary><div class="icon-custom-row"><input id="landingIconPickerCustomInput" value="${escapeHtml(currentValue)}" placeholder="Emoji or image URL" aria-label="Custom icon value"><button class="btn btn-primary" type="button" onclick='applyIconPickerCustom(${JSON.stringify(targetInputId)})'>Use</button></div></details>
            <a class="icon-source-note" href="https://iconify.design" target="_blank" rel="noreferrer">Open-source icons via Iconify</a>
          </div>
        </div>
      `;
    }

    function openIconPicker(targetInputId, fallback = DEFAULT_PROJECT_ICON) {
      closeIconPicker();
      document.body.insertAdjacentHTML("beforeend", buildIconPickerHtml(targetInputId, fallback));
      wireIconPicker(targetInputId);
      window.pmSheetOpened?.(document.getElementById("iconPicker"), "#landingIconSearchInput");
    }

    function wireIconPicker(targetInputId) {
      const picker = document.getElementById("iconPicker");
      picker.addEventListener("click", (event) => {
        if (event.target === picker) closeIconPicker();
      });
      picker.addEventListener("keydown", event => {
        if (!["Enter", " "].includes(event.key)) return;
        const choice = event.target.closest(".icon-choice");
        if (!choice) return;
        event.preventDefault();
        choice.click();
      });
      document.getElementById("landingIconPickerCustomInput")?.addEventListener("keydown", event => {
        if (event.key === "Enter") { event.preventDefault(); applyIconPickerCustom(targetInputId); }
      });
      document.getElementById("landingIconSearchInput")?.addEventListener("input", event => {
        clearTimeout(iconSearchTimer);
        iconSearchTimer = setTimeout(() => searchLandingRemoteIcons(targetInputId, document.getElementById("iconPicker")?.dataset.fallback || "📌", event.target.value), 280);
      });
    }

    function closeIconPicker() {
      const picker = document.getElementById("iconPicker");
      if (!picker) return;
      window.pmSheetClosed?.(picker);
      picker.remove();
    }

    function selectStandardIcon(targetInputId, value) {
      const input = document.getElementById(targetInputId);
      if (input) input.value = value;
      if (input) updateIconPreview(targetInputId);
      closeIconPicker();
    }

    function applyIconPickerCustom(targetInputId) {
      const value = document.getElementById("landingIconPickerCustomInput")?.value.trim();
      if (!value) return;
      selectStandardIcon(targetInputId, value);
    }

    async function searchLandingRemoteIcons(targetInputId, fallback, query) {
      const normalized = String(query || "").trim();
      const grid = document.getElementById("landingIconPickerGrid");
      const status = document.getElementById("landingIconSearchStatus");
      if (!grid || !status) return;
      if (normalized.length < 2) {
        status.textContent = "Suggestions";
        grid.innerHTML = landingStandardIconChoicesHtml(targetInputId, fallback, String(document.getElementById(targetInputId)?.value || "").trim());
        return;
      }
      status.textContent = "Searching…";
      try {
        const icons = await window.IconifyCatalog.search(normalized);
        if (document.getElementById("landingIconSearchInput")?.value.trim() !== normalized) return;
        status.textContent = icons.length ? `${icons.length} results` : "No icons found";
        grid.innerHTML = icons.map(icon => `<div class="icon-choice" onclick='selectStandardIcon(${JSON.stringify(targetInputId)}, ${JSON.stringify(icon.url)})' role="button" tabindex="0" aria-label="${escapeHtml(icon.name)}"><div class="icon-choice-visual">${renderIcon(icon.url, fallback, icon.name)}</div></div>`).join("");
      } catch {
        status.textContent = "Icon search unavailable";
      }
    }

    function removeStandardIcon(index) {
      const icon = STANDARD_ICONS[index];
      if (!icon || !icon.removable) return;

      STANDARD_ICONS.splice(index, 1);
      saveStandardIcons();

      const picker = document.getElementById("iconPicker");
      if (!picker) return;

      const targetInputId = picker.dataset.targetInputId || "";
      const fallback = picker.dataset.fallback || "📌";

      picker.remove();
      document.body.insertAdjacentHTML("beforeend", buildIconPickerHtml(targetInputId, fallback));
      wireIconPicker(targetInputId);
    }
const HIDDEN_KEY = "pm_hidden_ids";
let hiddenIds = new Set(JSON.parse(localStorage.getItem(HIDDEN_KEY) || "[]"));

document.getElementById("icon")?.addEventListener("input", () => updateIconPreview("icon"));
updateIconPreview("icon");
applyTheme(document.documentElement.dataset.theme || "dark");
matchMedia("(prefers-color-scheme: light)").addEventListener("change", event => {
  if (!localStorage.getItem(THEME_STORAGE_KEY)) applyTheme(event.matches ? "light" : "dark");
});

function closeCreateProjectModal() {
  const wasOpen = createProjectBackdrop.classList.contains("show");
  projectForm.reset();
  updateIconPreview("icon");
  createProjectBackdrop.classList.remove("show");
  if (wasOpen) window.pmSheetClosed?.(createProjectBackdrop);
}

function openCreateProjectModal() {
  closeFloatingActions();
  closeManagementActions();
  createProjectBackdrop.classList.add("show");
  window.pmSheetOpened?.(createProjectBackdrop, "#name");
}

function toggleFloatingActions(event) {
  event.stopPropagation();
  const isOpen = floatingActionsMenu?.classList.toggle("show") || false;
  event.currentTarget?.setAttribute("aria-expanded", String(isOpen));
}

function closeFloatingActions() {
  floatingActionsMenu?.classList.remove("show");
  floatingActions.querySelector(".floating-trigger")?.setAttribute("aria-expanded", "false");
}

function toggleManagementActions(event) {
  event.stopPropagation();
  const isOpen = managementActionsMenu.classList.toggle("show");
  event.currentTarget.setAttribute("aria-expanded", String(isOpen));
}

function closeManagementActions() {
  managementActionsMenu?.classList.remove("show");
  managementActions?.querySelector(".floating-trigger")?.setAttribute("aria-expanded", "false");
}

function updateDeleteToolbar() {
  if (deleteMode) {
    deleteCount.textContent = `${selectedProjectIds.size} selected`;
    toolbarHint.textContent = "Selected projects will be deleted permanently.";
    toolbarConfirmBtn.textContent = "Delete";
    toolbarConfirmBtn.onclick = confirmDeleteSelected;
  } else if (visibilityMode) {
    deleteCount.textContent = `${selectedProjectIds.size} visible`;
    toolbarHint.textContent = "Highlighted projects will stay visible after confirm.";
    toolbarConfirmBtn.textContent = "Confirm";
    toolbarConfirmBtn.onclick = confirmVisibilityChanges;
  }
  deleteToolbar.classList.toggle("show", deleteMode || visibilityMode);
  deleteToolbar.classList.toggle("visibility-mode", visibilityMode);
  floatingActions.classList.toggle("hidden", deleteMode || visibilityMode);
}

function enterDeleteMode() {
  closeFloatingActions();
  closeManagementActions();
  visibilityMode = false;
  deleteMode = true;
  selectedProjectIds.clear();
  updateDeleteToolbar();
  renderProjects();
}

function enterVisibilityMode() {
  closeFloatingActions();
  closeManagementActions();
  deleteMode = false;
  visibilityMode = true;
  selectedProjectIds = new Set(currentProjects.filter(project => !hiddenIds.has(project.id)).map(project => project.id));
  updateDeleteToolbar();
  renderProjects();
}

function cancelActionMode() {
  deleteMode = false;
  visibilityMode = false;
  selectedProjectIds.clear();
  updateDeleteToolbar();
  renderProjects();
}

function toggleProjectSelection(event, id) {
  if (!deleteMode) return;
  event.preventDefault();
  event.stopPropagation();
  if (selectedProjectIds.has(id)) selectedProjectIds.delete(id);
  else selectedProjectIds.add(id);
  const selected = selectedProjectIds.has(id);
  const card = event.currentTarget?.closest(".project-card") || event.target.closest(".project-card");
  card?.classList.toggle("selected-for-delete", selected);
  card?.classList.toggle("has-visibility-toggle", selected);
  card?.setAttribute("aria-pressed", String(selected));
  const existingIndicator = card?.querySelector(".delete-selection-indicator");
  if (selected && !existingIndicator) {
    card?.insertAdjacentHTML("beforeend", `<span class="visibility-toggle delete-selection-indicator" aria-hidden="true">${SWIPE_ICON_DELETE}</span>`);
  } else if (!selected) existingIndicator?.remove();
  updateDeleteToolbar();
}

async function confirmDeleteSelected() {
  if (!selectedProjectIds.size) return;
  const count = selectedProjectIds.size;
  const confirmed = await confirmSheet({
    title: count === 1 ? "Move Project to Recently Deleted?" : `Move ${count} Projects to Recently Deleted?`,
    message: "You can restore them from Recently Deleted.",
    confirmLabel: "Move",
    destructive: true
  });
  if (!confirmed) return;
  const ids = [...selectedProjectIds];
  if (window.pmOffline?.offline()) {
    ids.forEach(id => window.pmOffline.queueDelete(id));
    currentProjects = currentProjects.filter(project => !ids.includes(project.id));
    localStorage.setItem("pm_project_summaries", JSON.stringify(currentProjects));
  } else await Promise.all(ids.map(id => apiRequest(`/api/projects/${id}`, { method: "DELETE" })));
  cancelActionMode();
  if (window.pmOffline?.offline()) renderProjects();
  else { await loadProjects(true); await loadDeletedItems(); }
}

function togglePendingVisibility(event, id) {
  if (!visibilityMode) return;
  event.preventDefault();
  event.stopPropagation();
  if (selectedProjectIds.has(id)) selectedProjectIds.delete(id);
  else selectedProjectIds.add(id);
  const visible = selectedProjectIds.has(id);
  const card = event.currentTarget?.closest(".project-card") || event.target.closest(".project-card");
  card?.classList.toggle("visibility-selected", visible);
  card?.setAttribute("aria-pressed", String(visible));
  const toggle = card?.querySelector(".visibility-toggle");
  if (toggle) toggle.innerHTML = visible ? VISIBILITY_ICON_VISIBLE : VISIBILITY_ICON_HIDDEN;
  updateDeleteToolbar();
}

function confirmVisibilityChanges() {
  hiddenIds = new Set();
  for (const { id } of currentProjects) {
    if (!selectedProjectIds.has(id)) hiddenIds.add(id);
  }
  localStorage.setItem(HIDDEN_KEY, JSON.stringify([...hiddenIds]));
  window.pmAnimate(cancelActionMode);
}

function setProjectFilter(filter) {
  activeProjectFilter = ["all", "open", "finished"].includes(filter) ? filter : "all";
  document.querySelectorAll(".segment").forEach(button => {
    const isActive = button.dataset.filter === activeProjectFilter;
    button.classList.toggle("is-active", isActive);
    button.setAttribute("aria-pressed", String(isActive));
  });
  if (!updateProjectFiltersInPlace()) renderProjects();
}

function clearProjectSearch() {
  projectSearch.value = "";
  searchClear.hidden = true;
  projectSearch.focus();
  if (!updateProjectFiltersInPlace()) renderProjects();
}

function toggleHiddenProjects(event) {
  event?.preventDefault();
  const section = document.getElementById("hiddenSection");
  const disclosure = document.getElementById("hiddenDisclosure");
  const summary = section?.querySelector(".hidden-summary");
  if (!section || !disclosure || !summary) return;

  const isOpen = section.classList.toggle("is-open");
  summary.setAttribute("aria-expanded", String(isOpen));
  disclosure.setAttribute("aria-hidden", String(!isOpen));
  disclosure.toggleAttribute("inert", !isOpen);
}

function toggleLastDeleted(event) {
  event?.preventDefault();
  const section = document.getElementById("lastDeletedSection");
  const disclosure = document.getElementById("lastDeletedDisclosure");
  const summary = section?.querySelector(".hidden-summary");
  if (!section || !disclosure || !summary) return;

  const isOpen = section.classList.toggle("is-open");
  summary.setAttribute("aria-expanded", String(isOpen));
  disclosure.setAttribute("aria-hidden", String(!isOpen));
  disclosure.toggleAttribute("inert", !isOpen);
}

function swipeToggleHidden(event, id) {
  event.preventDefault();
  event.stopPropagation();
  if (hiddenIds.has(id)) hiddenIds.delete(id);
  else hiddenIds.add(id);
  localStorage.setItem(HIDDEN_KEY, JSON.stringify([...hiddenIds]));
  window.pmSwipeClose?.();
  window.pmAnimate(renderProjects);
}

async function swipeDelete(event, id) {
  event.preventDefault();
  event.stopPropagation();
  window.pmSwipeClose?.();
  const confirmed = await confirmSheet({ title: "Move Project to Recently Deleted?", message: "You can restore it from Recently Deleted.", confirmLabel: "Move", destructive: true });
  if (!confirmed) return;
  await apiRequest(`/api/projects/${id}`, { method: "DELETE" });
  await loadProjects(true);
  await loadDeletedItems();
}

window.swipeToggleHidden = swipeToggleHidden;
window.swipeDelete = swipeDelete;

      <${deleteMode || visibilityMode ? "button" : "a"} class="project-card swipe-target${p.finished ? " is-finished" : ""}${visibilityMode || deleteMode && selectedProjectIds.has(p.id) ? " has-visibility-toggle" : ""}${deleteMode && selectedProjectIds.has(p.id) ? " selected-for-delete" : ""}${offlineUnavailable ? " is-offline-unavailable" : ""}${visibilityMode && isVisible ? " visibility-selected" : ""}" data-project-id="${escapeHtml(p.id)}" ${deleteMode || visibilityMode ? `type="button" aria-pressed="${deleteMode ? selectedProjectIds.has(p.id) : isVisible}" onclick="${deleteMode ? `toggleProjectSelection(event, '${p.id}')` : `togglePendingVisibility(event, '${p.id}')`}"` : `href="/project?id=${encodeURIComponent(p.id)}" aria-disabled="${offlineUnavailable}"`}>

          ${window.pmMeta.line({ deadline: p.deadline, secondsLeft: p.seconds_left, finished: p.finished })}

    const query = projectSearch.value.trim().toLocaleLowerCase();

    const matchesFilter = p => activeProjectFilter === "all" || (activeProjectFilter === "finished" ? p.finished : !p.finished);
    const filtered = projects.filter(p => matchesSearch(p) && matchesFilter(p));

async function updateOfflineProjectCacheStates() {
  const indicators = [...document.querySelectorAll("[data-project-cache-id]")];
  if (!indicators.length || !("caches" in window)) return;
  const offline = document.documentElement.hasAttribute("data-offline");
  try {
    const cache = await caches.open("project-manager-api-v2");
    await Promise.all(indicators.map(async indicator => {
      const id = indicator.dataset.projectCacheId;
      const localCopy = localStorage.getItem(`pm_project_${id}`);
      const cached = !!localCopy || !!(await cache.match(`/api/projects/${encodeURIComponent(id)}`));
      const card = indicator.closest(".project-card");
      card?.classList.toggle("is-offline-unavailable", offline && !cached);
      card?.setAttribute("aria-disabled", String(offline && !cached));
      indicator.classList.toggle("is-cached", cached);
      indicator.setAttribute("aria-label", cached ? "Available offline" : "");
      indicator.title = cached ? "Available offline" : "";
    }));
  } catch { }
}

function updateProjectFiltersInPlace() {
  if (deleteMode || visibilityMode || !currentProjects.length || projectList.querySelector(".empty-state")) return false;
  const rows = [...projectList.querySelectorAll(".swipe-row"), ...document.getElementById("hiddenList").querySelectorAll(".swipe-row")];
  if (rows.length !== currentProjects.length) return false;
  const projectsById = new Map(currentProjects.map(project => [project.id, project]));

  const query = projectSearch.value.trim().toLocaleLowerCase();
  const matchesProject = project => {
    const matchesSearch = !query || `${project.name || ""} ${project.description || ""}`.toLocaleLowerCase().includes(query);
    const matchesFilter = activeProjectFilter === "all" || (activeProjectFilter === "finished" ? project.finished : !project.finished);
    return matchesSearch && matchesFilter;
  };
  const hiddenSection = document.getElementById("hiddenSection");
  let visibleCount = 0;
  let hiddenCount = 0;

  for (const row of rows) {
    const href = row.querySelector(".project-card")?.getAttribute("href");
    const projectId = href ? new URL(href, window.location.origin).searchParams.get("id") : null;
    const project = projectsById.get(projectId);
    const matches = !!project && matchesProject(project);
    row.hidden = !matches;
    if (!matches) continue;
    if (row.closest("#hiddenSection")) hiddenCount += 1;
    else visibleCount += 1;
  }

  hiddenSection.hidden = hiddenCount === 0;
  document.getElementById("hiddenCount").textContent = String(hiddenCount);
  let empty = document.getElementById("projectFilterEmpty");
  if (!visibleCount) {
    if (!empty) {
      empty = document.createElement("div");
      empty.id = "projectFilterEmpty";
      empty.className = "empty";
      projectList.append(empty);
    }
    empty.textContent = query || activeProjectFilter !== "all" ? "No matching projects." : "No projects yet";
  } else {
    empty?.remove();
  }
  return true;
}

function formatDeletedItemTime(value) {
  const date = new Date(value);
  if (Number.isNaN(date.getTime())) return "Recently";
  return new Intl.DateTimeFormat(undefined, { month: "short", day: "numeric", hour: "numeric", minute: "2-digit" }).format(date);
}

function renderDeletedItems() {
  const section = document.getElementById("lastDeletedSection");
  const list = document.getElementById("lastDeletedList");
  if (!deletedItems.length) {
    section.hidden = true;
    list.innerHTML = "";
    return;
  }
  section.hidden = false;
  document.getElementById("lastDeletedCount").textContent = String(deletedItems.length);
  list.innerHTML = deletedItems.map(item => {
    const type = item.type === "project" ? "Project" : item.type === "link" ? "Link" : "Task";
    const context = item.project_name ? ` · ${escapeHtml(normalizeDisplayText(item.project_name))}` : "";
    return `<article class="last-deleted-item">
      <div class="last-deleted-icon">${item.type === "task" ? `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="m5 12 4.2 4.2L19 6.5"/></svg>` : renderIcon(item.icon, item.type === "link" ? "🔗" : "📌", item.title)}</div>
      <div class="last-deleted-copy"><strong>${escapeHtml(normalizeDisplayText(item.title))}</strong><span>${type}${context} · ${formatDeletedItemTime(item.deleted_at)}</span></div>
      <div class="last-deleted-actions"><button class="btn btn-secondary last-deleted-restore" type="button" onclick="restoreDeletedItem('${item.id}')">Restore</button><button class="last-deleted-remove" type="button" onclick="permanentlyDeleteItem('${item.id}')" aria-label="Delete ${escapeHtml(normalizeDisplayText(item.title))} permanently"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h16M10 11v6M14 11v6M6 7l1 13h10l1-13M9 7V4h6v3"/></svg></button></div>
    </article>`;
  }).join("");
}

async function loadDeletedItems() {
  const res = await apiRequest("/api/deleted-items", { headers: { "Accept": "application/json" } });
  if (!res.ok) return;
  deletedItems = await res.json();
  renderDeletedItems();
}

async function restoreDeletedItem(id) {
  const res = await apiRequest(`/api/deleted-items/${id}/restore`, { method: "POST" });
  if (!res.ok) {
    const body = await res.json().catch(() => ({}));
    await confirmSheet({ title: "Could Not Restore", message: body.error || "The original location is no longer available.", cancelLabel: null });
    return;
  }
  await Promise.all([loadProjects(true), loadDeletedItems()]);
}

async function permanentlyDeleteItem(id) {
  const confirmed = await confirmSheet({ title: "Delete Permanently?", message: "This cannot be undone.", confirmLabel: "Delete", destructive: true });
  if (!confirmed) return;
  const res = await apiRequest(`/api/deleted-items/${id}`, { method: "DELETE" });
  if (res.ok) await loadDeletedItems();
}

async function loadProjects(animate = false) {
  const requestSequence = ++projectsRequestSequence;
  const res = await apiRequest("/api/projects?summary=1", { headers: { "Accept": "application/json" } });
  if (!res.ok) throw new Error("Could not load projects");
  const incomingProjects = await res.json();
  if (requestSequence !== projectsRequestSequence) return;
  if (visibilityMode) {
    const previousIds = new Set(currentProjects.map(project => project.id));
    const incomingIds = new Set(incomingProjects.map(project => project.id));
    selectedProjectIds = new Set([...selectedProjectIds].filter(id => incomingIds.has(id)));
    for (const project of incomingProjects) {
      if (!previousIds.has(project.id) && !hiddenIds.has(project.id)) selectedProjectIds.add(project.id);
    }
  }
  currentProjects = incomingProjects;
  try { localStorage.setItem("pm_project_summaries", JSON.stringify(currentProjects)); } catch { }
  if (animate) window.pmAnimate(renderProjects);
  else renderProjects();
}

function renderCachedProjects() {
  try {
    const cachedProjects = JSON.parse(localStorage.getItem("pm_project_summaries") || "null");
    if (!Array.isArray(cachedProjects)) return false;
    currentProjects = cachedProjects;
    renderProjects();
    return true;
  } catch {
    return false;
  }
}

function rememberProjectNavigation(event) {
  const card = event.target.closest('a.project-card[data-project-id]');
  if (!card || event.defaultPrevented || event.metaKey || event.ctrlKey || event.shiftKey || event.altKey) return;
  const project = currentProjects.find(item => item.id === card.dataset.projectId);
  if (!project) return;
  try { sessionStorage.setItem("pm_project_loading_summary", JSON.stringify(project)); } catch { }
}

async function blockUnavailableOfflineProject(event) {
  if (!document.documentElement.hasAttribute("data-offline") && navigator.onLine) return;
  const card = event.target.closest("a.project-card[data-project-id]");
  if (!card) return;
  event.preventDefault();
  event.stopImmediatePropagation();
  const id = card.dataset.projectId;
  let cached = !!localStorage.getItem(`pm_project_${id}`);
  if (!cached && "caches" in window) {
    const cacheNames = ["project-manager-api-v2", "project-manager-api-v1"];
    for (const name of cacheNames) {
      const cache = await caches.open(name);
      if (await cache.match(`/api/projects/${encodeURIComponent(id)}`)) { cached = true; break; }
    }
  }
  if (cached) location.href = card.href;
  else confirmSheet({ title: "Project not saved offline", message: "Open this project once while connected to save it on this device.", cancelLabel: null });
}

    projectForm.addEventListener("submit", async (event) => {
      event.preventDefault();

      if (!updateProjectFiltersInPlace()) renderProjects();
    });
    settingsBackdrop?.addEventListener("click", (event) => { if (event.target === settingsBackdrop) closeSettingsModal(); });
    createProjectBackdrop?.addEventListener("click", (event) => { if (event.target === createProjectBackdrop) closeCreateProjectModal(); });
    document.addEventListener("click", () => { closeFloatingActions(); closeManagementActions(); });
    document.addEventListener("click", blockUnavailableOfflineProject, true);
    document.addEventListener("click", rememberProjectNavigation, true);
    window.addEventListener("pmconnectionchange", () => renderProjects());
    document.addEventListener("keydown", (event) => {
      if (event.key !== "Escape") return;
      closeSettingsModal();
      closeCreateProjectModal();
      closeFloatingActions();
      closeManagementActions();
    });
    updateDeleteToolbar();
    renderCachedProjects();
    function syncReturnedProjectList(reloadData = false) {
      const savedTheme = localStorage.getItem(THEME_STORAGE_KEY);
      applyTheme(savedTheme === "light" || savedTheme === "dark"
        ? savedTheme
        : (matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark"));
      window.pmRefreshConnection?.();
      if (!reloadData) return;
      renderCachedProjects();
      loadProjects().catch(() => {});
      loadDeletedItems().catch(() => {});
    }
    window.addEventListener("pageshow", () => {
      syncReturnedProjectList(true);
    });
    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible") syncReturnedProjectList(true);
    });
    window.addEventListener("focus", () => syncReturnedProjectList(false));
    loadProjects().catch(() => {
      if (!currentProjects.length) projectList.innerHTML = `<div class="empty">Could not load projects.</div>`;
    });
    loadDeletedItems().catch(() => {});
  </script>
</body>
</html>
