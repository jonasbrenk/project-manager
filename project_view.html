<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project View</title>
  <script>
    (() => {
      const key = "pm_theme_mode";
      const saved = localStorage.getItem(key);
      const theme = saved === "light" ? "light" : "dark";
      document.documentElement.dataset.theme = theme;
      document.documentElement.style.colorScheme = theme;
    })();
  </script>

  <style>
    :root {
      --bg: #0b1020;
      --card: rgba(19, 26, 47, .92);
      --card2: rgba(28, 38, 70, .8);
      --text: #eef2ff;
      --muted: #a8b3cf;
      --line: rgba(255, 255, 255, .08);
      --accent: #4f7cff;
      --accentSoft: rgba(79, 124, 255, .15);
      --danger: #ff6a6a;
      --shadow: 0 18px 50px rgba(0, 0, 0, .28);
      --radius: 22px;
      --bgTop: #172344;
      --bgBottom: #0b1020;
      --surfaceSoft: rgba(255, 255, 255, .05);
      --panelBg: #0f172d;
      --toggleOff: rgba(255, 255, 255, .16)
    }

    html[data-theme="light"] {
      --bg: #edf3ff;
      --card: rgba(255, 255, 255, .88);
      --card2: rgba(242, 247, 255, .92);
      --text: #17233c;
      --muted: #5d6a84;
      --line: rgba(23, 35, 60, .12);
      --accent: #2f6df6;
      --accentSoft: rgba(47, 109, 246, .12);
      --danger: #d74d4d;
      --shadow: 0 18px 45px rgba(63, 88, 138, .14);
      --bgTop: #f9fbff;
      --bgBottom: #dfe9ff;
      --surfaceSoft: rgba(20, 34, 59, .04);
      --panelBg: #ffffff;
      --toggleOff: rgba(21, 34, 59, .16)
    }

    * {
      box-sizing: border-box
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: radial-gradient(circle at top, var(--bgTop) 0%, var(--bgBottom) 58%);
      color: var(--text);
      font-family: Inter, system-ui, sans-serif
    }

    button,
    input,
    textarea {
      font: inherit
    }

    .page {
      width: min(1120px, calc(100% - 24px));
      margin: 0 auto;
      padding: 24px 0 90px
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      margin-bottom: 16px;
      flex-wrap: wrap
    }

    .back-link {
      text-decoration: none;
      color: var(--text);
      background: var(--surfaceSoft);
      border: 1px solid var(--line);
      padding: 10px 14px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      gap: 8px
    }

    .layout {
      display: grid;
      gap: 16px
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      padding: 18px
    }

    .hero {
      display: grid;
      gap: 18px
    }

    .hero-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      flex-wrap: wrap
    }

    .hero-title-wrap {
      display: flex;
      gap: 14px;
      align-items: center;
      min-width: 0
    }

    .hero-copy {
      min-width: 0;
      flex: 1 1 auto;
      display: grid;
      gap: 8px
    }

    .hero-icon {
      width: 64px;
      height: 64px;
      border-radius: 20px;
      display: grid;
      place-items: center;
      background: var(--accentSoft);
      border: 1px solid rgba(79, 124, 255, .28);
      font-size: 1.7rem;
      flex-shrink: 0;
      overflow: hidden
    }

    h1,
    h2,
    h3,
    p {
      margin: 0
    }

    .project-title {
      font-size: clamp(1.5rem, 3vw, 2.4rem);
      line-height: 1.1;
      margin-bottom: 8px;
      word-break: break-word
    }

    .muted {
      color: var(--muted);
      line-height: 1.5
    }

    .formatted-text {
      display: grid;
      gap: 8px;
      min-width: 0
    }

    .formatted-text.compact {
      gap: 6px
    }

    .formatted-paragraph {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      overflow-wrap: anywhere
    }

    .formatted-list {
      margin: 0;
      padding-left: 1.2rem;
      display: grid;
      gap: 4px
    }

    .formatted-list li {
      white-space: pre-wrap;
      word-break: break-word;
      overflow-wrap: anywhere
    }

    .indent-1 {
      margin-left: 1.4rem
    }

    .indent-2 {
      margin-left: 2.8rem
    }

    .indent-3 {
      margin-left: 4.2rem
    }

    .meta-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px
    }

    .meta-box {
      padding: 12px 16px;
      border-radius: 16px;
      background: var(--card2);
      border: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      justify-content: center
    }

    .meta-label {
      color: var(--muted);
      font-size: .65rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 4px
    }

    .meta-value {
      font-size: .95rem;
      font-weight: 700;
      line-height: 1.3;
      word-break: break-word
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap
    }

    .section-title {
      font-size: 1.08rem;
      font-weight: 700
    }

    .btn {
      border: 0;
      border-radius: 999px;
      padding: 11px 15px;
      cursor: pointer;
      font-weight: 600;
      white-space: nowrap
    }

    .btn-primary {
      background: var(--accent);
      color: white
    }

    .btn-secondary {
      background: var(--surfaceSoft);
      color: var(--text);
      border: 1px solid var(--line)
    }

    .btn-danger {
      background: rgba(255, 106, 106, .12);
      color: #ffd9d9;
      border: 1px solid rgba(255, 106, 106, .28)
    }

    .btn-ok {
      background: rgba(88, 196, 143, .12);
      color: #d9ffea;
      border: 1px solid rgba(88, 196, 143, .28)
    }

    .inline-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap
    }

    .links-grid,
    .step-tree {
      display: grid;
      gap: 12px
    }

    /* Standard link card */
    .link-card {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 14px;
      align-items: center;
      padding: 14px 52px 14px 14px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, .03);
      position: relative
    }

    .link-icon {
      width: 50px;
      height: 50px;
      display: grid;
      place-items: center;
      border-radius: 16px;
      background: var(--accentSoft);
      border: 1px solid rgba(79, 124, 255, .25);
      font-size: 1.35rem;
      overflow: hidden
    }

    .link-main {
      min-width: 0;
      overflow: hidden
    }

    .link-title {
      font-weight: 700;
      margin-bottom: 6px
    }

    .link-url {
      color: var(--muted);
      text-decoration: none;
      word-break: break-all;
      line-height: 1.4;
      text-wrap: nowrap;
      text-overflow: ellipsis;
    }

    /* Project link card */
    .link-card-project {
      align-items: flex-start;
      background: rgba(79, 124, 255, .05);
      border-color: rgba(79, 124, 255, .18);
      padding: 16px
    }

    .proj-link-icon {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      background: var(--accentSoft);
      border: 1px solid rgba(79, 124, 255, .3);
      font-size: 1.5rem;
      overflow: hidden;
      flex-shrink: 0
    }

    .proj-link-body {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 0
    }

    .proj-link-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
      flex-wrap: wrap
    }

    .proj-link-name {
      font-weight: 700;
      font-size: 1rem;
      line-height: 1.2
    }

    .proj-link-desc {
      color: var(--muted);
      font-size: .88rem;
      line-height: 1.4;
      margin-bottom: 6px
    }

    .proj-link-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 4px
    }

    .proj-status-badge {
      display: inline-flex;
      align-items: center;
      padding: 3px 9px;
      border-radius: 999px;
      font-size: .65rem;
      font-weight: 600;
      letter-spacing: .01em
    }

    .proj-status-badge.finished {
      background: rgba(88, 196, 143, .15);
      color: #58c48f;
      border: 1px solid rgba(88, 196, 143, .3)
    }

    .proj-status-badge.open {
      background: rgba(79, 124, 255, .12);
      color: #8faeff;
      border: 1px solid rgba(79, 124, 255, .25)
    }

    .proj-link-loading {
      opacity: .6
    }

    /* Project link picker modal */
    .proj-picker-grid {
      display: grid;
      gap: 8px;
      max-height: 52vh;
      overflow-y: auto;
      padding-right: 2px
    }

    .proj-picker-item {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255, 255, 255, .03);
      cursor: pointer;
      color: var(--text);
      text-align: left;
      transition: border-color .15s, background .15s;
      width: 100%
    }

    .proj-picker-item:hover {
      border-color: rgba(79, 124, 255, .4);
      background: rgba(79, 124, 255, .08)
    }

    .proj-picker-icon {
      width: 44px;
      height: 44px;
      border-radius: 13px;
      display: grid;
      place-items: center;
      background: var(--accentSoft);
      border: 1px solid rgba(79, 124, 255, .25);
      font-size: 1.25rem;
      overflow: hidden;
      flex-shrink: 0
    }

    .proj-picker-info {
      min-width: 0
    }

    .proj-picker-name {
      font-weight: 700;
      font-size: .95rem;
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .proj-picker-meta {
      color: var(--muted);
      font-size: .82rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .proj-picker-arrow {
      color: var(--muted);
      font-size: 1.1rem;
      flex-shrink: 0
    }

    .card-menu-wrap {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 3
    }

    .card-menu-wrap.open {
      z-index: 8
    }

    .card-menu-trigger {
      width: 34px;
      height: 34px;
      position: relative;
      z-index: 1
    }

    .card-menu {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      min-width: 160px;
      padding: 8px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: rgba(15, 23, 45, .98);
      box-shadow: var(--shadow);
      display: none;
      gap: 6px;
      z-index: 9
    }

    .card-menu.show {
      display: grid
    }

    .card-menu-item {
      width: 100%;
      border: 1px solid transparent;
      border-radius: 12px;
      background: rgba(255, 255, 255, .04);
      color: var(--text);
      padding: 10px 12px;
      text-align: left;
      cursor: pointer
    }

    .card-menu-item:hover {
      border-color: rgba(79, 124, 255, .4);
      background: rgba(79, 124, 255, .1)
    }

    .card-menu-item.danger {
      color: #ffd9d9;
      background: rgba(255, 106, 106, .12)
    }

    .icon-btn {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, .05);
      color: var(--text);
      width: 38px;
      height: 38px;
      border-radius: 999px;
      cursor: pointer;
      display: grid;
      place-items: center;
      font-weight: 700;
      flex-shrink: 0;
      text-decoration: none;
      font-size: .95rem
    }

    .icon-btn.danger {
      color: #ffd9d9;
      border-color: rgba(255, 106, 106, .28);
      background: rgba(255, 106, 106, .12)
    }

    .step-item {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, .03);
      border-radius: 18px;
      padding: 14px 52px 14px 14px;
      position: relative
    }

    .step-head {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 12px;
      align-items: flex-start
    }

    .step-check {
      margin-top: 4px;
      width: 19px;
      height: 19px;
      accent-color: var(--accent);
      cursor: pointer
    }

    .step-title {
      font-weight: 700;
      margin-bottom: 6px
    }

    .step-title.done {
      text-decoration: line-through;
      color: var(--muted)
    }

    .step-main {
      min-width: 0;
      width: 100%
    }

    .step-sub {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      color: var(--muted);
      font-size: .9rem;
      flex-wrap: wrap
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 7px 10px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, .05)
    }

    .children {
      margin-top: 8px;
      margin-left: 18px;
      display: grid;
      gap: 10px;
      border-left: 2px solid rgba(255, 255, 255, .07);
      padding-left: 12px;
      width: calc(100% + 30px)
    }

    .children>.step-item {
      width: 100%;
      max-width: 100%
    }

    .empty {
      padding: 24px;
      border: 1px dashed var(--line);
      border-radius: 18px;
      text-align: center;
      color: var(--muted)
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(7, 10, 18, .68);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 50
    }

    .modal-backdrop.show {
      display: flex
    }

    .modal {
      width: min(720px, 100%);
      max-height: calc(100vh - 32px);
      overflow: hidden;
      background: var(--panelBg);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 18px;
      display: flex;
      flex-direction: column
    }

    .modal-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 14px;
      flex-wrap: wrap;
      flex-shrink: 0
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      align-items: start
    }

    .field {
      display: grid;
      gap: 8px;
      min-width: 0
    }

    .field.full {
      grid-column: 1/-1
    }

    label {
      font-size: .9rem;
      color: var(--muted)
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, .04);
      color: var(--text);
      border-radius: 14px;
      padding: 12px 14px;
      outline: none;
      min-width: 0
    }

    textarea {
      resize: vertical;
      min-height: 110px
    }

    .check-row {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap
    }

    .danger-zone {
      border: 1px solid rgba(255, 106, 106, .2);
      background: rgba(255, 106, 106, .06)
    }

    .settings-modal {
      width: min(420px, 100%);
      background: var(--panelBg);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 18px;
      display: grid;
      gap: 18px
    }

    .settings-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px
    }

    .settings-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--surfaceSoft)
    }

    .settings-copy {
      display: grid;
      gap: 4px
    }

    .settings-copy strong {
      font-size: .98rem
    }

    .theme-switch {
      position: relative;
      width: 52px;
      height: 32px;
      border: 0;
      border-radius: 999px;
      background: var(--toggleOff);
      cursor: pointer;
      flex-shrink: 0;
      transition: background .18s ease
    }

    .theme-switch::after {
      content: "";
      position: absolute;
      top: 3px;
      left: 3px;
      width: 26px;
      height: 26px;
      border-radius: 999px;
      background: #fff;
      box-shadow: 0 2px 8px rgba(0, 0, 0, .18);
      transition: transform .18s ease
    }

    .theme-switch.active {
      background: var(--accent)
    }

    .theme-switch.active::after {
      transform: translateX(20px)
    }

    #loadingState {
      padding: 28px;
      text-align: center;
      color: var(--muted)
    }

    #modalForm {
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden
    }

    .icon-input-row {
      display: flex;
      gap: 10px;
      align-items: center;
      min-width: 0
    }

    .icon-input-row input {
      flex: 1 1 auto;
      min-width: 0
    }

    .icon-preview {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, .04);
      display: grid;
      place-items: center;
      overflow: hidden;
      flex-shrink: 0;
      font-size: 1.35rem
    }

    .icon-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block
    }

    .icon-picker-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(92px, 1fr));
      gap: 12px;
      max-height: 240px;
      overflow-y: auto;
      overflow-x: hidden;
      padding-right: 4px;
      align-content: start
    }

    .icon-choice {
      position: relative;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, .04);
      border-radius: 18px;
      padding: 12px;
      cursor: pointer;
      color: var(--text);
      display: grid;
      gap: 10px;
      justify-items: center;
      text-align: center;
      min-width: 0
    }

    .icon-choice:hover {
      border-color: rgba(79, 124, 255, .55);
      background: rgba(79, 124, 255, .08)
    }

    .icon-choice-visual {
      width: 46px;
      height: 46px;
      border-radius: 14px;
      overflow: hidden;
      display: grid;
      place-items: center;
      background: var(--accentSoft);
      border: 1px solid rgba(79, 124, 255, .25);
      font-size: 1.25rem
    }

    .icon-choice-label {
      font-size: .84rem;
      color: var(--muted);
      line-height: 1.25;
      word-break: break-word;
      overflow-wrap: anywhere
    }

    .field,
    .field.full,
    .field span,
    .icon-input-row {
      min-width: 0;
    }

    input[type="datetime-local"] {
      display: block;
      width: 100%;
      max-width: 100%;
      min-width: 0;
      inline-size: 100%;
      max-inline-size: 100%;
      min-inline-size: 0;
      box-sizing: border-box;
    }

    @supports (-webkit-touch-callout: none) {
      input[type="datetime-local"] {
        width: -webkit-fill-available;
        max-width: -webkit-fill-available;
      }
    }

    @media (max-width:620px) {
      .meta-grid {
        grid-template-columns: 1fr 1fr
      }

      .form-grid {
        grid-template-columns: 1fr
      }

      .page {
        width: min(100% - 16px, 1120px);
        padding-top: 16px
      }

      .card,
      .modal {
        padding: 16px;
        border-radius: 18px
      }

      .step-head,
      .link-card {
        grid-template-columns: auto 1fr
      }

      .children {
        margin-left: 8px;
        padding-left: 8px
      }

      .hero-icon {
        width: 56px;
        height: 56px;
        border-radius: 18px
      }

      .link-card {
        grid-template-columns: auto 1fr;
        gap: 8px;
        padding: 10px 44px 8px 10px
      }

      .link-icon {
        width: 40px;
        height: 40px;
        border-radius: 12px
      }

      .link-main {
        min-width: 0;
        overflow: hidden
      }

      .link-title {
        margin-bottom: 0;
        font-size: .93rem;
        line-height: 1.15;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 100%
      }

      .link-url {
        font-size: 8px;
        text-wrap: nowrap;
        text-overflow: ellipsis
      }

      .step-item {
        padding: 10px 44px 8px 10px;
        border-radius: 16px
      }

      .step-head {
        gap: 7px
      }

      .step-check {
        width: 17px;
        height: 17px;
        margin-top: 2px
      }

      .step-title {
        margin-bottom: 2px;
        font-size: .95rem;
        line-height: 1.15
      }

      .muted {
        line-height: 1.25
      }

      .step-item .muted {
        font-size: .88rem
      }

      .step-sub {
        margin-top: 6px !important;
        gap: 5px
      }

      .pill {
        padding: 4px 7px;
        font-size: .68rem
      }

      .children {
        margin-left: 10px;
        padding-left: 10px;
        width: calc(100% + 20px)
      }

      .substep-count-pill {
        display: none
      }

      /* Project link card on mobile */
      /* Project link card on mobile */
      .link-card-project {
        grid-template-columns: auto minmax(0, 1fr);
        align-items: start;
      }

      .proj-link-icon {
        width: 44px;
        height: 44px;
        border-radius: 13px
      }
    }
  </style>

</head>

<body>
  <main class="page">
    <div class="topbar"><a class="back-link" href="/">← Back to projects</a><button class="btn btn-secondary" type="button" onclick="openSettingsModal()">Settings</button></div>
    <div id="loadingState" class="card">Loading project...</div>
    <div id="app" class="layout" hidden></div>
  </main>

  <div id="modalBackdrop" class="modal-backdrop">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-head">
        <h3 id="modalTitle">Edit</h3>
        <button class="icon-btn" id="closeModalBtn" type="button">×</button>
      </div>
      <form id="modalForm" style="overflow-y: auto; max-height: 70vh; padding: 4px;"></form>
    </div>
  </div>

  <div id="iconPickerBackdrop" class="modal-backdrop">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-head">
        <h3>Choose Icon Template</h3>
        <button class="icon-btn" id="closeIconPickerBtn" type="button">×</button>
      </div>
      <div id="iconPickerBody" style="overflow-y:auto;max-height:70vh;padding:4px;"></div>
    </div>
  </div>

  <div id="settingsBackdrop" class="modal-backdrop">
    <div class="settings-modal" onclick="event.stopPropagation()">
      <div class="settings-head">
        <div>
          <h3 style="margin:0;">Settings</h3>
          <div class="muted">Saved automatically on this device.</div>
        </div>
        <button class="btn btn-secondary" type="button" onclick="closeSettingsModal()">Close</button>
      </div>
      <div class="settings-row">
        <div class="settings-copy">
          <strong>Light mode</strong>
          <div class="muted">Switch instantly between the current dark theme and a light theme.</div>
        </div>
        <button id="themeSwitch" class="theme-switch" type="button" role="switch" aria-checked="false" onclick="toggleTheme()"></button>
      </div>
    </div>
  </div>

  <script>
    const DEFAULT_STANDARD_ICONS = [
      { label: "Folder", value: "https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f4c1.png", removable: false },
      { label: "Document", value: "https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f4c4.png", removable: false },
      { label: "Graduation", value: "https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f393.png", removable: false },
      { label: "Rocket", value: "https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f680.png", removable: false },
      { label: "Code", value: "https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f4bb.png", removable: false },
      { label: "Chart", value: "https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f4ca.png", removable: false },
      { label: "Link", value: "https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f517.png", removable: false },
      { label: "Palette", value: "https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f3a8.png", removable: false },
      { label: "Calendar", value: "https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f4c5.png", removable: false },
      { label: "Target", value: "https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f3af.png", removable: false }
    ];
    const STANDARD_ICONS_STORAGE_KEY = "project_manager_standard_icons";
    const THEME_STORAGE_KEY = "pm_theme_mode";
    let STANDARD_ICONS = loadStandardIcons();
    const projectId = new URLSearchParams(location.search).get("id");
    const app = document.getElementById("app");
    const loadingState = document.getElementById("loadingState");
    const modalBackdrop = document.getElementById("modalBackdrop");
    const modalTitle = document.getElementById("modalTitle");
    const modalForm = document.getElementById("modalForm");
    const closeModalBtn = document.getElementById("closeModalBtn");
    const iconPickerBackdrop = document.getElementById("iconPickerBackdrop");
    const iconPickerBody = document.getElementById("iconPickerBody");
    const closeIconPickerBtn = document.getElementById("closeIconPickerBtn");
    const settingsBackdrop = document.getElementById("settingsBackdrop");
    const themeSwitch = document.getElementById("themeSwitch");
    let project = null;
    let openContextMenuId = null;

    // Cache for linked project data: id -> project object (or null on error)
    const projectCache = {};
    // Temp storage for project picker modal
    let _pickerProjects = [];

    function generateId() {
      if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID();
      return Math.random().toString(36).slice(2) + Date.now().toString(36);
    }

    function loadStandardIcons() { try { const saved = JSON.parse(localStorage.getItem(STANDARD_ICONS_STORAGE_KEY) || "null"); if (Array.isArray(saved) && saved.length) return saved; } catch { } return [...DEFAULT_STANDARD_ICONS]; }
    function saveStandardIcons() { localStorage.setItem(STANDARD_ICONS_STORAGE_KEY, JSON.stringify(STANDARD_ICONS)); }
    function addToStandardIcons(iconValue, label = "Custom") { const value = String(iconValue || "").trim(); if (!value) return; if (STANDARD_ICONS.some(icon => String(icon.value).trim() === value)) return; STANDARD_ICONS.unshift({ label: String(label || "Custom").trim() || "Custom", value, removable: true }); saveStandardIcons(); }
    function escapeHtml(value = "") { return String(value).replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;").replaceAll("'", "&#039;"); }
    function normalizeDisplayText(value = "") { return String(value).replaceAll("-->", "→"); }
    function isImageUrl(value = "") { const v = String(value).trim(); return /^https?:\/\//i.test(v) && /\.(png|jpe?g|gif|webp|svg|avif)(\?.*)?$/i.test(v); }
    function renderIcon(icon, fallback = "📌", alt = "icon") { const value = String(icon || "").trim(); return isImageUrl(value) ? `<img src="${escapeHtml(value)}" alt="${escapeHtml(alt)}" style="width:100%;height:100%;object-fit:cover;border-radius:inherit;display:block;" />` : escapeHtml(value || fallback); }
    function applyTheme(theme) {
      const resolved = theme === "light" ? "light" : "dark";
      document.documentElement.dataset.theme = resolved;
      document.documentElement.style.colorScheme = resolved;
      localStorage.setItem(THEME_STORAGE_KEY, resolved);
      if (themeSwitch) {
        const isLight = resolved === "light";
        themeSwitch.classList.toggle("active", isLight);
        themeSwitch.setAttribute("aria-checked", String(isLight));
      }
    }
    function toggleTheme() { applyTheme(document.documentElement.dataset.theme === "light" ? "dark" : "light"); }
    function openSettingsModal() { settingsBackdrop.classList.add("show"); }
    function closeSettingsModal() { settingsBackdrop.classList.remove("show"); }
    function clampIndent(level) { return Math.max(0, Math.min(3, Number(level) || 0)); }
    function renderFormattedText(value, fallback = "No description", compact = false) {
      const source = String(value || "").replace(/\r\n?/g, "\n");
      if (!source.trim()) return `<div class="formatted-text${compact ? " compact" : ""}"><p class="formatted-paragraph">${escapeHtml(normalizeDisplayText(fallback))}</p></div>`;

      const lines = source.split("\n");
      const parts = [];
      let paragraphLines = [];
      let paragraphIndent = 0;
      let listItems = [];
      let listIndent = 0;

      function flushParagraph() {
        if (!paragraphLines.length) return;
        parts.push(`<p class="formatted-paragraph indent-${clampIndent(paragraphIndent)}">${escapeHtml(normalizeDisplayText(paragraphLines.join("\n")))}</p>`);
        paragraphLines = [];
        paragraphIndent = 0;
      }

      function flushList() {
        if (!listItems.length) return;
        parts.push(`<ul class="formatted-list indent-${clampIndent(listIndent)}">${listItems.join("")}</ul>`);
        listItems = [];
        listIndent = 0;
      }

      for (const rawLine of lines) {
        if (!rawLine.trim()) {
          flushParagraph();
          flushList();
          continue;
        }

        const indentMatch = rawLine.match(/^(\t*)/);
        const indent = indentMatch ? indentMatch[1].length : 0;
        const trimmedLine = rawLine.slice(indent);

        if (/^- /.test(trimmedLine)) {
          flushParagraph();
          if (listItems.length && indent !== listIndent) flushList();
          if (!listItems.length) listIndent = indent;
          listItems.push(`<li>${escapeHtml(normalizeDisplayText(trimmedLine.slice(2)))}</li>`);
          continue;
        }

        flushList();
        if (!paragraphLines.length) paragraphIndent = indent;
        paragraphLines.push(rawLine);
      }

      flushParagraph();
      flushList();
      return `<div class="formatted-text${compact ? " compact" : ""}">${parts.join("")}</div>`;
    }
    function formatDeadline(deadline) { if (!deadline) return "No deadline"; const dt = new Date(deadline); if (Number.isNaN(dt.getTime())) return "Invalid deadline"; return dt.toLocaleString([], { year: "numeric", month: "short", day: "2-digit", hour: "2-digit", minute: "2-digit" }); }
    function formatTimeLeft(seconds) { if (seconds == null) return "No deadline"; if (seconds <= 0) return "Passed"; const days = Math.floor(seconds / 86400); const hours = Math.floor((seconds % 86400) / 3600); const minutes = Math.floor((seconds % 3600) / 60); if (days > 0) return `${days}d, ${hours}h left`; if (hours > 0) return `${hours}h, ${minutes}m left`; return `${minutes} min left`; }
    function stepTimeLeft(deadline) { if (!deadline) return null; const dt = new Date(deadline); if (Number.isNaN(dt.getTime())) return null; return Math.floor((dt.getTime() - Date.now()) / 1000); }
    function deepClone(value) { return JSON.parse(JSON.stringify(value)); }
    function parseDateSafe(val) { const str = String(val || "").trim(); if (!str) return null; const dt = new Date(str); return Number.isNaN(dt.getTime()) ? null : dt.toISOString(); }
    function buildCardMenu(menuId, actions) {
      return `<div class="card-menu-wrap${openContextMenuId === menuId ? " open" : ""}"><button class="icon-btn card-menu-trigger" type="button" onclick='toggleContextMenu(${JSON.stringify(menuId)}, event)' aria-label="Open menu">⋯</button><div class="card-menu${openContextMenuId === menuId ? " show" : ""}" id="${escapeHtml(menuId)}">${actions.map(action => `<button class="card-menu-item${action.danger ? " danger" : ""}" type="button" onclick="${action.onclick}">${escapeHtml(action.label)}</button>`).join("")}</div></div>`;
    }

    async function api(url, options = {}) {
      const res = await fetch(url, { headers: { "Content-Type": "application/json" }, ...options });
      if (!res.ok) throw new Error(await res.text() || "Request failed");
      return res.headers.get("content-type")?.includes("application/json") ? res.json() : null;
    }

    // --- Project link helpers ---

    // Extracts a project ID from a link whose url is "PROJECTS/project?id={id}"
    function getProjectIdFromLink(link) {
      const raw = String(link.url || "");
      if (!raw.startsWith("PROJECTS/")) return null;
      const rest = raw.slice("PROJECTS/".length);
      try {
        const qmark = rest.indexOf("?");
        const params = new URLSearchParams(qmark >= 0 ? rest.slice(qmark + 1) : rest);
        return params.get("id") || null;
      } catch { return null; }
    }

    async function fetchLinkedProject(id) {
      if (id in projectCache) return projectCache[id];
      try {
        projectCache[id] = await api(`/api/projects/${id}`);
      } catch {
        projectCache[id] = null;
      }
      return projectCache[id];
    }

    function hasUncachedProjectLinks() {
      return (project.links || []).some(l => {
        const pid = getProjectIdFromLink(l);
        return pid && !(pid in projectCache);
      });
    }

    async function hydrateProjectLinks() {
      const ids = [...new Set(
        (project.links || []).map(l => getProjectIdFromLink(l)).filter(Boolean)
      )].filter(id => !(id in projectCache));
      if (!ids.length) return;
      await Promise.all(ids.map(id => fetchLinkedProject(id)));
      render(); // re-render with now-cached data; won't loop because all are cached
    }

    function renderProjectLinkCard(link, index, proj) {
      const loading = proj === undefined;
      const error = proj === null;
      const projectUrl = proj ? `${window.location.origin}/project?id=${proj.id}` : "#";
      const icon = renderIcon(proj?.icon || link.icon || "📌", "📌", proj?.name || link.title);
      const name = escapeHtml(normalizeDisplayText(proj?.name || link.title || "Project link"));
      const menu = buildCardMenu(`project-link-menu-${index}`, [
        { label: "Edit", onclick: `event.stopPropagation(); openEditLinkModal(${index});` },
        { label: "Delete", onclick: `event.stopPropagation(); deleteLink(${index});`, danger: true }
      ]);

      return `<div class="link-card link-card-project${loading ? " proj-link-loading" : ""}" onclick="window.open('${escapeHtml(projectUrl)}')">
        ${menu}
        <div class="proj-link-icon">${loading ? "⏳" : icon}</div>
        <div class="proj-link-body">
          <div class="proj-link-header">
            <div class="proj-link-name">${loading ? "Loading…" : name}</div>
            ${proj?.finished ? `<span class="proj-status-badge finished">✓ Finished</span>` : proj && !loading ? `<span class="proj-status-badge open">Open</span>` : ""}
          </div>
          ${error ? `<div class="proj-link-desc" style="color:var(--danger)">Could not load project.</div>` : ""}
          ${proj?.description ? `<div class="proj-link-desc">${renderFormattedText(proj.description, "", true)}</div>` : ""}
          <div class="proj-link-meta">
            ${proj?.deadline ? `<span class="pill">📅 ${escapeHtml(formatDeadline(proj.deadline))}</span>` : !loading && !error ? `<span class="pill" style="color:var(--muted)">No deadline</span>` : ""}
            ${proj?.seconds_left != null ? `<span class="pill">⏱ ${escapeHtml(formatTimeLeft(proj.seconds_left))}</span>` : ""}
          </div>
        </div>
      </div>`;
    }

    // --- Modal helpers ---

    function openModal(title, contentHtml, onSubmit) {
      modalTitle.textContent = title;
      modalForm.innerHTML = contentHtml;
      modalBackdrop.classList.add("show");
      initializeIconInputPreviews();
      modalForm.onsubmit = async (event) => {
        event.preventDefault();
        const btn = modalForm.querySelector('button[type="submit"]');
        if (btn) btn.disabled = true;
        try {
          await onSubmit(new FormData(modalForm));
        } catch (err) {
          alert("Error: " + err.message);
          if (btn) btn.disabled = false;
        }
      };
    }

    function closeModal() { modalBackdrop.classList.remove("show"); modalForm.innerHTML = ""; modalForm.onsubmit = null; closeIconPickerModal(); }
    function findStepAndParent(steps, targetId, parent = null) { for (let i = 0; i < (steps || []).length; i++) { const step = steps[i]; if (step.id === targetId) return { step, parent, index: i, collection: steps }; const nested = findStepAndParent(step.children || [], targetId, step); if (nested) return nested; } return null; }
    function updateStepRecursive(steps, targetId, updater) { return (steps || []).map(step => step.id === targetId ? updater(step) : ({ ...step, children: updateStepRecursive(step.children || [], targetId, updater) })); }
    function removeStepRecursive(steps, targetId) { return (steps || []).filter(step => step.id !== targetId).map(step => ({ ...step, children: removeStepRecursive(step.children || [], targetId) })); }

    function buildIconInputField(targetInputId, fallback = "📌", value = "", placeholder = "📌 or image URL") {
      return `<div class="field"><label>Icon</label><div class="icon-input-row"><input id="${escapeHtml(targetInputId)}" name="icon" data-icon-fallback="${escapeHtml(fallback)}" data-icon-preview="${escapeHtml(`${targetInputId}Preview`)}" value="${escapeHtml(value)}" placeholder="${escapeHtml(placeholder)}" /><button class="btn btn-secondary" type="button" onclick='openIconPickerModal(${JSON.stringify(targetInputId)})'>Template</button><div class="icon-preview" id="${escapeHtml(`${targetInputId}Preview`)}">${renderIcon(value, fallback, "icon preview")}</div></div></div>`;
    }

    function updateIconPreview(targetInputId) {
      const input = document.getElementById(targetInputId);
      if (!input) return;
      const previewId = input.dataset.iconPreview;
      const preview = previewId ? document.getElementById(previewId) : null;
      if (!preview) return;
      preview.innerHTML = renderIcon(input.value, input.dataset.iconFallback || "📌", "icon preview");
    }

    function initializeIconInputPreviews() {
      modalForm.querySelectorAll("input[data-icon-preview]").forEach(input => {
        updateIconPreview(input.id);
        input.addEventListener("input", () => updateIconPreview(input.id));
      });
    }

    function openIconPickerModal(targetInputId) {
      const input = document.getElementById(targetInputId);
      const fallback = input?.dataset.iconFallback || "📌";
      iconPickerBody.innerHTML = `<div class="icon-picker-grid">${STANDARD_ICONS.map(icon => `
        <button class="icon-choice" type="button" onclick='selectStandardIcon(${JSON.stringify(targetInputId)}, ${JSON.stringify(icon.value)})'>
          <div class="icon-choice-visual">${renderIcon(icon.value, fallback, icon.label)}</div>
          <div class="icon-choice-label">${escapeHtml(icon.label)}</div>
        </button>`).join("")}</div><div class="inline-actions" style="margin-top:16px;justify-content:flex-end;padding-bottom:8px;"><button class="btn btn-secondary" type="button" onclick="closeIconPickerModal()">Close</button></div>`;
      iconPickerBackdrop.classList.add("show");
    }

    function closeIconPickerModal() {
      iconPickerBackdrop.classList.remove("show");
      iconPickerBody.innerHTML = "";
    }

    function selectStandardIcon(targetInputId, value) {
      const input = document.getElementById(targetInputId);
      if (!input) return;
      input.value = value;
      updateIconPreview(targetInputId);
      closeIconPickerModal();
    }

    function toggleContextMenu(menuId, event) {
      event.stopPropagation();
      openContextMenuId = openContextMenuId === menuId ? null : menuId;
      render();
    }

    function closeContextMenu() {
      if (!openContextMenuId) return;
      openContextMenuId = null;
      render();
    }

    async function saveProject(updatedProject) {
      project = await api(`/api/projects/${projectId}`, { method: "PUT", body: JSON.stringify(updatedProject) });
      render();
      closeModal();
    }

    // --- Render ---

    function renderStep(step) {
      const menu = buildCardMenu(`step-menu-${step.id}`, [
        { label: "Edit", onclick: `event.stopPropagation(); openStepEditor('${step.id}');` },
        { label: "Add sub-step", onclick: `event.stopPropagation(); openAddSubStepModal('${step.id}');` },
        { label: "Delete", onclick: `event.stopPropagation(); deleteStep('${step.id}');`, danger: true }
      ]);
      return `<div class="step-item">${menu}<div class="step-head">
        <input class="step-check" type="checkbox" ${step.done ? "checked" : ""} onchange="toggleStepDone('${step.id}', this.checked)" />
        <div class="step-main"><div class="step-title ${step.done ? "done" : ""}">${escapeHtml(normalizeDisplayText(step.title || "Untitled step"))}</div><div class="muted">${renderFormattedText(step.description, "No description", true)}</div>
        <div class="step-sub" style="margin-top:10px;">${step.until_deadline ? `<span class="pill">⏳ until deadline</span>` : ""}${step.deadline ? `<span class="pill">📅 ${escapeHtml(formatDeadline(step.deadline))}</span>` : ""}${step.deadline ? `<span class="pill">⏱ ${escapeHtml(formatTimeLeft(stepTimeLeft(step.deadline)))}</span>` : ""}${(step.children || []).length ? `<span class="pill substep-count-pill">↳ ${(step.children || []).length} sub-step(s)</span>` : ""}</div></div>
      </div>${(step.children || []).length ? `<div class="children">${(step.children || []).map(child => renderStep(child)).join("")}</div>` : ""}</div>`;
    }

    function renderStepTree(steps) { const s = steps || []; return !s.length ? `<div class="empty">No steps yet.</div>` : `<div class="step-tree">${s.map(step => renderStep(step)).join("")}</div>`; }

    function renderLinks() {
      const l = project.links || [];
      if (!l.length) return `<div class="empty">No links yet.</div>`;
      const currentOrigin = window.location.origin;

      return `<div class="links-grid">${l.map((link, index) => {
        const pid = getProjectIdFromLink(link);

        if (pid) {
          // Project link — render rich card from cache (or loading state)
          const cached = pid in projectCache ? projectCache[pid] : undefined;
          return renderProjectLinkCard(link, index, cached);
        }

        // Regular link
        const rawUrl = String(link.url || "");
        const processedUrl = rawUrl.includes("PROJECTS/")
          ? rawUrl.replace("PROJECTS/", currentOrigin + "/")
          : rawUrl;

        return `<div class="link-card" onclick="window.open('${escapeHtml(processedUrl)}')">
          ${buildCardMenu(`link-menu-${index}`, [
            { label: "Edit", onclick: `event.stopPropagation(); openEditLinkModal(${index});` },
            { label: "Delete", onclick: `event.stopPropagation(); deleteLink(${index});`, danger: true }
          ])}
          <div class="link-icon">${renderIcon(link.icon, "🔗", link.title || "link icon")}</div>
          <div class="link-main">
            <div class="link-title">${escapeHtml(normalizeDisplayText(link.title || "Untitled link"))}</div>
            <a class="link-url" href="${escapeHtml(processedUrl)}" target="_blank" rel="noreferrer">${escapeHtml(processedUrl)}</a>
          </div>
        </div>`;
      }).join("")}</div>`;
    }

    function render() {
      if (!project) return;
      document.title = project.name ? `${project.name} · Project View` : "Project View";
      app.hidden = false; loadingState.hidden = true;
      app.innerHTML = `<section class="card hero"><div class="hero-head"><div class="hero-title-wrap"><div class="hero-icon">${renderIcon(project.icon, "📌", project.name || "project icon")}</div><div class="hero-copy"><h1 class="project-title">${escapeHtml(normalizeDisplayText(project.name || "Untitled Project"))}</h1><div class="muted">${renderFormattedText(project.description, "No description")}</div></div></div><div class="inline-actions"><button class="btn btn-secondary" type="button" onclick="openProjectEditor()">Edit project</button><button class="btn ${project.finished ? "btn-ok" : "btn-secondary"}" type="button" onclick="toggleFinished()">${project.finished ? "✓ Finished" : "Mark finished"}</button></div></div><div class="meta-grid"><div class="meta-box"><div class="meta-label">Name</div><div class="meta-value">${escapeHtml(normalizeDisplayText(project.name || "Untitled Project"))}</div></div><div class="meta-box"><div class="meta-label">Deadline</div><div class="meta-value">${escapeHtml(formatDeadline(project.deadline))}</div></div><div class="meta-box"><div class="meta-label">Time left</div><div class="meta-value">${escapeHtml(formatTimeLeft(project.seconds_left))}</div></div><div class="meta-box"><div class="meta-label">Status</div><div class="meta-value">${project.finished ? "Finished" : "Open"}</div></div></div></section>
      <section class="card"><div class="section-head"><div><h2 class="section-title">Links</h2><div class="muted">Websites, files and project links.</div></div></div>${renderLinks()}<div class="inline-actions" style="margin-top:16px;"><button class="btn btn-primary" type="button" onclick="openAddLinkModal()">Add link</button><button class="btn btn-secondary" type="button" onclick="openAddProjectLinkModal()">🔗 Link project</button></div></section>
      <section class="card"><div class="section-head"><div><h2 class="section-title">WILL-DO List</h2><div class="muted">Project tasks and hierarchy.</div></div></div>${renderStepTree(project.steps)}<div class="inline-actions" style="margin-top:16px;"><button class="btn btn-primary" type="button" onclick="openAddStepModal()">Add step</button></div></section>
      <section class="card danger-zone"><div class="section-head"><div><h2 class="section-title">Delete project</h2><div class="muted">Irreversible action.</div></div><button class="btn btn-danger" type="button" onclick="deleteProject()">Delete project</button></div></section>`;

      // Fetch any uncached linked project data and re-render when ready
      if (hasUncachedProjectLinks()) hydrateProjectLinks();
    }

    // --- Link modals ---

    function openProjectEditor() {
      openModal("Edit project", `<div class="form-grid"><div class="field"><label>Name</label><input name="name" value="${escapeHtml(project.name || "")}" required /></div>${buildIconInputField("projectIconInput", "📌", project.icon || "📌", "📌 or image URL")}<div class="field full"><label>Deadline</label><input name="deadline" type="datetime-local" value="${project.deadline ? new Date(project.deadline).toISOString().slice(0, 16) : ""}" /></div><div class="field full"><label>Description</label><textarea name="description">${escapeHtml(project.description || "")}</textarea></div></div><div class="inline-actions" style="margin-top:16px;justify-content:flex-end;padding-bottom:12px;"><button class="btn btn-secondary" type="button" onclick="closeModal()">Cancel</button><button class="btn btn-primary" type="submit">Save</button></div>`, async (formData) => {
        const updated = deepClone(project); updated.name = String(formData.get("name") || "").trim(); updated.icon = String(formData.get("icon") || "").trim() || "📌"; updated.description = String(formData.get("description") || "").trim();
        updated.deadline = parseDateSafe(formData.get("deadline")); addToStandardIcons(updated.icon, updated.name || "Project"); await saveProject(updated);
      });
    }

    function openAddLinkModal() {
      openModal("Add link", `<div class="form-grid"><div class="field"><label>Title</label><input name="title" placeholder="Link title" required /></div>${buildIconInputField("newLinkIconInput", "🔗", "", "🔗 or image URL")}<div class="field full"><label>URL</label><input name="url" placeholder="https://example.com" required /></div></div><div class="inline-actions" style="margin-top:16px;justify-content:flex-end;padding-bottom:12px;"><button class="btn btn-secondary" type="button" onclick="closeModal()">Cancel</button><button class="btn btn-primary" type="submit">Add link</button></div>`, async (formData) => {
        const updated = deepClone(project); const newLink = { id: generateId(), title: String(formData.get("title") || "").trim(), url: String(formData.get("url") || "").trim(), icon: String(formData.get("icon") || "").trim() || "🔗" };
        updated.links = updated.links || []; updated.links.push(newLink); addToStandardIcons(newLink.icon, newLink.title || "Link"); await saveProject(updated);
      });
    }

    function openEditLinkModal(index) {
      const link = (project.links || [])[index]; if (!link) return;
      openModal("Edit link", `<div class="form-grid"><div class="field"><label>Title</label><input name="title" value="${escapeHtml(link.title || "")}" required /></div>${buildIconInputField("editLinkIconInput", "🔗", link.icon || "🔗", "🔗 or image URL")}<div class="field full"><label>URL</label><input name="url" value="${escapeHtml(link.url || "")}" required /></div></div><div class="inline-actions" style="margin-top:16px;justify-content:flex-end;padding-bottom:12px;"><button class="btn btn-secondary" type="button" onclick="closeModal()">Cancel</button><button class="btn btn-primary" type="submit">Save</button></div>`, async (formData) => {
        const updated = deepClone(project); updated.links[index] = { ...updated.links[index], title: String(formData.get("title") || "").trim(), url: String(formData.get("url") || "").trim(), icon: String(formData.get("icon") || "").trim() || "🔗" }; await saveProject(updated);
      });
    }

    // --- Project link picker ---

    async function openAddProjectLinkModal() {
      openModal("Link a project", `<div style="text-align:center;padding:28px;color:var(--muted)">Loading projects…</div>`, async () => { });

      let all;
      try {
        all = await api("/api/projects");
      } catch {
        modalForm.innerHTML = `<div style="color:var(--danger);padding:16px 4px;">Failed to load projects.</div><div class="inline-actions" style="margin-top:12px;justify-content:flex-end;"><button class="btn btn-secondary" type="button" onclick="closeModal()">Close</button></div>`;
        return;
      }

      // Exclude this project and ones already linked
      const alreadyLinked = new Set(
        (project.links || []).map(l => getProjectIdFromLink(l)).filter(Boolean)
      );
      _pickerProjects = all.filter(p => p.id !== projectId && !alreadyLinked.has(p.id));

      if (!_pickerProjects.length) {
        modalForm.innerHTML = `<div class="empty">No other projects available to link.</div><div class="inline-actions" style="margin-top:16px;justify-content:flex-end;padding-bottom:8px;"><button class="btn btn-secondary" type="button" onclick="closeModal()">Close</button></div>`;
        modalForm.onsubmit = e => e.preventDefault();
        return;
      }

      modalForm.innerHTML = `
        <div class="proj-picker-grid">
          ${_pickerProjects.map((p, i) => `
            <button class="proj-picker-item" type="button" onclick="addProjectLink(${i})">
              <div class="proj-picker-icon">${renderIcon(p.icon, "📌", p.name)}</div>
              <div class="proj-picker-info">
                <div class="proj-picker-name">${escapeHtml(p.name || "Untitled project")}</div>
                <div class="proj-picker-meta">${p.deadline ? escapeHtml(formatDeadline(p.deadline)) : "No deadline"} · ${p.finished ? "Finished" : "Open"}</div>
              </div>
              <div class="proj-picker-arrow">↗</div>
            </button>
          `).join("")}
        </div>
        <div class="inline-actions" style="margin-top:16px;justify-content:flex-end;padding-bottom:8px;">
          <button class="btn btn-secondary" type="button" onclick="closeModal()">Cancel</button>
        </div>`;
      modalForm.onsubmit = e => e.preventDefault();
    }

    async function addProjectLink(pickerIndex) {
      const p = _pickerProjects[pickerIndex];
      if (!p) return;
      const updated = deepClone(project);
      updated.links = updated.links || [];
      updated.links.push({
        id: generateId(),
        title: p.name || "Untitled project",
        url: `PROJECTS/project?id=${p.id}`,
        icon: p.icon || "📌"
      });
      // Pre-warm the cache with what we already know
      projectCache[p.id] = p;
      await saveProject(updated);
    }

    // --- Step modals ---

    function stepFormHtml(step = null, submitLabel = "Save") {
      return `<div class="form-grid"><div class="field full"><label>Title</label><input name="title" value="${escapeHtml(step?.title || "")}" required /></div><div class="field full"><label>Description</label><textarea name="description">${escapeHtml(step?.description || "")}</textarea></div><div class="field full"><label>Step deadline</label><input name="deadline" type="datetime-local" value="${step?.deadline ? new Date(step.deadline).toISOString().slice(0, 16) : ""}" /></div></div><div class="inline-actions" style="margin-top:16px;justify-content:flex-end;padding-bottom:12px;"><button class="btn btn-secondary" type="button" onclick="closeModal()">Cancel</button><button class="btn btn-primary" type="submit">${submitLabel}</button></div>`;
    }

    function openAddStepModal() { openModal("Add step", stepFormHtml(null, "Add step"), async (formData) => { const updated = deepClone(project); updated.steps = updated.steps || []; updated.steps.push({ id: generateId(), title: String(formData.get("title") || "").trim(), description: String(formData.get("description") || "").trim(), done: false, until_deadline: false, deadline: parseDateSafe(formData.get("deadline")), children: [] }); await saveProject(updated); }); }
    function openAddSubStepModal(parentId) { openModal("Add sub-step", stepFormHtml(null, "Add sub-step"), async (formData) => { const updated = deepClone(project); updated.steps = updateStepRecursive(updated.steps || [], parentId, step => ({ ...step, children: [...(step.children || []), { id: generateId(), title: String(formData.get("title") || "").trim(), description: String(formData.get("description") || "").trim(), done: false, until_deadline: false, deadline: parseDateSafe(formData.get("deadline")), children: [] }] })); await saveProject(updated); }); }
    function openStepEditor(stepId) { const found = findStepAndParent(project.steps || [], stepId); if (!found) return; openModal("Edit step", stepFormHtml(found.step, "Save"), async (formData) => { const updated = deepClone(project); updated.steps = updateStepRecursive(updated.steps || [], stepId, step => ({ ...step, title: String(formData.get("title") || "").trim(), description: String(formData.get("description") || "").trim(), deadline: parseDateSafe(formData.get("deadline")) })); await saveProject(updated); }); }

    async function toggleStepDone(stepId, done) { const updated = deepClone(project); updated.steps = updateStepRecursive(updated.steps || [], stepId, step => ({ ...step, done })); await saveProject(updated); }
    async function deleteStep(stepId) { if (!confirm("Delete this?")) return; const updated = deepClone(project); updated.steps = removeStepRecursive(updated.steps || [], stepId); await saveProject(updated); }
    async function toggleFinished() { project = await api(`/api/projects/${projectId}/finish`, { method: "PATCH", body: JSON.stringify({ finished: !project.finished }) }); render(); }
    async function deleteProject() { if (!confirm("Permanent delete?")) return; await api(`/api/projects/${projectId}`, { method: "DELETE" }); location.href = "/"; }
    async function loadProject() { try { project = await api(`/api/projects/${projectId}`); render(); } catch (e) { loadingState.textContent = "Error loading project."; } }

    applyTheme(document.documentElement.dataset.theme || "dark");
    closeModalBtn.addEventListener("click", closeModal);
    closeIconPickerBtn.addEventListener("click", closeIconPickerModal);
    modalBackdrop.addEventListener("click", (e) => { if (e.target === modalBackdrop) closeModal(); });
    iconPickerBackdrop.addEventListener("click", (e) => { if (e.target === iconPickerBackdrop) closeIconPickerModal(); });
    settingsBackdrop.addEventListener("click", (e) => { if (e.target === settingsBackdrop) closeSettingsModal(); });
    document.addEventListener("click", () => {
      if (openContextMenuId) closeContextMenu();
    });
    document.addEventListener("keydown", (e) => {
      if (e.key !== "Escape") return;
      if (settingsBackdrop.classList.contains("show")) closeSettingsModal();
      else if (iconPickerBackdrop.classList.contains("show")) closeIconPickerModal();
      else closeModal();
    });

    window.openSettingsModal = openSettingsModal;
    window.closeSettingsModal = closeSettingsModal;
    window.toggleTheme = toggleTheme;
    window.openIconPickerModal = openIconPickerModal;
    window.closeIconPickerModal = closeIconPickerModal;
    window.selectStandardIcon = selectStandardIcon;
    window.toggleContextMenu = toggleContextMenu;
    window.openProjectEditor = openProjectEditor;
    window.openAddLinkModal = openAddLinkModal;
    window.openEditLinkModal = openEditLinkModal;
    window.deleteLink = (i) => { if (confirm("Delete link?")) { const u = deepClone(project); u.links.splice(i, 1); saveProject(u); } };
    window.openAddProjectLinkModal = openAddProjectLinkModal;
    window.addProjectLink = addProjectLink;
    window.openAddStepModal = openAddStepModal;
    window.openAddSubStepModal = openAddSubStepModal;
    window.openStepEditor = openStepEditor;
    window.toggleStepDone = toggleStepDone;
    window.deleteStep = deleteStep;
    window.toggleFinished = toggleFinished;
    window.deleteProject = deleteProject;
    window.closeModal = closeModal;

    loadProject();
  </script>
</body>

</html>
