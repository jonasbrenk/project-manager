<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/jpeg" href="/static/icon.jpg?v=2">
  <title>Project Manager</title>
  <style>
:root {
  --bg: #0b1020; --card: rgba(19, 26, 47, .92); --card2: rgba(28, 38, 70, .8);
  --text: #eef2ff; --muted: #a8b3cf; --line: rgba(255, 255, 255, .08);
  --accent: #4f7cff; --accentSoft: rgba(79, 124, 255, .16); --danger: #ff6a6a;
  --shadow: 0 18px 50px rgba(0,0,0,.28); --radius: 22px;
}

* { box-sizing: border-box; }
html, body { 
  margin: 0; min-height: 100%; color: var(--text); 
  font-family: Inter, system-ui, sans-serif;
  background: radial-gradient(circle at top, #172344 0%, var(--bg) 58%);
}

/* Layout Containers */
.page { width: min(1120px, calc(100% - 24px)); margin: 0 auto; padding: 24px 0 80px; display: grid; gap: 18px; }
.hero, .project-list { display: grid; gap: 18px; }

/* Components: Cards & Panels */
.card { 
  background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); 
  box-shadow: var(--shadow); backdrop-filter: blur(12px); padding: 18px; 
}
.hero-card { display: flex; justify-content: space-between; gap: 18px; flex-wrap: wrap; align-items: flex-start; }
.panel-head { display: flex; justify-content: space-between; gap: 16px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }

/* Typography */
.title { font-size: clamp(1.8rem, 4vw, 2.8rem); margin: 0 0 6px; }
.panel-title { margin: 0; font-size: 1.1rem; }
.subtitle, .muted, label { color: var(--muted); line-height: 1.5; font-size: .9rem; }

/* Stats */
.stats { display: flex; gap: 12px; flex-wrap: wrap; }
.stat { 
  flex: 1 1 96px; padding: 12px 14px; background: var(--card2); 
  border: 1px solid var(--line); border-radius: 18px; 
}
.stat-label { font-size: .84rem; margin-bottom: 8px; color: var(--muted); }
.stat-value { font-size: 1.28rem; font-weight: 700; }

/* Forms & Inputs */
.form-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
.field { display: grid; gap: 8px; min-width: 0; }
.span-2 { grid-column: span 2; }
.span-4 { grid-column: 1 / -1; }
.icon-input-row { display: flex; gap: 10px; align-items: center; }

input, textarea { 
  width: 100%; background: rgba(255,255,255,.04); border: 1px solid var(--line); 
  color: var(--text); border-radius: 14px; padding: 12px 14px; outline: none; font: inherit;
}
textarea { min-height: 100px; resize: vertical; }
input:focus, textarea:focus { border-color: rgba(79,124,255,.7); box-shadow: 0 0 0 3px rgba(79,124,255,.15); }

/* Buttons */
.actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 16px; flex-wrap: wrap; }
.btn { border: 0; border-radius: 999px; padding: 12px 16px; cursor: pointer; font-weight: 600; font: inherit; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-secondary { background: rgba(255, 255, 255, .06); color: var(--text); border: 1px solid var(--line); }

/* Project List Items */
.project-card { 
  display: grid; grid-template-columns: auto 1fr auto; gap: 16px; align-items: center; 
  padding: 18px; border-radius: 20px; border: 1px solid var(--line); text-decoration: none; color: inherit;
  background: linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015));
}
.project-card:hover { border-color: rgba(79,124,255,.55); }
.project-icon { 
  width: 58px; height: 58px; display: grid; place-items: center; border-radius: 18px; 
  background: var(--accentSoft); font-size: 1.55rem; border: 1px solid rgba(79,124,255,.28); overflow: hidden;
}
.project-name { margin: 0 0 8px; font-size: 1.1rem; font-weight: 700; }
.project-desc { 
  margin: 0; color: var(--muted); line-height: 1.45; 
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.project-meta { display: grid; gap: 6px; text-align: right; }
.badge { 
  display: inline-flex; align-items: center; justify-content: center; border-radius: 999px; 
  padding: 9px 12px; background: rgba(255,255,255,.05); border: 1px solid var(--line); font-size: .92rem;
}
.done { color: #58c48f; }
.empty { padding: 28px; text-align: center; color: var(--muted); border: 1px dashed var(--line); border-radius: 18px; }

/* Icon Picker */
.icon-picker { 
  position: fixed; inset: 0; background: rgba(7,10,18,.68); 
  display: none; align-items: center; justify-content: center; padding: 16px; z-index: 60; 
}
.icon-picker.show { display: flex; }
.icon-picker-panel { 
  width: min(760px, 100%); max-height: calc(100vh - 32px); background: #0f172d; 
  border: 1px solid var(--line); border-radius: 24px; padding: 18px; display: flex; flex-direction: column; 
}
.icon-picker-grid { 
  display: grid; grid-template-columns: repeat(auto-fit, minmax(92px, 1fr)); gap: 12px; 
  margin-top: 14px; overflow-y: auto; padding-right: 4px; 
}
.icon-choice { 
  background: rgba(255,255,255,.04); border: 1px solid var(--line); border-radius: 18px; 
  padding: 12px; cursor: pointer; color: var(--text); display: grid; gap: 10px; justify-items: center; font: inherit;
}
.icon-choice:hover { border-color: rgba(79,124,255,.55); background: rgba(79,124,255,.08); }
.icon-choice-visual { 
  width: 46px; height: 46px; border-radius: 14px; display: grid; place-items: center; 
  background: var(--accentSoft); border: 1px solid rgba(79,124,255,.25); font-size: 1.25rem; 
}

.project-card { position: relative; } /* Needed for absolute positioning */

.hide-toggle {
  position: absolute; top: 12px; right: 12px;
  padding: 6px 12px; font-size: 0.7rem; text-transform: uppercase;
  letter-spacing: 0.05em; border-radius: 8px; z-index: 10;
  transition: all 0.2s ease; opacity: 0.8;
}
.project-card:hover .hide-toggle { opacity: 1; border-color: var(--accent); }

 

/* Responsiveness */
@media (max-width: 820px) {
  .form-grid { grid-template-columns: 1fr; }
  .span-2, .span-4 { grid-column: auto; }
  .project-card { grid-template-columns: auto 1fr; }
  .project-meta { grid-column: 1/-1; text-align: left; flex-direction: row; display: flex; flex-wrap: wrap; }
}

@media (max-width: 560px) {
  .page { width: calc(100% - 16px); padding-top: 16px; }
  .card { padding: 16px; border-radius: 18px; }
  .stats { flex-wrap: nowrap; flex-grow: 2; }
  .stat { padding: 10px 12px; }
  .stat-value { font-size: 1.05rem; }
  .project-card { padding: 14px; gap: 12px; }
  .project-icon { width: 50px; height: 50px; }
  .actions .btn { flex: 1; }
  .hide-toggle { top: 8px; right: 8px; padding: 8px 10px; }
  .project-meta { margin-top: 8px; } /* Space for the button */
} 


 </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <div class="card hero-card">
        <div>
          <h1 class="title">Projects</h1>
          <p class="subtitle">Two-page Flask project manager with JSON API, custom icons, and deadline sorting.</p>
        </div>
        <div class="stats">
          <div class="stat"><div class="stat-label">All projects</div><div class="stat-value" id="allCount">0</div></div>
          <div class="stat"><div class="stat-label">Open</div><div class="stat-value" id="openCount">0</div></div>
          <div class="stat"><div class="stat-label">Finished</div><div class="stat-value" id="doneCount">0</div></div>
        </div>
      </div>

      <details class="card create-project-card" closed>
        <summary class="panel-head create-project-toggle">
          <div>
            <h2 class="panel-title">Create project</h2>
            <div class="muted">Add project icon, deadline, and description.</div>
          </div>
        </summary>

        <form id="projectForm">
          <div class="form-grid">
            <div class="field"><label for="name">Name</label><input id="name" name="name" placeholder="Project name" required /></div>
            <div class="field"><label for="icon">Icon</label><div class="icon-input-row"><input id="icon" name="icon" placeholder="📌 or image URL" /><button class="btn btn-secondary" type="button" onclick="openIconPicker('icon','📌')">Choose</button></div></div>
            <div class="field span-2"><label for="deadline">Deadline</label><input id="deadline" name="deadline" type="datetime-local" /></div>
            <div class="field span-4"><label for="description">Description</label><textarea id="description" name="description" placeholder="Short project description"></textarea></div>
          </div>
          <div class="actions"><button class="btn btn-secondary" type="reset">Clear</button><button class="btn btn-primary" type="submit">Create project</button></div>
        </form>
    </details>

    <section class="card">
      <div class="panel-head"><div><h2 class="panel-title">All projects</h2><div class="muted">Sorted by nearest deadline.</div></div></div>
      <div id="projectList" class="project-list"></div>
    </section>
    <details class="card" id="hiddenSection" style="display: none; margin-top: 18px;">
      <summary class="panel-head" style="cursor: pointer;">
        <div><h2 class="panel-title">Hidden Projects</h2><div class="muted">Projects hidden from the main view.</div></div>
      </summary>
      <div id="hiddenList" class="project-list"></div>
    </details>
  </main>

  <script>
    const DEFAULT_STANDARD_ICONS = [
      { label: "Folder", value: "https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f4c1.png", removable: false },
      { label: "Document", value: "https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f4c4.png", removable: false },
      { label: "Graduation", value: "https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f393.png", removable: false },
      { label: "Rocket", value: "https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f680.png", removable: false },
      { label: "Code", value: "https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f4bb.png", removable: false },
      { label: "Chart", value: "https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f4ca.png", removable: false },
      { label: "Link", value: "https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f517.png", removable: false },
      { label: "Palette", value: "https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f3a8.png", removable: false },
      { label: "Calendar", value: "https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f4c5.png", removable: false },
      { label: "Target", value: "https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f3af.png", removable: false }
    ];
    const STANDARD_ICONS_STORAGE_KEY = "project_manager_standard_icons";
    let STANDARD_ICONS = loadStandardIcons();
    const projectList = document.getElementById("projectList");
    const projectForm = document.getElementById("projectForm");
    const allCount = document.getElementById("allCount");
    const openCount = document.getElementById("openCount");
    const doneCount = document.getElementById("doneCount");



    function loadStandardIcons() {
      try {
        const saved = JSON.parse(localStorage.getItem(STANDARD_ICONS_STORAGE_KEY) || "null");
        if (Array.isArray(saved) && saved.length) return saved;
      } catch {}
      return [...DEFAULT_STANDARD_ICONS];
    }
    function saveStandardIcons() { localStorage.setItem(STANDARD_ICONS_STORAGE_KEY, JSON.stringify(STANDARD_ICONS)); }
    function addToStandardIcons(iconValue, label = "Custom") {
      const value = String(iconValue || "").trim();
      if (!value) return;
      if (STANDARD_ICONS.some(icon => String(icon.value).trim() === value)) return;
      STANDARD_ICONS.unshift({ label: String(label || "Custom").trim() || "Custom", value, removable: true });
      saveStandardIcons();
    }
    function escapeHtml(value = "") { return String(value).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;"); }
    function isImageUrl(value = "") { const v = String(value).trim(); return /^https?:\/\//i.test(v) && /\.(png|jpe?g|gif|webp|svg|avif)(\?.*)?$/i.test(v); }
    function renderIcon(icon, fallback = "📌", alt = "icon") { const value = String(icon || "").trim(); return isImageUrl(value) ? `<img src="${escapeHtml(value)}" alt="${escapeHtml(alt)}" style="width:100%;height:100%;object-fit:cover;border-radius:inherit;display:block;" />` : escapeHtml(value || fallback); }
    function formatDeadline(deadline) { if (!deadline) return "No deadline"; const dt = new Date(deadline); if (Number.isNaN(dt.getTime())) return "Invalid deadline"; return dt.toLocaleString([], {year:"numeric",month:"short",day:"2-digit",hour:"2-digit",minute:"2-digit"}); }
    function formatTimeLeft(seconds) { if (seconds == null) return "No deadline"; if (seconds <= 0) return "Deadline passed"; const days = Math.floor(seconds / 86400); const hours = Math.floor((seconds % 86400) / 3600); const minutes = Math.floor((seconds % 3600) / 60); if (days > 0) return `${days}d ${hours}h left`; if (hours > 0) return `${hours}h ${minutes}m left`; return `${minutes}m left`; }
    function buildIconPickerHtml(targetInputId, fallback) {
      return `
        <div id="iconPicker" class="icon-picker show" data-target-input-id="${targetInputId}" data-fallback="${fallback}">
          <div class="icon-picker-panel">
            <div class="panel-head"><div><h2 class="panel-title">Choose standard icon</h2><div class="muted">Click an icon to fill the input field.</div></div><button class="btn btn-secondary" type="button" onclick="closeIconPicker()">Close</button></div>
            <div class="icon-picker-grid">
              ${STANDARD_ICONS.map(icon => `
                <button class="icon-choice" type="button" onclick="selectStandardIcon(${JSON.stringify(targetInputId)}, ${JSON.stringify(icon.value)})>
                  <div class="icon-choice-visual">${renderIcon(icon.value, fallback, icon.label)}</div>
                  <div class="icon-choice-label">${escapeHtml(icon.label)}</div>
                </button>
              `).join("")}
            </div>
          </div>
        </div>`;
    }
    function openIconPicker(targetInputId, fallback = "📌") { closeIconPicker(); document.body.insertAdjacentHTML("beforeend", buildIconPickerHtml(targetInputId, fallback)); const picker = document.getElementById("iconPicker"); picker.addEventListener("click", (event) => { if (event.target === picker) closeIconPicker(); }); }
    function closeIconPicker() { document.getElementById("iconPicker")?.remove(); }
    function selectStandardIcon(targetInputId, value) { const input = document.getElementById(targetInputId); if (input) input.value = value; closeIconPicker(); }

const HIDDEN_KEY = "pm_hidden_ids";
let hiddenIds = new Set(JSON.parse(localStorage.getItem(HIDDEN_KEY) || "[]"));

function toggleHide(e, id) {
  e.preventDefault(); e.stopPropagation();
  hiddenIds.has(id) ? hiddenIds.delete(id) : hiddenIds.add(id);
  localStorage.setItem(HIDDEN_KEY, JSON.stringify([...hiddenIds]));
  loadProjects();
}

async function loadProjects() {
  const res = await fetch("/api/projects");
  const projects = await res.json();
  
  allCount.textContent = projects.length;
  doneCount.textContent = projects.filter(p => p.finished).length;
  openCount.textContent = projects.filter(p => !p.finished).length;

  const renderCard = (p) => {
    const isHidden = hiddenIds.has(p.id);
    return `
      <a class="project-card" href="/project?id=${encodeURIComponent(p.id)}" 
         style="display: flex; align-items: flex-start; gap: 16px; position: relative;">
        
        <div class="project-icon" style="flex-shrink: 0;">
          ${renderIcon(p.icon, "📌", p.name)}
        </div>
        
        <div style="flex: 1; display: flex; flex-direction: column; min-width: 0; gap: 12px;">
          
          <div style="display: flex; justify-content: space-between; align-items: flex-start; gap: 12px;">
            <div style="min-width: 0;">
              <h3 class="project-name" style="margin: 0 0 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">
                ${escapeHtml(p.name)}
              </h3>
              <p class="project-desc" style="margin: 0;">
                ${escapeHtml(p.description || "No description")}
              </p>
            </div>
            <button class="btn-secondary" 
                    style="flex-shrink: 0; padding: 4px 10px; font-size: 0.7rem;" 
                    onclick="toggleHide(event, '${p.id}')">
              ${isHidden ? "Show" : "Hide"}
            </button>
          </div>
          
          <div class="project-meta" style="display: flex; gap: 8px; flex-wrap: wrap;">
            <div class="badge">${escapeHtml(formatDeadline(p.deadline))}</div>
            <div class="badge ${p.finished ? "done" : ""}">${p.finished ? "✓ Finished" : escapeHtml(formatTimeLeft(p.seconds_left))}</div>
          </div>
          
        </div>
      </a>`;
  };

  const visible = projects.filter(p => !hiddenIds.has(p.id));
  const hidden = projects.filter(p => hiddenIds.has(p.id));

  projectList.innerHTML = visible.length ? visible.map(renderCard).join("") : `<div class="empty">No active projects.</div>`;
  
  const hSection = document.getElementById("hiddenSection");
  if (hidden.length) {
    hSection.style.display = "block";
    document.getElementById("hiddenList").innerHTML = hidden.map(renderCard).join("");
  } else {
    hSection.style.display = "none";
  }
}

    projectForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      const rawIcon = projectForm.icon.value.trim() || "📌";
      addToStandardIcons(rawIcon, projectForm.name.value.trim() || "Project");
      const payload = {
        name: projectForm.name.value.trim(),
        icon: rawIcon,
        deadline: projectForm.deadline.value ? new Date(projectForm.deadline.value).toISOString() : null,
        description: projectForm.description.value.trim(),
        finished: false,
        links: [],
        steps: []
      };
      const res = await fetch("/api/projects", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
      if (!res.ok) { alert("Could not create project."); return; }
      projectForm.reset();
      await loadProjects();
    });

    window.openIconPicker = openIconPicker;
    window.closeIconPicker = closeIconPicker;
    window.selectStandardIcon = selectStandardIcon;
    loadProjects().catch(() => { projectList.innerHTML = `<div class="empty">Could not load projects.</div>`; });
  </script>
</body>
</html>
